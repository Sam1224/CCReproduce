<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>ECom & Influencer Governance — Paper-Skills Library</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root {
    --bg: #f7f7f4;
    --panel: #ffffff;
    --ink: #1f2933;
    --muted: #5b6b78;
    --line: #e3e6eb;
    --accent: #5d4037;
    --accent-soft: #d7ccc8;
    --tag: #ece8e2;
    --score-hi: #2e7d32;
    --score-mid: #c77a00;
    --score-lo: #8a8d91;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: "Source Serif Pro","Georgia","Noto Serif SC",serif; }
  header {
    padding: 28px 40px 20px; border-bottom: 1px solid var(--line); background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: 0.02em; }
  .sub { color: var(--muted); font-size: 13px; }
  .controls {
    display: flex; gap: 24px; align-items: center; flex-wrap: wrap; margin-top: 14px;
    font-family: "Inter","Helvetica Neue",sans-serif; font-size: 13px;
  }
  .controls label { color: var(--muted); }
  .controls select, .controls input[type="range"], .controls input[type="text"] { font-family: inherit; }
  .controls .sliderbox { display: flex; gap: 8px; align-items: center; min-width: 240px; }
  .controls input[type="text"] {
    border: 1px solid var(--line); padding: 4px 8px; border-radius: 4px;
    font-size: 13px; min-width: 220px;
  }
  .controls .langbtn {
    background: var(--panel); border: 1px solid var(--line); padding: 4px 10px; cursor: pointer;
    border-radius: 4px; color: var(--ink);
  }
  .controls .langbtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  main { padding: 24px 40px 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 18px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 16px 18px; display: flex; flex-direction: column;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
  }
  .card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card h2 { font-size: 15px; line-height: 1.35; margin: 0 0 4px; font-weight: 600; }
  .card .authors { font-family: "Inter",sans-serif; font-size: 11.5px; color: var(--muted); margin-bottom: 6px; }
  .card .affil { font-family: "Inter",sans-serif; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .card .score {
    font-family: "Inter",sans-serif; font-weight: 700; font-size: 15px; padding: 4px 8px;
    border-radius: 4px; min-width: 42px; text-align: center;
  }
  .score-hi { background: #e8f5e9; color: var(--score-hi); }
  .score-mid { background: #fff3e0; color: var(--score-mid); }
  .score-lo { background: #f1f3f4; color: var(--score-lo); }
  .bucket-pill {
    font-family: "Inter",sans-serif; font-size: 10px; padding: 1px 6px;
    border-radius: 3px; border: 1px solid var(--line); color: var(--muted); margin-left: 6px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .bucket-STRONG { background: #fff3e0; color: var(--score-mid); border-color: #ffe0b2; }
  .bucket-WEAK { background: #f1f3f4; color: var(--muted); }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0 10px; }
  .tag { background: var(--tag); color: var(--accent); font-family: "Inter",sans-serif; font-size: 10.5px; padding: 2px 6px; border-radius: 3px; }
  .date { font-family: "Inter",sans-serif; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .section-title { font-family: "Inter",sans-serif; font-size: 11.5px; color: var(--muted); margin: 10px 0 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .section-body { font-size: 13px; line-height: 1.55; color: var(--ink); white-space: pre-wrap; }
  .section-body.smaller { font-size: 12.5px; }
  .section-body.clamp { max-height: 5.2em; overflow: hidden; position: relative; }
  .toggle-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .toggle-btn {
    background: var(--panel); border: 1px solid var(--line); padding: 4px 8px; cursor: pointer;
    border-radius: 4px; font-family: "Inter",sans-serif; font-size: 11px; color: var(--accent);
  }
  .toggle-btn.active { background: var(--accent-soft); }
  .breakdown { margin-top: 8px; padding: 8px 10px; background: #fbfaf7; border-radius: 4px; font-family: "Inter",sans-serif; font-size: 11.5px; color: var(--muted); display: none; }
  .breakdown.visible { display: block; }
  .breakdown .row { display: flex; justify-content: space-between; }
  .rationale { font-style: italic; color: var(--muted); font-size: 12px; margin-top: 4px; }
  .links { margin-top: 10px; display: flex; gap: 12px; font-family: "Inter",sans-serif; font-size: 12px; }
  .links a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
  .links a:hover { border-bottom-color: var(--accent); }
  footer { padding: 24px 40px 40px; color: var(--muted); font-family: "Inter",sans-serif; font-size: 11.5px; border-top: 1px solid var(--line); margin-top: 30px; }
</style>
</head>
<body>
<header>
  <h1>ECom & Influencer Governance — Paper-Skills Library</h1>
  <div class="sub" id="subtitle">CCPapers 23-ecom-papers · 每篇论文打包成可加载 paper-skill (SKILL.md + templates + paper-companion)</div>
  <div class="controls">
    <div class="langbox">
      <button class="langbtn active" data-lang="zh" id="lang-zh">中文</button>
      <button class="langbtn" data-lang="en" id="lang-en">English</button>
    </div>
    <div>
      <label for="datepick" id="lbl-date">巡检日期</label>
      <select id="datepick"></select>
    </div>
    <div class="sliderbox">
      <label id="lbl-score">最低分</label>
      <input type="range" id="score-slider" min="0" max="100" value="0" step="1" />
      <span id="score-value">0</span>
    </div>
    <div>
      <label for="search" id="lbl-search">搜索</label>
      <input type="text" id="search" placeholder="title / author / tag" />
    </div>
    <div>
      <label id="lbl-count">显示</label>
      <span id="visible-count">0</span> / <span id="total-count">0</span>
    </div>
  </div>
</header>
<main>
  <div id="grid" class="grid"></div>
</main>
<footer id="footer">
  数据源：每个 paper-skill 的 SKILL.md frontmatter + references/paper-companion.md。重新生成：
  <code>python3 23-ecom-papers/web/build_papers_json.py</code>。仓库：
  <a href="https://code.byted.org/ecom_govern/CCPapers" target="_blank">CCPapers</a>。
</footer>
<script>
const I18N = {
  zh: {
    subtitle: "CCPapers 23-ecom-papers · 每篇论文打包成可加载 paper-skill (SKILL.md + templates + paper-companion)",
    date: "巡检日期", score: "最低分", count: "显示", search: "搜索",
    all: "全部日期",
    method: "方法概述", innovation: "创新点", metric: "关键指标", rationale: "评分依据",
    breakdown: "评分拆解",
    arxiv: "arXiv", code: "Paper-Skill", noCode: "无代码",
    footer: "数据源：每个 paper-skill 的 SKILL.md frontmatter + references/paper-companion.md。重新生成：<code>python3 23-ecom-papers/web/build_papers_json.py</code>。仓库：",
  },
  en: {
    subtitle: "CCPapers 23-ecom-papers — each paper packaged as a loadable paper-skill (SKILL.md + templates + companion)",
    date: "Inspection date", score: "Min score", count: "Showing", search: "Search",
    all: "All dates",
    method: "Method overview", innovation: "Innovation", metric: "Key metric", rationale: "Score rationale",
    breakdown: "Score breakdown",
    arxiv: "arXiv", code: "Paper-Skill", noCode: "No code",
    footer: "Source: SKILL.md frontmatter + references/paper-companion.md of each paper-skill. Rebuild: <code>python3 23-ecom-papers/web/build_papers_json.py</code>. Repo: ",
  }
};

let LANG = "zh";
let DB = null;

async function loadDB() {
  const res = await fetch("papers.json");
  DB = await res.json();
  initUI();
}

function setLang(lang) {
  LANG = lang;
  document.querySelectorAll(".langbtn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  document.getElementById("subtitle").textContent = I18N[lang].subtitle;
  document.getElementById("lbl-date").textContent = I18N[lang].date;
  document.getElementById("lbl-score").textContent = I18N[lang].score;
  document.getElementById("lbl-count").textContent = I18N[lang].count;
  document.getElementById("lbl-search").textContent = I18N[lang].search;
  document.getElementById("footer").innerHTML = I18N[lang].footer +
    '<a href="https://code.byted.org/ecom_govern/CCPapers" target="_blank">CCPapers</a>.';
  refreshDateOptions();
  render();
}

function refreshDateOptions() {
  const datepick = document.getElementById("datepick");
  const current = datepick.value;
  datepick.innerHTML = "";
  const optAll = document.createElement("option");
  optAll.value = "__all__"; optAll.textContent = I18N[LANG].all;
  datepick.appendChild(optAll);
  DB.dates.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d; opt.textContent = d; datepick.appendChild(opt);
  });
  datepick.value = current || "__all__";
}

function initUI() {
  refreshDateOptions();
  document.getElementById("datepick").addEventListener("change", render);
  document.querySelectorAll(".langbtn").forEach(b => b.addEventListener("click", () => setLang(b.dataset.lang)));
  const slider = document.getElementById("score-slider");
  slider.addEventListener("input", () => {
    document.getElementById("score-value").textContent = slider.value;
    render();
  });
  document.getElementById("search").addEventListener("input", render);
  render();
}

function scoreClass(s) {
  if (s >= 80) return "score-hi";
  if (s >= 60) return "score-mid";
  return "score-lo";
}

function papersForDate(date) {
  if (date === "__all__") {
    const all = [];
    DB.dates.forEach(d => (DB.papers[d] || []).forEach(p => all.push({ ...p, _date: d })));
    return all.sort((a, b) => b.score - a.score);
  }
  return (DB.papers[date] || []).map(p => ({ ...p, _date: date })).sort((a, b) => b.score - a.score);
}

function matchesSearch(p, q) {
  if (!q) return true;
  q = q.toLowerCase();
  const hay = [p.title, p.authors, p.affiliation, (p.tags || []).join(" ")].join(" ").toLowerCase();
  return hay.includes(q);
}

function render() {
  const date = document.getElementById("datepick").value || "__all__";
  const minScore = parseInt(document.getElementById("score-slider").value, 10);
  const q = document.getElementById("search").value.trim();
  const t = I18N[LANG];
  const list = papersForDate(date);
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  let visible = 0;
  for (const p of list) {
    if (p.score < minScore) continue;
    if (!matchesSearch(p, q)) continue;
    visible++;
    const card = document.createElement("article");
    card.className = "card";
    const breakdown = Object.entries(p.score_breakdown || {})
      .map(([k, v]) => `<div class="row"><span>${k}</span><span>${v}</span></div>`).join("");
    const tags = (p.tags || []).map(x => `<span class="tag">${x}</span>`).join("");
    const codeLink = p.code
      ? `<a href="${p.code}" target="_blank">${t.code}</a>`
      : `<span style="color:#8a8d91;font-style:italic">${t.noCode}</span>`;
    const method = LANG === "zh" ? p.method_overview_zh : (p.method_overview_en || p.method_overview_zh);
    const innovation = LANG === "zh" ? p.innovation_zh : (p.innovation_en || p.innovation_zh);
    const metric = LANG === "zh" ? p.key_metric_zh : (p.key_metric_en || p.key_metric_zh);
    const rationale = LANG === "zh" ? p.rationale_zh : p.rationale_en;
    card.innerHTML = `
      <div class="top">
        <div style="flex:1">
          <div class="date">${p._date} <span class="bucket-pill bucket-${p.bucket}">${p.bucket}</span></div>
          <h2>${p.title}</h2>
          <div class="authors">${p.authors}</div>
          <div class="affil">${p.affiliation || ""}</div>
        </div>
        <div class="score ${scoreClass(p.score)}">${p.score}</div>
      </div>
      <div class="tags">${tags}</div>
      <div class="section-title">${t.method}</div>
      <div class="section-body smaller clamp">${method || ""}</div>
      <div class="section-title">${t.innovation}</div>
      <div class="section-body smaller clamp">${innovation || ""}</div>
      <div class="section-title">${t.metric}</div>
      <div class="section-body smaller clamp">${metric || ""}</div>
      <div class="section-title">${t.rationale}</div>
      <div class="section-body smaller rationale">${rationale || ""}</div>
      <div class="toggle-row">
        <button class="toggle-btn" data-toggle="method">${t.method}</button>
        <button class="toggle-btn" data-toggle="innovation">${t.innovation}</button>
        <button class="toggle-btn" data-toggle="metric">${t.metric}</button>
        <button class="toggle-btn" data-toggle="breakdown">${t.breakdown}</button>
      </div>
      <div class="breakdown">${breakdown}</div>
      <div class="links">
        <a href="${p.arxiv}" target="_blank">${t.arxiv}</a>
        ${codeLink}
      </div>
    `;
    card.querySelectorAll(".toggle-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const which = btn.dataset.toggle;
        if (which === "breakdown") {
          const b = card.querySelector(".breakdown");
          const open = !b.classList.contains("visible");
          btn.classList.toggle("active", open);
          b.classList.toggle("visible", open);
        } else {
          const idx = { method: 0, innovation: 1, metric: 2 }[which];
          const bodies = card.querySelectorAll(".section-body.clamp");
          const target = bodies[idx];
          const open = target.style.maxHeight === "none";
          target.style.maxHeight = open ? "" : "none";
          btn.classList.toggle("active", !open);
        }
      });
    });
    grid.appendChild(card);
  }
  document.getElementById("visible-count").textContent = visible;
  document.getElementById("total-count").textContent = list.length;
}

loadDB().catch(err => {
  document.getElementById("grid").innerHTML = '<div style="padding:40px;color:#b71c1c">Failed to load papers.json — open this file via a static server: <code>python -m http.server</code> from the web/ directory.</div>';
  console.error(err);
});
</script>
</body>
</html>
