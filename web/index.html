<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCReproduce — Daily AI Paper Report</title>
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #fff;
    --border: #e1e4e8;
    --primary: #0366d6;
    --primary-dark: #024fa4;
    --text: #24292e;
    --text-secondary: #586069;
    --strong-tag: #e6f3ff;
    --strong-border: #0366d6;
    --weak-tag: #f1f8ff;
    --weak-border: #79b8ff;
    --score-high: #28a745;
    --score-mid: #f0a800;
    --score-low: #cb2431;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  header { background: #24292e; color: #fff; padding: 24px 32px;
           display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.02em; }
  header .subtitle { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }
  .lang-toggle { display: flex; gap: 6px; }
  .lang-toggle button { background: #30363d; border: 1px solid #444c56; color: #c9d1d9;
                        padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .lang-toggle button.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  /* Controls */
  .controls { background: var(--surface); border-bottom: 1px solid var(--border);
              padding: 16px 32px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
  .controls input[type=range] { width: 160px; }
  .controls select, .controls input[type=date] { border: 1px solid var(--border); border-radius: 6px;
                                                   padding: 6px 10px; font-size: 0.85rem; }
  #score-display { font-weight: 700; color: var(--primary); min-width: 28px; }

  /* Stats bar */
  .stats-bar { padding: 12px 32px; background: var(--surface); border-bottom: 1px solid var(--border);
               font-size: 0.82rem; color: var(--text-secondary); }

  /* Main layout */
  main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }

  /* Paper cards */
  .paper-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
                box-shadow: var(--shadow); overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; }
  .paper-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }

  .card-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag { font-size: 0.72rem; padding: 3px 9px; border-radius: 12px; font-weight: 600; }
  .tag-strong { background: var(--strong-tag); color: var(--strong-border); border: 1px solid #c8e1ff; }
  .tag-weak   { background: var(--weak-tag);   color: #0056b3; border: 1px solid #c8e1ff; }
  .tag-domain { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
  .tag-venue  { background: #f3e8ff; color: #6f42c1; border: 1px solid #d2a6f5; }

  .card-header h2 { font-size: 0.98rem; line-height: 1.4; font-weight: 700; }
  .card-header .authors { font-size: 0.78rem; color: var(--text-secondary); margin-top: 5px; }
  .card-header .affil  { font-size: 0.76rem; color: var(--text-secondary); font-style: italic; }

  /* Score badge */
  .score-badge { display: inline-flex; align-items: center; justify-content: center;
                 width: 44px; height: 44px; border-radius: 50%; font-size: 1rem;
                 font-weight: 800; color: #fff; float: right; margin-left: 12px; }
  .score-high { background: var(--score-high); }
  .score-mid  { background: var(--score-mid); }
  .score-low  { background: var(--score-low); }

  .card-body { padding: 14px 18px; }

  /* Methodology figure */
  .fig-section { margin-bottom: 14px; }
  .fig-section .fig-toggle { background: none; border: none; color: var(--primary);
                              font-size: 0.82rem; cursor: pointer; padding: 0; text-decoration: underline; }
  .fig-container { display: none; margin-top: 8px; }
  .fig-container.show { display: block; }
  .fig-container svg { width: 100%; border: 1px solid var(--border); border-radius: 6px; }

  /* Method text */
  .method-section h3 { font-size: 0.82rem; font-weight: 700; color: var(--text-secondary);
                        text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .method-section p, .method-section .zh { font-size: 0.85rem; line-height: 1.6; margin-bottom: 10px; }
  .method-section .en { display: none; }
  body.lang-en .method-section .zh { display: none; }
  body.lang-en .method-section .en { display: block; }

  /* Metrics */
  .metrics-section { background: #f6f8fa; border-radius: 6px; padding: 10px 12px; margin: 12px 0; font-size: 0.82rem; }
  .metrics-section strong { font-size: 0.78rem; text-transform: uppercase; color: var(--text-secondary); }
  .metric-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px dashed #e1e4e8; }
  .metric-row:last-child { border-bottom: none; }

  /* Score breakdown */
  .score-breakdown { margin-top: 12px; }
  .score-breakdown summary { font-size: 0.82rem; cursor: pointer; color: var(--text-secondary);
                              font-weight: 600; list-style: none; user-select: none; }
  .score-breakdown summary::before { content: "▶ "; font-size: 0.7rem; }
  .score-breakdown[open] summary::before { content: "▼ "; }
  .score-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.78rem; }
  .score-table th { background: #f6f8fa; padding: 5px 8px; text-align: left; font-weight: 600; }
  .score-table td { padding: 4px 8px; border-bottom: 1px solid #f0f0f0; }
  .score-bar { height: 6px; border-radius: 3px; background: var(--primary); display: inline-block; }

  /* Links */
  .card-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; }
  .card-footer a { font-size: 0.8rem; color: var(--primary); text-decoration: none; font-weight: 500; }
  .card-footer a:hover { text-decoration: underline; }

  /* Empty state */
  .empty { text-align: center; padding: 60px; color: var(--text-secondary); grid-column: 1/-1; }

  /* Date in card */
  .card-date { font-size: 0.72rem; color: var(--text-secondary); }

  @media (max-width: 600px) {
    main { padding: 16px; }
    .grid { grid-template-columns: 1fr; }
    header { padding: 16px; }
  }
</style>
</head>

function buildCard(paper, lang) {
  const sc = paper.score;
  const scClass = scoreClass(sc);
  const figSVG = buildFigureSVG(paper);

  const domainTags = paper.domains.map(d =>
    `<span class="tag tag-domain">${d}</span>`
  ).join('');

  const breakdown = paper.scoreBreakdown.map(r => {
    const pct = Math.round((r.val / r.max) * 100);
    return `<tr>
      <td>${r.dim}</td>
      <td>${r.val}/${r.max}</td>
      <td><span class="score-bar" style="width:${pct * 0.6}px"></span></td>
    </tr>`;
  }).join('');

  const metrics = paper.metrics.map(m =>
    `<div class="metric-row"><span>${m.label}</span><strong>${m.val}</strong></div>`
  ).join('');

  const figBlock = figSVG ? `
    <div class="fig-section">
      <button class="fig-toggle" onclick="toggleFig(this)">▶ Architecture Figure</button>
      <div class="fig-container">
        ${figSVG}
      </div>
    </div>` : '';

  return `<div class="paper-card" data-score="${sc}" data-bucket="${paper.bucket}" data-date="${paper.date}">
    <div class="card-header">
      <div class="card-tags">
        <span class="tag tag-${paper.bucket.toLowerCase()}">${paper.bucket}</span>
        <span class="tag tag-venue">${paper.venue}</span>
        ${domainTags}
      </div>
      <span class="score-badge ${scClass}">${sc}</span>
      <h2>${paper.title}</h2>
      <div class="authors">${paper.authors}</div>
      <div class="affil">${paper.affil} · <span class="card-date">${paper.date}</span></div>
    </div>
    <div class="card-body">
      ${figBlock}
      <div class="method-section">
        <h3>Method</h3>
        <p class="zh">${paper.method_zh}</p>
        <p class="en">${paper.method_en}</p>
        <h3>Innovation</h3>
        <p class="zh">${paper.innovation_zh}</p>
        <p class="en">${paper.innovation_en}</p>
      </div>
      <div class="metrics-section">
        <strong>Key Metrics</strong>
        ${metrics}
      </div>
      <details class="score-breakdown">
        <summary>Score Breakdown (${sc}/100)</summary>
        <table class="score-table">
          <thead><tr><th>Dimension</th><th>Score</th><th>Bar</th></tr></thead>
          <tbody>${breakdown}</tbody>
        </table>
      </details>
    </div>
    <div class="card-footer">
      <a href="${paper.arxiv}" target="_blank">📄 arXiv</a>
      ${paper.code ? `<a href="${paper.code}" target="_blank">💻 Code</a>` : ''}
    </div>
  </div>`;
}

function toggleFig(btn) {
  const container = btn.nextElementSibling;
  const showing = container.classList.toggle('show');
  btn.textContent = (showing ? '▼' : '▶') + ' Architecture Figure';
}

function filterCards() {
  const minScore = parseInt(document.getElementById('score-slider').value);
  document.getElementById('score-display').textContent = minScore;
  const dateFilter = document.getElementById('date-picker').value;
  const bucketFilter = document.getElementById('bucket-filter').value;

  const lang = document.body.classList.contains('lang-zh') ? 'zh' : 'en';
  const filtered = PAPERS.filter(p =>
    p.score >= minScore &&
    (dateFilter === 'all' || p.date === dateFilter) &&
    (bucketFilter === 'all' || p.bucket === bucketFilter)
  );

  const grid = document.getElementById('paper-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No papers match the current filters.</div>';
  } else {
    grid.innerHTML = filtered.map(p => buildCard(p, lang)).join('');
  }
  document.getElementById('stats-bar').textContent =
    `Showing ${filtered.length} of ${PAPERS.length} papers`;
}

function setLang(lang) {
  document.body.className = `lang-${lang}`;
  document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lang-toggle button').forEach(b => {
    if (b.textContent.trim() === (lang === 'zh' ? '中文' : 'English')) b.classList.add('active');
  });
  filterCards();
}

// Initial render
filterCards();
</script>
