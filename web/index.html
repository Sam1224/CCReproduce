    method_en: "TWN proposes adaptive CoT reasoning for multimodal embeddings. A dual-LoRA architecture attaches reasoning and embedding adapters to a shared frozen backbone with gradient detachment at their interface. A lightweight complexity router decides whether CoT is needed per input. Simple inputs skip reasoning (avoiding noise), complex inputs trigger CoT. ~60% inference cost reduction vs. always-on CoT systems.",
    method_zh: "TWN 为多模态嵌入提出自适应 CoT 推理。双 LoRA 架构在共享冻结主干上挂载推理 LoRA 和嵌入 LoRA，接口处梯度截断。轻量复杂度路由器按需决定是否触发 CoT，简单输入跳过推理（避免噪声），复杂输入才触发。相比 always-on CoT 推理成本节省约 60%。",
    innovation_en: "Dual-LoRA adaptive reasoning/embedding on shared backbone; gradient decoupling at interface prevents conflicts; complexity router for selective CoT; ~60% cost reduction vs. always-on CoT.",
    innovation_zh: "双 LoRA 在共享主干上自适应推理/嵌入；接口梯度解耦避免冲突；复杂度路由器按需 CoT；相比全 CoT 降低约 60% 推理成本。",
    metrics: [
      ["Multimodal Retrieval", "vs always-on CoT", "~Comparable", "Full CoT model"],
      ["Inference Cost", "vs always-on CoT", "~40% of cost", "Full CoT model"],
    ],
    score_breakdown: [
      ["Innovation", 30, 20],
      ["SOTA Delta", 15, 9],
      ["Exp Quality", 15, 10],
      ["Efficiency", 10, 9],
      ["Generalization", 5, 4],
      ["Domain Relevance", 25, 12],
    ],
    link: "https://arxiv.org/abs/2605.14448",
    listed_date: "2026-05-14",
  },
];

// ---- State ----
let currentLang = 'en';
let currentBucket = 'all';

// ---- Helpers ----
function scoreClass(s) {
  if (s >= 80) return 'score-high';
  if (s >= 60) return 'score-mid';
  return 'score-low';
}

function buildMetricsTable(metrics) {
  if (!metrics || !metrics.length) return '';
  let rows = metrics.map(([ds, met, val, base]) =>
    `<tr><td>${ds}</td><td>${met}</td><td><strong>${val}</strong></td><td style="color:var(--muted)">${base}</td></tr>`
  ).join('');
  return `<table class="metrics-table"><thead><tr><th>Dataset</th><th>Metric</th><th>Ours</th><th>Baseline</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function buildScoreTable(breakdown, total) {
  let rows = breakdown.map(([dim, max, got]) =>
    `<tr><td>${dim}</td><td style="color:var(--muted)">/${max}</td><td>${got}</td></tr>`
  ).join('');
  rows += `<tr style="border-top:2px solid var(--border)"><td class="score-total">Total</td><td></td><td class="score-total">${total}</td></tr>`;
  return `<table class="score-breakdown"><tbody>${rows}</tbody></table>`;
}

function buildFigureSVG(paper) {
  // Architecture diagram as SVG
  const w = 280, h = 160;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="font-family:monospace;font-size:10px">
    <rect x="0" y="0" width="${w}" height="${h}" fill="#f8f9fb" rx="6"/>
    <!-- Input boxes -->
    <rect x="4" y="10" width="58" height="20" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="33" y="24" text-anchor="middle" fill="#1e40af">Text</text>
    <rect x="68" y="10" width="58" height="20" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
    <text x="97" y="24" text-anchor="middle" fill="#166534">Image</text>
    <rect x="132" y="10" width="58" height="20" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="161" y="24" text-anchor="middle" fill="#92400e">Audio</text>
    <rect x="196" y="10" width="58" height="20" rx="4" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
    <text x="225" y="24" text-anchor="middle" fill="#9d174d">Video</text>
    <!-- Arrow down to backbone -->
    <line x1="140" y1="30" x2="140" y2="50" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
    <!-- Backbone box -->
    <rect x="20" y="50" width="240" height="34" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="140" y="64" text-anchor="middle" fill="#4c1d95" font-weight="bold">Shared Transformer Backbone</text>
    <text x="140" y="78" text-anchor="middle" fill="#5b21b6">(RoPE + SwiGLU + RMSNorm)</text>
    <!-- Arrow down to pool -->
    <line x1="140" y1="84" x2="140" y2="104" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
    <!-- Pool box -->
    <rect x="60" y="104" width="160" height="22" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="140" y="119" text-anchor="middle" fill="#713f12">Mean Pool → Project → L2 Norm</text>
    <!-- Arrow down to embed -->
    <line x1="140" y1="126" x2="140" y2="142" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
    <!-- Output box -->
    <rect x="80" y="142" width="120" height="14" rx="4" fill="#2563eb"/>
    <text x="140" y="153" text-anchor="middle" fill="#fff" font-weight="bold">Embedding (D,)</text>
    <!-- Arrow markers -->
    <defs>
      <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
      </marker>
    </defs>
  </svg>`;
}

function buildCard(paper) {
  const sc = scoreClass(paper.score);
  const metricsHtml = buildMetricsTable(paper.metrics);
  const scoreHtml = buildScoreTable(paper.score_breakdown, paper.score);
  const figHtml = buildFigureSVG(paper);
  const codeHtml = paper.code
    ? `<a class="code-link" href="https://github.com/Sam1224/CCReproduce/tree/main/2026-05-27/${paper.code}" target="_blank">⚙ Code</a>`
    : '';

  return `
  <div class="card" data-score="${paper.score}" data-bucket="${paper.bucket}" data-date="${paper.date}">
    <div class="card-header">
      <div class="card-meta">
        <span class="bucket-badge ${paper.bucket}">${paper.bucket}</span>
        <span class="score-badge ${sc}">${paper.score}</span>
        <span class="card-date">${paper.listed_date}</span>
      </div>
      <div class="card-title">${paper.title}</div>
      <div class="card-authors">${paper.authors} · ${paper.affiliation}</div>
    </div>
    <div class="card-body">
      <div class="domain-tags">${paper.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>

      <div class="section-toggle" onclick="toggleSection(this)">
        <span>Method Overview</span><span class="chevron">▾</span>
      </div>
      <div class="section-content method-text">
        <div class="en">${paper.method_en}</div>
        <div class="zh">${paper.method_zh}</div>
      </div>

      <div class="section-toggle" onclick="toggleSection(this)">
        <span>Innovation Analysis</span><span class="chevron">▾</span>
      </div>
      <div class="section-content method-text">
        <div class="en">${paper.innovation_en}</div>
        <div class="zh">${paper.innovation_zh}</div>
      </div>

      <div class="section-toggle collapsed" onclick="toggleSection(this)">
        <span>Architecture Figure</span><span class="chevron">▾</span>
      </div>
      <div class="section-content hidden">
        <div class="figure-block">${figHtml}<div class="figure-caption">Architecture overview (auto-generated from paper description)</div></div>
      </div>

      <div class="section-toggle" onclick="toggleSection(this)">
        <span>Key Metrics</span><span class="chevron">▾</span>
      </div>
      <div class="section-content">${metricsHtml}</div>

      <div class="section-toggle collapsed" onclick="toggleSection(this)">
        <span>Score Breakdown</span><span class="chevron">▾</span>
      </div>
      <div class="section-content hidden">${scoreHtml}</div>
    </div>
    <div class="card-footer">
      <a class="arxiv-link" href="${paper.link}" target="_blank">arXiv: ${paper.arxiv} ↗</a>
      ${codeHtml}
    </div>
  </div>`;
}

// ---- Rendering ----
function renderAll() {
  const minScore = parseInt(document.getElementById('score-slider').value);
  const dateFilter = document.getElementById('date-select').value;
  document.getElementById('score-display').textContent = minScore;

  const filtered = PAPERS.filter(p => {
    if (p.score < minScore) return false;
    if (currentBucket !== 'all' && p.bucket !== currentBucket) return false;
    if (dateFilter !== 'all' && p.date !== dateFilter) return false;
    return true;
  });

  const main = document.getElementById('main-content');
  const noP = document.getElementById('no-papers');

  if (!filtered.length) {
    main.innerHTML = '';
    main.appendChild(noP);
    noP.style.display = 'block';
    return;
  }
  noP.style.display = 'none';

  // Group by date
  const byDate = {};
  filtered.forEach(p => { (byDate[p.date] = byDate[p.date] || []).push(p); });
  const dates = Object.keys(byDate).sort().reverse();

  main.innerHTML = dates.map(d => `
    <div class="date-section">
      <div class="date-heading">${d} — ${byDate[d].length} paper${byDate[d].length > 1 ? 's' : ''}</div>
      <div class="cards-grid">${byDate[d].map(buildCard).join('')}</div>
    </div>`
  ).join('');
}

function filterCards() { renderAll(); }

function setLang(lang) {
  currentLang = lang;
  document.body.classList.toggle('zh', lang === 'zh');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
}

function setBucket(b) {
  currentBucket = b;
  ['all','strong','weak'].forEach(x => {
    document.getElementById('btn-'+x).className = 'bucket-btn';
  });
  document.getElementById('btn-'+b.toLowerCase()).classList.add('active-'+b.toLowerCase() === 'active-all' ? 'active-all' : b === 'STRONG' ? 'active-strong' : b === 'WEAK' ? 'active-weak' : 'active-all');
  renderAll();
}

function toggleSection(toggle) {
  const content = toggle.nextElementSibling;
  const collapsed = toggle.classList.contains('collapsed');
  toggle.classList.toggle('collapsed', !collapsed);
  content.classList.toggle('hidden', !collapsed);
}

// ---- Init date picker ----
function initDatePicker() {
  const dates = [...new Set(PAPERS.map(p => p.date))].sort().reverse();
  const sel = document.getElementById('date-select');
  dates.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
}

// ---- Bootstrap ----
initDatePicker();
renderAll();
</script>
</body>
</html>
