<head>

<title>CCReproduce — Daily AI Paper Inspection</title>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e5e7eb;
    --text: #1c1917;
    --sub: #6b7280;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --strong: #065f46;
    --strong-bg: #d1fae5;
    --weak: #92400e;
    --weak-bg: #fef3c7;
    --score-high: #15803d;
    --score-mid: #b45309;
    --score-low: #6b7280;
    --tag-bg: #f3f4f6;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-hover: 0 4px 12px rgba(0,0,0,.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  .lang-btn { background: var(--accent-light); color: var(--accent); border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.15s; }
  .lang-btn:hover { background: var(--accent); color: #fff; }

  /* Controls */
  .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .controls label { font-size: 13px; color: var(--sub); font-weight: 500; }
  .controls input[type="date"] { border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 13px; cursor: pointer; }
  .score-range { display: flex; align-items: center; gap: 8px; }
  .score-range input[type="range"] { width: 120px; accent-color: var(--accent); }
  #score-display { font-weight: 700; color: var(--accent); min-width: 30px; }
  .date-count { margin-left: auto; font-size: 13px; color: var(--sub); }

  /* Main */
  main { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .section-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--sub); margin-bottom: 14px; margin-top: 28px; }
  .section-header:first-child { margin-top: 0; }

  /* Cards grid */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); transition: box-shadow 0.15s, transform 0.1s; display: flex; flex-direction: column; gap: 10px; }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .card.hidden { display: none; }

  /* Card header */
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .card-title { font-size: 14px; font-weight: 700; line-height: 1.35; flex: 1; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .score-badge { flex-shrink: 0; font-size: 20px; font-weight: 800; min-width: 42px; text-align: right; }
  .score-badge.high { color: var(--score-high); }
  .score-badge.mid { color: var(--score-mid); }
  .score-badge.low { color: var(--score-low); }

  /* Meta row */
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .bucket-tag { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .bucket-tag.strong { background: var(--strong-bg); color: var(--strong); }
  .bucket-tag.weak { background: var(--weak-bg); color: var(--weak); }
  .domain-tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--tag-bg); color: var(--sub); }
  .date-tag { font-size: 11px; color: var(--sub); }
  .arxiv-link { font-size: 11px; color: var(--accent); text-decoration: none; background: var(--accent-light); padding: 2px 7px; border-radius: 4px; font-weight: 600; }
  .arxiv-link:hover { background: var(--accent); color: #fff; }

  /* Authors */
  .card-authors { font-size: 12px; color: var(--sub); }

  /* Toggle sections */
  .toggle-btn { background: none; border: 1px solid var(--border); border-radius: 5px; padding: 3px 9px; font-size: 12px; cursor: pointer; color: var(--sub); display: flex; align-items: center; gap: 4px; }
  .toggle-btn:hover { background: var(--tag-bg); }
  .toggle-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .collapsible { overflow: hidden; transition: max-height 0.25s ease; }
  .collapsible.open { max-height: 600px; }
  .collapsible.closed { max-height: 0; }

  /* Method */
  .method-box { background: #f9fafb; border-left: 3px solid var(--accent); padding: 10px 12px; border-radius: 0 6px 6px 0; font-size: 13px; }
  .method-box.zh { border-color: #7c3aed; background: #faf5ff; }
  .method-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--sub); margin-bottom: 4px; letter-spacing: 0.5px; }

  /* Score breakdown */
  .score-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  .score-table th { text-align: left; color: var(--sub); font-weight: 600; padding: 3px 6px; border-bottom: 1px solid var(--border); }
  .score-table td { padding: 3px 6px; border-bottom: 1px solid var(--border); }
  .score-bar-cell { display: flex; align-items: center; gap: 6px; }
  .score-bar { height: 6px; border-radius: 3px; background: var(--accent); flex-shrink: 0; }
  .total-row td { font-weight: 700; background: var(--accent-light); }

  /* Figure */
  .figure-box { background: #f9fafb; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 12px; }
  .figure-svg { width: 100%; height: auto; }

  /* Metrics */
  .metrics-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .metrics-table th { background: var(--tag-bg); padding: 4px 8px; text-align: left; font-weight: 600; }
  .metrics-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .metrics-table .gain { color: var(--score-high); font-weight: 700; }

  /* Code link */
  .code-link { font-size: 12px; background: #f0fdf4; color: #166534; padding: 5px 10px; border-radius: 5px; text-decoration: none; border: 1px solid #bbf7d0; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
  .code-link:hover { background: #dcfce7; }

  /* No results */
  .no-results { text-align: center; color: var(--sub); padding: 60px; font-size: 15px; }

  /* Footer */
  footer { text-align: center; color: var(--sub); font-size: 12px; padding: 24px; border-top: 1px solid var(--border); margin-top: 40px; }
</style>
</head>

    score_breakdown: [
      {dim: "Innovation", score: 22, max: 30},
      {dim: "SOTA Delta", score: 13, max: 15},
      {dim: "Exp Quality", score: 14, max: 15},
      {dim: "Efficiency", score: 9, max: 10},
      {dim: "Generalization", score: 5, max: 5},
      {dim: "Domain Relevance", score: 22, max: 25}
    ]
  }
];

// ──────────────── State ────────────────
let lang = "en";
let minScore = 0;
let filterDate = "2026-05-21";

function toggleLang() {
  lang = lang === "en" ? "zh" : "en";
  document.getElementById("langBtn").textContent = lang === "en" ? "中文" : "English";
  renderCards();
}

function updateScore(val) {
  minScore = parseInt(val);
  document.getElementById("score-display").textContent = val;
  filterCards();
}

function filterCards() {
  filterDate = document.getElementById("datePicker").value;
  renderCards();
}

function scoreClass(s) {
  if (s >= 80) return "high";
  if (s >= 65) return "mid";
  return "low";
}

function renderScoreBar(score, max) {
  const pct = Math.round((score / max) * 80);
  return `<div class="score-bar-cell"><div class="score-bar" style="width:${pct}px"></div><span>${score}/${max}</span></div>`;
}

function generateFigureSVG(paper) {
  // Simple flow diagram SVG for each paper
  const w = 300, h = 80;
  if (paper.arxiv_id === "2605.17366") {
    return `<svg viewBox="0 0 ${w} ${h}" class="figure-svg" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="20" width="60" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
      <text x="32" y="37" text-anchor="middle" font-size="8" fill="#1d4ed8">Image</text>
      <text x="32" y="49" text-anchor="middle" font-size="8" fill="#1d4ed8">Patches</text>
      <rect x="2" y="60" width="60" height="18" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
      <text x="32" y="73" text-anchor="middle" font-size="8" fill="#15803d">Metadata</text>
      <path d="M62 30 L80 30" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
      <path d="M62 69 L80 45" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
      <rect x="80" y="15" width="55" height="55" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
      <text x="107" y="37" text-anchor="middle" font-size="7.5" fill="#92400e">Hybrid</text>
      <text x="107" y="49" text-anchor="middle" font-size="7.5" fill="#92400e">Q-Former</text>
      <path d="M135 40 L155 40" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
      <rect x="155" y="20" width="50" height="40" rx="4" fill="#fdf4ff" stroke="#7c3aed" stroke-width="1"/>
      <text x="180" y="37" text-anchor="middle" font-size="7.5" fill="#6b21a8">RDGVM</text>
      <text x="180" y="49" text-anchor="middle" font-size="7.5" fill="#6b21a8">Gating</text>
      <path d="M205 40 L225 40" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
      <rect x="225" y="20" width="70" height="40" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
      <text x="260" y="37" text-anchor="middle" font-size="7.5" fill="#065f46">Item</text>
      <text x="260" y="49" text-anchor="middle" font-size="7.5" fill="#065f46">Embedding</text>
      <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#6b7280"/></marker></defs>
    </svg>`;
  }
  // Generic pipeline for other papers
  return `<svg viewBox="0 0 ${w} ${h}" class="figure-svg" xmlns="http://www.w3.org/2000/svg">
    <rect x="5" y="20" width="60" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
    <text x="35" y="44" text-anchor="middle" font-size="9" fill="#1d4ed8">Input</text>
    <path d="M65 40 L90 40" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr2)"/>
    <rect x="90" y="20" width="80" height="40" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="130" y="44" text-anchor="middle" font-size="9" fill="#92400e">Model</text>
    <path d="M170 40 L195 40" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr2)"/>
    <rect x="195" y="20" width="65" height="40" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <text x="227" y="44" text-anchor="middle" font-size="9" fill="#065f46">Output</text>
    <defs><marker id="arr2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#6b7280"/></marker></defs>
  </svg>`;
}

function buildCard(paper) {
  const scoreC = scoreClass(paper.score);
  const method = lang === "zh" ? paper.method_zh : paper.method_en;
  const innovation = lang === "zh" ? paper.innovation_zh : paper.innovation_en;
  const titleDisplay = lang === "zh" && paper.title_zh ? paper.title_zh : paper.title;
  const id = paper.arxiv_id.replace(".", "_");

  const metricsRows = paper.metrics.map(m =>
    `<tr><td>${m.dataset}</td><td>${m.metric}</td><td class="gain">${m.value}</td><td>${m.baseline}</td></tr>`
  ).join("");

  const scoreTotalRow = `<tr class="total-row"><td colspan="2"><b>Total / 总分</b></td><td colspan="2"><b>${paper.score} / 100</b></td></tr>`;
  const scoreRows = paper.score_breakdown.map(d =>
    `<tr><td>${d.dim}</td><td style="width:50px">${d.score}/${d.max}</td><td colspan="2">${renderScoreBar(d.score, d.max)}</td></tr>`
  ).join("");

  const githubLink = paper.github_url
    ? `<a class="code-link" href="https://github.com/Sam1224/CCReproduce/tree/main/${paper.github_url}">&#128196; Code Reproduction</a>`
    : '';
  const noteHtml = paper.note ? `<div style="font-size:11px;color:#9ca3af;font-style:italic">${paper.note}</div>` : '';

  return `
<div class="card" id="card_${id}" data-score="${paper.score}" data-date="${paper.date}">
  <div class="card-header">
    <div class="card-title"><a href="${paper.arxiv_url}" target="_blank">${titleDisplay}</a></div>
    <div class="score-badge ${scoreC}">${paper.score}</div>
  </div>
  <div class="card-meta">
    <span class="bucket-tag ${paper.bucket}">${paper.bucket.toUpperCase()}</span>
    ${paper.domains.map(d => `<span class="domain-tag">${d}</span>`).join("")}
    <span class="date-tag">📅 ${paper.date}</span>
    <a class="arxiv-link" href="${paper.arxiv_url}" target="_blank">arXiv:${paper.arxiv_id}</a>
  </div>
  <div class="card-authors">👥 ${paper.authors} · <em>${paper.affiliation}</em></div>
  ${noteHtml}
  <div class="toggle-row">
    <button class="toggle-btn" onclick="toggleSection('method_${id}')">📝 Method</button>
    <button class="toggle-btn" onclick="toggleSection('fig_${id}')">🖼 Figure</button>
    <button class="toggle-btn" onclick="toggleSection('metrics_${id}')">📊 Metrics</button>
    <button class="toggle-btn" onclick="toggleSection('score_${id}')">🎯 Score</button>
    ${githubLink}
  </div>

  <div class="collapsible closed" id="method_${id}">
    <div class="method-box ${lang === 'zh' ? 'zh' : ''}">
      <div class="method-label">${lang === 'zh' ? '方法概述' : 'Method Overview'}</div>
      ${method}
    </div>
    <div class="method-box" style="margin-top:8px;border-color:#7c3aed;background:#faf5ff">
      <div class="method-label">${lang === 'zh' ? '故事线' : 'Innovation'}</div>
      ${innovation}
    </div>
  </div>

  <div class="collapsible closed" id="fig_${id}">
    <div class="figure-box">${generateFigureSVG(paper)}</div>
  </div>

  <div class="collapsible closed" id="metrics_${id}">
    <table class="metrics-table">
      <thead><tr><th>Dataset</th><th>Metric</th><th>Result</th><th>Baseline</th></tr></thead>
      <tbody>${metricsRows}</tbody>
    </table>
  </div>

  <div class="collapsible closed" id="score_${id}">
    <table class="score-table">
      <thead><tr><th>Dimension</th><th>Score</th><th colspan="2">Bar</th></tr></thead>
      <tbody>${scoreRows}${scoreTotalRow}</tbody>
    </table>
  </div>
</div>`;
}

function toggleSection(id) {
  const el = document.getElementById(id);
  el.classList.toggle("open");
  el.classList.toggle("closed");
}

function renderCards() {
  const container = document.getElementById("cards-container");
  const noResults = document.getElementById("noResults");

  const filtered = PAPERS_DB.filter(p => {
    return p.score >= minScore && (filterDate === "" || p.date === filterDate);
  });

  // Group by bucket
  const strong = filtered.filter(p => p.bucket === "strong");
  const weak = filtered.filter(p => p.bucket === "weak");

  let html = "";
  if (strong.length) {
    html += `<div class="section-header">STRONG — Direct E-Commerce / Content Governance</div>`;
    html += `<div class="cards-grid">${strong.map(buildCard).join("")}</div>`;
  }
  if (weak.length) {
    html += `<div class="section-header">WEAK — High-Impact LLM/VLM (Transferable)</div>`;
    html += `<div class="cards-grid">${weak.map(buildCard).join("")}</div>`;
  }

  container.innerHTML = html;
  noResults.classList.toggle("hidden", filtered.length > 0);

  // Update count
  document.getElementById("dateCount").textContent =
    `Showing ${filtered.length} of ${PAPERS_DB.length} papers`;
}

// Populate date picker with available dates
function initDatePicker() {
  const dates = [...new Set(PAPERS_DB.map(p => p.date))].sort().reverse();
  // The native date input already handles this; just ensure our default value matches
  document.getElementById("datePicker").value = dates[0] || "2026-05-21";
  filterDate = dates[0] || "2026-05-21";
}

// Init
initDatePicker();
renderCards();
</script>
</body>
</html>
