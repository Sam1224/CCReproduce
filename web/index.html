<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCReproduce — Daily AI Paper Inspection</title>
<style>
  :root {
    --bg: #f5f4f0;
    --card-bg: #ffffff;
    --accent: #2d6a4f;
    --accent2: #40916c;
    --text: #1b1b1b;
    --muted: #666;
    --border: #ddd;
    --tag-strong: #1b4332;
    --tag-weak: #495057;
    --score-high: #155724;
    --score-med: #856404;
    --code-bg: #f8f8f2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); font-size: 15px; }
  header { background: var(--accent); color: #fff; padding: 24px 32px; }
  header h1 { font-size: 1.6rem; font-weight: bold; letter-spacing: 0.02em; }
  header p { margin-top: 6px; font-size: 0.9rem; opacity: 0.85; }
  .controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; padding: 16px 32px; background: #fff; border-bottom: 1px solid var(--border); }
  .controls label { font-size: 0.85rem; color: var(--muted); }
  .controls input[type=range] { width: 150px; accent-color: var(--accent); }
  .controls select, .controls input[type=text] {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 0.85rem; background: #fafafa;
  }
  .lang-toggle { margin-left: auto; }
  .lang-toggle button {
    padding: 5px 12px; border: 1px solid var(--accent); border-radius: 4px;
    background: transparent; color: var(--accent); cursor: pointer; font-size: 0.82rem;
  }
  .lang-toggle button.active { background: var(--accent); color: #fff; }
  .score-display { font-weight: bold; color: var(--accent); min-width: 40px; }
  main { max-width: 1400px; margin: 0 auto; padding: 24px 24px; }
  .date-section { margin-bottom: 32px; }
  .date-section h2 { font-size: 1.05rem; color: var(--muted); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
  .card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px; transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .card.hidden { display: none; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 0.95rem; font-weight: bold; line-height: 1.4; flex: 1; }
  .score-badge {
    font-size: 1.0rem; font-weight: bold; min-width: 42px; text-align: center;
    padding: 4px 8px; border-radius: 6px; white-space: nowrap;
  }
  .score-high { background: #d4edda; color: var(--score-high); }
  .score-med  { background: #fff3cd; color: var(--score-med); }
  .score-low  { background: #f0f0f0; color: #555; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
  .tag {
    font-size: 0.72rem; padding: 2px 8px; border-radius: 12px;
    white-space: nowrap;
  }
  .tag-strong { background: #d8f3dc; color: var(--tag-strong); border: 1px solid #b7e4c7; }
  .tag-weak   { background: #e9ecef; color: var(--tag-weak); border: 1px solid #ced4da; }
  .tag-domain { background: #e8f4f8; color: #2c5f7a; border: 1px solid #bee3f8; }
  .tag-code   { background: #fef0f6; color: #7b2d6b; border: 1px solid #f8c8e8; }
  .authors { font-size: 0.78rem; color: var(--muted); margin: 6px 0; }
  .method-section { margin-top: 12px; }
  .method-section h4 { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .method-text { font-size: 0.84rem; line-height: 1.55; }
  .method-text.zh { display: none; }
  .innovation-block { margin-top: 10px; background: #f9f9f5; border-left: 3px solid var(--accent2); padding: 8px 12px; border-radius: 0 4px 4px 0; font-size: 0.83rem; }
  .metrics-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
  .metrics-table th { background: #f5f5f5; padding: 5px 8px; text-align: left; font-weight: 600; border: 1px solid #eee; }
  .metrics-table td { padding: 5px 8px; border: 1px solid #eee; }
  .toggle-btn {
    font-size: 0.75rem; color: var(--accent); cursor: pointer; border: none;
    background: transparent; padding: 2px 0; text-decoration: underline; margin-top: 8px;
  }
  .toggleable { display: none; margin-top: 8px; }
  .toggleable.open { display: block; }
  .card-footer { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .card-footer a {
    font-size: 0.78rem; padding: 3px 10px; border: 1px solid var(--border);
    border-radius: 4px; text-decoration: none; color: var(--accent);
  }
  .card-footer a:hover { background: #f0f0f0; }
  .score-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 10px; }
  .score-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .date-stamp { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .figure-block { margin-top: 10px; background: #fdfdfd; border: 1px solid #eee; border-radius: 6px; padding: 10px; }
  .figure-block svg { width: 100%; height: auto; }
  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 40px; }
</style>
</head>

let currentLang = 'en';

function setLang(lang) {

  document.querySelectorAll('.method-text.en').forEach(el => {

  });
  document.querySelectorAll('.method-text.zh').forEach(el => {

  });

  });
  document.querySelectorAll('.inno-text.zh').forEach(el => {

function getScoreClass(score) {
  if (score >= 80) return 'score-high';
  if (score >= 60) return 'score-med';
  return 'score-low';
}

function makeSVGFigure(paper) {
  const labels = ['Innovation', 'SOTA', 'Quality', 'Efficiency', 'General.', 'Domain'];
  const maxes  = [30, 15, 15, 10, 5, 25];
  const values = [
    paper.scores.innovation, paper.scores.sota, paper.scores.quality,
    paper.scores.efficiency, paper.scores.generalization, paper.scores.domain
  ];
  const w = 280, h = 110, barH = 13, gap = 4, labelW = 72;
  const innerW = w - labelW - 4;
  const bars = values.map((v, i) => {
    const pct = v / maxes[i];
    const bw = Math.round(pct * innerW);
    const y = i * (barH + gap);
    return `
      <text x="0" y="${y + barH - 3}" fill="#666" font-size="9">${labels[i]}</text>
      <rect x="${labelW}" y="${y}" width="${innerW}" height="${barH}" rx="2" fill="#eee"/>
      <rect x="${labelW}" y="${y}" width="${bw}" height="${barH}" rx="2" fill="#2d6a4f" opacity="0.8"/>
      <text x="${labelW + bw + 3}" y="${y + barH - 3}" fill="#333" font-size="9">${v}/${maxes[i]}</text>
    `;
  }).join('');
  const totalH = values.length * (barH + gap);
  return `<svg viewBox="0 0 ${w} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="max-height:130px">${bars}</svg>`;
}

    `<tr><td>${m.dataset}</td><td>${m.metric}</td><td><strong>${m.value}</strong></td><td>${m.baseline}</td></tr>`

    <a href="https://github.com/Sam1224/CCReproduce/tree/main/2026-05-13/${paper.paperMD}" target="_blank">📝 Notes</a>
  </div>
</div>`;
}

function toggleSection(btn, type) {
  const next = btn.nextElementSibling;
  const isOpen = next.classList.contains('open');
  next.classList.toggle('open', !isOpen);
  const label = btn.textContent.replace(/^[▶▼] /, '');
  btn.textContent = (isOpen ? '▶ ' : '▼ ') + label;
}

function filterCards() {
  const minScore = parseInt(document.getElementById('scoreSlider').value);
  const dateFilter = document.getElementById('dateFilter').value;
  const bucketFilter = document.getElementById('bucketFilter').value;
  const search = document.getElementById('searchBox').value.toLowerCase();
  document.getElementById('scoreVal').textContent = minScore;

  document.querySelectorAll('.card').forEach(card => {
    const score = parseInt(card.dataset.score);
    const date = card.dataset.date;
    const bucket = card.dataset.bucket;
    const title = card.dataset.title;

    const show = score >= minScore
      && (!dateFilter || date === dateFilter)
      && (!bucketFilter || bucket === bucketFilter)
      && (!search || title.includes(search));

    card.classList.toggle('hidden', !show);
  });
}

function renderAll() {
  const byDate = {};
  PAPERS.forEach(p => {
    if (!byDate[p.date]) byDate[p.date] = [];
    byDate[p.date].push(p);
  });

  const container = document.getElementById('paperContainer');
  container.innerHTML = '';

  Object.keys(byDate).sort().reverse().forEach(date => {
    const section = document.createElement('div');
    section.className = 'date-section';
    section.innerHTML = `<h2>📅 ${date}</h2><div class="cards-grid">${byDate[date].map(renderCard).join('')}</div>`;
    container.appendChild(section);
  });
}

renderAll();
</script>
</body>
</html>
