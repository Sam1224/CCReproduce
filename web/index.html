      method_zh: "RePAIR直接学习缺陷RAG响应到错误缓解行动计划的映射，绕过预先定义细粒度错误分类体系的依赖。响应-行动学习范式对分类不对齐和不完整错误分类更鲁棒，解决了现有Agentic RAG Critic系统的核心痛点。",
      innovation_en: "Bypasses taxonomy alignment problem entirely through response-to-action learning. Simpler and more robust critic design for agentic RAG. Applicable to knowledge-intensive QA systems where error types are diverse.",
      innovation_zh: "通过响应到行动学习完全绕过分类对齐问题。更简单鲁棒的Agentic RAG Critic设计。适用于错误类型多样的知识密集型问答系统。",
      metrics: [
        ["Multiple QA benchmarks", "EM/F1", "↑ vs taxonomy RAG", "Agentic RAG w/ taxonomy"],
      ],
      score_breakdown: [
        ["Innovation", 16, 30],
        ["SOTA Delta", 7, 15],
        ["Exp. Quality", 8, 15],
        ["Efficiency", 5, 10],
        ["Generalization", 3, 5],
        ["Domain Relevance", 12, 25],
      ]
    },
  ]
};

// ===== State =====
let currentLang = 'en';
let minScore = 0;
let bucketFilter = 'all';
let currentDate = '2026-05-25';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === lang.toUpperCase()));
  document.querySelectorAll('.method-text, .innovation-text').forEach(el => {
    el.style.display = el.classList.contains(lang) ? 'block' : 'none';
  });
}

function renderScoreBar(breakdown) {
  return breakdown.map(([label, val, max]) => {
    const pct = Math.round(val / max * 100);
    return `<div class="score-bar-row">
      <div class="score-bar-label">${label}</div>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%"></div></div>
      <div class="score-bar-val">${val}/${max}</div>
    </div>`;
  }).join('');
}

function renderMetrics(metrics) {
  if (!metrics || !metrics.length) return '';
  const rows = metrics.map(([dataset, metric, val, baseline]) =>
    `<tr><td>${dataset}</td><td>${metric}</td><td><strong>${val}</strong></td><td style="color:#94a3b8">${baseline}</td></tr>`
  ).join('');
  return `<table class="metrics-table">
    <tr><th>Dataset</th><th>Metric</th><th>Ours</th><th>Baseline</th></tr>
    ${rows}
  </table>`;
}

function renderCard(paper) {
  const bucketClass = paper.bucket === 'STRONG' ? 'badge-strong' : 'badge-weak';
  const domainBadges = paper.domains.map(d => `<span class="badge badge-domain">${d}</span>`).join('');
  const codeBtn = paper.code ? `<a class="link-btn link-code" href="${paper.code}" target="_blank">⚡ Code</a>` : '';
  const scoreColor = paper.score >= 80 ? '#059669' : paper.score >= 70 ? '#2563eb' : '#64748b';

  return `<div class="card" data-score="${paper.score}" data-bucket="${paper.bucket}" data-date="${paper.date}">
    <div class="card-header">
      <div class="card-meta">
        <span class="badge ${bucketClass}">${paper.bucket}</span>
        <span class="badge badge-date">${paper.date}</span>
        ${domainBadges}
        <div class="score-ring" style="margin-left:auto">
          <div>
            <div class="score-num" style="color:${scoreColor}">${paper.score}</div>
            <div class="score-label">/ 100</div>
          </div>
        </div>
      </div>
      <h2>${paper.title}</h2>
      <div class="authors">${paper.authors} — <em>${paper.affiliation}</em></div>
    </div>
    <div class="card-body">
      <div class="section-label">Method Overview</div>
      <div class="method-text en">${paper.method_en}</div>
      <div class="method-text zh" style="display:none">${paper.method_zh}</div>

      <div class="section-label">Innovation</div>
      <div class="innovation-text en">${paper.innovation_en}</div>
      <div class="innovation-text zh" style="display:none">${paper.innovation_zh}</div>

      <div class="section-label" style="cursor:pointer;display:flex;align-items:center;gap:6px" onclick="toggleMetrics('${paper.id}')">
        Key Metrics <span id="metrics-arrow-${paper.id}">▶</span>
      </div>
      <div id="metrics-${paper.id}" style="display:none">${renderMetrics(paper.metrics)}</div>

      <div class="section-label score-bar-container" style="cursor:pointer;display:flex;align-items:center;gap:6px;margin-top:10px" onclick="toggleScore('${paper.id}')">
        Score Breakdown <span id="score-arrow-${paper.id}">▶</span>
      </div>
      <div id="score-bars-${paper.id}" class="score-bars">${renderScoreBar(paper.score_breakdown)}</div>
    </div>
    <div class="card-footer">
      <a class="link-btn link-arxiv" href="${paper.arxiv}" target="_blank">📄 arXiv</a>
      ${codeBtn}
    </div>
  </div>`;
}

function toggleMetrics(id) {
  const el = document.getElementById('metrics-' + id);
  const arrow = document.getElementById('metrics-arrow-' + id);
  const open = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  arrow.textContent = open ? '▼' : '▶';
}

function toggleScore(id) {
  const el = document.getElementById('score-bars-' + id);
  const arrow = document.getElementById('score-arrow-' + id);
  el.classList.toggle('open');
  arrow.textContent = el.classList.contains('open') ? '▼' : '▶';
}

function renderGrid() {
  const papers = PAPERS_DB[currentDate] || [];
  const filtered = papers.filter(p =>
    p.score >= minScore &&
    (bucketFilter === 'all' || p.bucket === bucketFilter)
  );

  const grid = document.getElementById('grid');
  const noResults = document.getElementById('no-results');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';
  grid.innerHTML = filtered.map(renderCard).join('');
  // Apply current lang
  setLang(currentLang);
}

// ===== Event listeners =====
document.getElementById('score-slider').addEventListener('input', function() {
  minScore = parseInt(this.value);
  document.getElementById('score-display').textContent = minScore;
  renderGrid();
});

document.getElementById('bucket-filter').addEventListener('change', function() {
  bucketFilter = this.value;
  renderGrid();
});

document.getElementById('date-picker').addEventListener('change', function() {
  currentDate = this.value;
  // Update stats
  const papers = PAPERS_DB[currentDate] || [];
  document.getElementById('stat-papers').textContent = papers.length;
  document.getElementById('stat-code').textContent = papers.filter(p => p.code && p.code.includes('CCReproduce')).length;
  renderGrid();
});

// Initial render
renderGrid();
</script>
</body>
</html>
