<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCReproduce — Daily AI Paper Inspection</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card-bg: #ffffff;
      --border: #e0e4ea;
      --accent: #3b5bdb;
      --accent2: #0ca678;
      --text: #1a1a2e;
      --muted: #6b7280;
      --strong-tag: #d1fae5;
      --strong-text: #065f46;
      --weak-tag: #dbeafe;
      --weak-text: #1e40af;
      --score-high: #15803d;
      --score-mid: #b45309;
      --score-low: #6b7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

    /* ── Header ── */
    header { background: var(--accent); color: #fff; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.3px; }
    header p { font-size: 0.82rem; opacity: 0.85; margin-top: 2px; }
    .lang-toggle { display: flex; gap: 6px; }
    .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 0.8rem; transition: background 0.2s; }
    .lang-btn.active, .lang-btn:hover { background: rgba(255,255,255,0.4); }

    /* ── Controls Bar ── */
    .controls { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; position: sticky; top: 0; z-index: 100; }
    .control-group { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--muted); }
    .control-group label { font-weight: 600; }
    input[type="range"] { width: 120px; accent-color: var(--accent); }
    #score-display { font-weight: 700; color: var(--accent); min-width: 28px; }
    select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.82rem; background: var(--bg); }
    .date-label { font-size: 0.82rem; color: var(--muted); }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

    /* ── Card ── */
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: box-shadow 0.2s, transform 0.15s; display: flex; flex-direction: column; }
    .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .card[hidden] { display: none !important; }

    .card-header { padding: 16px 18px 10px; }
    .card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .tag { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.5px; }
    .tag-strong { background: var(--strong-tag); color: var(--strong-text); }
    .tag-weak { background: var(--weak-tag); color: var(--weak-text); }
    .tag-domain { background: #f3e8ff; color: #6b21a8; }
    .date-tag { font-size: 0.7rem; color: var(--muted); }

    .score-badge { margin-left: auto; font-size: 1.05rem; font-weight: 800; }
    .score-high { color: var(--score-high); }
    .score-mid { color: var(--score-mid); }
    .score-low { color: var(--score-low); }

    .card-title { font-size: 0.97rem; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
    .card-authors { font-size: 0.75rem; color: var(--muted); margin-bottom: 2px; }
    .card-affil { font-size: 0.72rem; color: var(--muted); }

    .card-body { padding: 0 18px 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

    .section-toggle { cursor: pointer; user-select: none; font-size: 0.78rem; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 4px; background: none; border: none; padding: 0; }
    .section-toggle::after { content: '▼'; font-size: 0.65rem; transition: transform 0.2s; }
    .section-toggle.collapsed::after { transform: rotate(-90deg); }
    .section-content { font-size: 0.8rem; line-height: 1.55; color: #374151; }
    .section-content.hidden { display: none; }

    .method-en, .method-zh { display: none; }
    .method-en.show, .method-zh.show { display: block; }

    .metrics-block { background: #f9fafb; border-left: 3px solid var(--accent2); padding: 8px 12px; border-radius: 0 6px 6px 0; font-size: 0.78rem; }
    .metrics-block .metric-row { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; margin-bottom: 3px; }
    .metric-row:last-child { margin-bottom: 0; }
    .metric-dataset { font-weight: 600; color: var(--accent); }
    .metric-value { font-weight: 700; color: var(--score-high); }

    .score-breakdown { background: #f9fafb; border-radius: 8px; padding: 10px 12px; font-size: 0.75rem; }
    .score-breakdown h4 { font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .score-row:last-child { margin-bottom: 0; }
    .score-label { width: 140px; flex-shrink: 0; color: #374151; }
    .score-bar-wrap { flex: 1; background: var(--border); border-radius: 100px; height: 5px; }
    .score-bar { height: 5px; border-radius: 100px; background: var(--accent); }
    .score-num { font-weight: 700; min-width: 38px; text-align: right; color: var(--text); }

    .card-footer { padding: 10px 18px 14px; display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .btn { font-size: 0.75rem; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 600; transition: background 0.15s; }
    .btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-paper { border-color: var(--accent); }

    /* ── Methodology Figure ── */
    .fig-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: #fff; }
    .fig-svg { width: 100%; display: block; }

    /* ── Empty State ── */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; }

    @media (max-width: 600px) {
      .grid { padding: 16px; gap: 14px; }
      header { padding: 14px 16px; }
      .controls { padding: 10px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>CCReproduce — Daily AI Paper Inspection</h1>
    <p>E-commerce Content Ecosystem &amp; Influencer Governance · LLM / VLM / MLLM · Content Moderation</p>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">中文</button>
  </div>
</header>

<div class="controls">
  <div class="control-group">
    <label>Min Score:</label>
    <input type="range" id="score-slider" min="0" max="100" value="0" oninput="filterCards()" />
    <span id="score-display">0</span>
  </div>
  <div class="control-group">
    <label>Date:</label>
    <select id="date-picker" onchange="filterCards()">
      <option value="all">All Dates</option>
      <option value="2026-06-02" selected>2026-06-02</option>
    </select>
  </div>
  <div class="control-group">
    <label>Bucket:</label>
    <select id="bucket-filter" onchange="filterCards()">
      <option value="all">All</option>
      <option value="STRONG">STRONG</option>
      <option value="WEAK">WEAK</option>
    </select>
  </div>
  <div class="date-label" id="result-count"></div>
</div>

<div class="grid" id="grid">
</div>

    method_en: "PaSBench-Video builds a 740-video streaming benchmark (481 risk + 259 no-risk) across driving, healthcare, daily life, and industrial domains. Risk videos are annotated with frame-level onset and accident boundaries. Models must observe videos causally (no future peeking) and produce warnings that are both temporally calibrated and content-correct. Three progressively stricter metrics: Detection Hit → Timed-Hit → Content-Grounded Accuracy. 13 MLLMs evaluated; no model exceeds 20% on the strictest metric.",

    innov_en: "First benchmark specifically testing proactive safety warning in streaming video. Fills gap in timing precision and false-positive measurement. Reveals current MLLMs rely on surface scene cues rather than risk reasoning.",
    innov_zh: "全球首个流式主动安全告警基准，填补时间精度和误报率评测空白。揭示现有MLLM依赖表面场景线索，无法真正推理风险是否会升级。",

    scores: [

    method_en: "ExpWeaver moves agent experience learning from explicit text space to the LLM's own latent space. Experiences are encoded as hidden-state vectors. At each decoding step, the current hidden state queries the experience bank via learned similarity; retrieved vectors are aggregated via cross-attention and injected through gated residuals. The full pipeline is optimized end-to-end with reinforcement learning. No separate RAG module needed, reducing token overhead.",

    innov_zh: "全球首次在 LLM 潜在空间逐解码步做经验检索；消除独立 RAG 模块；端到端 RL 联合优化检索与生成；12/13 任务 SOTA，平均领先 >6.8%。",

    method_en: "RCEM distills LLM query-rewriting capability into the embedding model via alignment training: conversational-query embeddings are aligned to rewritten-query embeddings (which are more robust under distribution shift). At inference, no explicit LLM rewriting is needed. Training requires only (dialogue, rewritten-query) pairs — no conversation-to-document relevance labels. Evaluated on QReCC, TopiOCQA, and TREC CAsT.",

    innov_zh: "创新：将 LLM 改写能力蒸馏至 embedding 层而非轻量 LM；推理零改写开销；专项解决分布偏移鲁棒性；分布偏移下 Recall@10 最高 +20%。",

    link: "https://arxiv.org/abs/2606.02502",
    tags: ["MLLM", "Continual Learning", "MoE", "Instruction Tuning"],
    method_en: "CRAM addresses Multimodal Continual Instruction Tuning (MCIT): shared parameters cause forgetting; dedicated modules per task cause parameter explosion. Solution: (1) Centroid Routing clusters task samples and routes new inputs to the nearest-centroid expert, naturally isolating task interference; (2) Adaptive Rank MoE allocates LoRA rank proportional to the capability gap between current expertise and new task demands.",
    method_zh: "CRAM 解决 MCIT 两难：共享参数遗忘 vs 专用模块爆炸。(1) 质心路由：对任务样本聚类，新输入路由至最近质心专家，自然隔离干扰；(2) 自适应秩 MoE：根据能力差距动态分配 LoRA 秩，避免参数浪费。两者结合首次同时实现无遗忘+参数可控。",

    innov_zh: "质心路由比可学习门控更稳定且无需任务标签；自适应秩 MoE 是 MCIT 新方向；首次在 MLLM 任务流上同时实现无遗忘与参数可控。",

    authors: "Xiaolin Liu, Yilun Zhu, Xiangyu Zhao, Xuehui Wang, Yan Li, Xin Li, Haoyu Cao, Xing Sun, Shaofeng Zhang, Xu Yang, Zhihang Zhong, Xue Yang",
    affil: "Multiple institutions (includes ByteDance Seed contributors)",
    link: "https://arxiv.org/abs/2606.02522",

/* ─── State ─── */
let currentLang = 'en';

/* ─── Language ─── */
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
  document.querySelectorAll('.method-en, .method-zh').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.method-' + lang).forEach(el => el.classList.add('show'));
}

/* ─── Score Color ─── */
function scoreClass(s) {
  if (s >= 80) return 'score-high';
  if (s >= 60) return 'score-mid';
  return 'score-low';
}

/* ─── Build Cards ─── */
function buildCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  papers.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.score = p.score;
    card.dataset.date = p.date;
    card.dataset.bucket = p.bucket;

    const scoreC = scoreClass(p.score);
    const tagsHTML = p.tags.map(t => `<span class="tag tag-domain">${t}</span>`).join('');
    const metricsHTML = p.metrics.map(m =>
      `<div class="metric-row"><span class="metric-dataset">${m.dataset}</span><span>${m.metric}:</span><span class="metric-value">${m.best}</span></div>`
    ).join('');
    const scoresHTML = p.scores.map(s =>
      `<div class="score-row"><span class="score-label">${s.label}</span><div class="score-bar-wrap"><div class="score-bar" style="width:${Math.round(s.val/s.max*100)}%"></div></div><span class="score-num">${s.val}/${s.max}</span></div>`
    ).join('');

    card.innerHTML = `
      <div class="card-header">
        <div class="card-meta">
          <span class="tag ${p.bucket==='STRONG'?'tag-strong':'tag-weak'}">${p.bucket}</span>
          ${tagsHTML}
          <span class="date-tag">${p.date}</span>
          <span class="score-badge ${scoreC}">${p.score}</span>
        </div>
        <div class="card-title">${p.title}</div>
        <div class="card-authors">${p.authors}</div>
        <div class="card-affil">${p.affil}</div>
      </div>
      <div class="card-body">
        <!-- Figure -->
        <div class="fig-wrap">${makeFig(p)}</div>

        <!-- Method -->
        <div>
          <button class="section-toggle" onclick="toggleSection(this)">Method Overview</button>
          <div class="section-content">
            <div class="method-en ${currentLang==='en'?'show':''}">${p.method_en}</div>
            <div class="method-zh ${currentLang==='zh'?'show':''}">${p.method_zh}</div>
          </div>
        </div>

        <!-- Innovation -->
        <div>
          <button class="section-toggle collapsed" onclick="toggleSection(this)">Innovation</button>
          <div class="section-content hidden">
            <div class="method-en ${currentLang==='en'?'show':''}">${p.innov_en}</div>
            <div class="method-zh ${currentLang==='zh'?'show':''}">${p.innov_zh}</div>
          </div>
        </div>

        <!-- Key Metrics -->
        <div>
          <button class="section-toggle collapsed" onclick="toggleSection(this)">Key Metrics</button>
          <div class="section-content hidden">
            <div class="metrics-block">${metricsHTML}</div>
          </div>
        </div>

        <!-- Score Breakdown -->
        <div>
          <button class="section-toggle collapsed" onclick="toggleSection(this)">Score Breakdown</button>
          <div class="section-content hidden">
            <div class="score-breakdown">
              <h4>Scoring (Total: ${p.score}/100)</h4>
              ${scoresHTML}
            </div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <a class="btn btn-paper" href="${p.link}" target="_blank">📄 Paper</a>
      </div>
    `;
    grid.appendChild(card);
  });

  filterCards();
}

/* ─── Toggle Section ─── */
function toggleSection(btn) {
  btn.classList.toggle('collapsed');
  const content = btn.nextElementSibling;
  content.classList.toggle('hidden');
}

/* ─── Filter ─── */
function filterCards() {
  const minScore = parseInt(document.getElementById('score-slider').value);
  document.getElementById('score-display').textContent = minScore;
  const dateFilter = document.getElementById('date-picker').value;
  const bucketFilter = document.getElementById('bucket-filter').value;

  let shown = 0;
  document.querySelectorAll('.card').forEach(card => {
    const s = parseInt(card.dataset.score);
    const d = card.dataset.date;
    const b = card.dataset.bucket;
    const ok = s >= minScore
      && (dateFilter === 'all' || d === dateFilter)
      && (bucketFilter === 'all' || b === bucketFilter);
    card.hidden = !ok;
    if (ok) shown++;
  });

  document.getElementById('result-count').textContent = `${shown} paper${shown !== 1 ? 's' : ''} shown`;

  const grid = document.getElementById('grid');
  let empty = grid.querySelector('.empty-state');
  if (shown === 0) {
    if (!empty) {
      empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No papers match the current filters.';
      grid.appendChild(empty);
    }
  } else {
    if (empty) empty.remove();
  }
}

/* ─── Init ─── */
buildCards();
setLang('en');
