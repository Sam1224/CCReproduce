<style>
  :root {
    --bg: #f8f9fb;
    --surface: #ffffff;

    --text: #1e293b;

    --accent: #3b82f6;
    --accent-light: #eff6ff;
    --strong: #10b981;
    --strong-light: #ecfdf5;
    --weak: #f59e0b;
    --weak-light: #fffbeb;
    --code-bg: #f1f5f9;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .logo { font-size: 1.1rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .domain-tag { background: var(--accent-light); color: var(--accent); font-size: .75rem; padding: .2rem .6rem; border-radius: 999px; font-weight: 500; }
  .controls { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; margin-left: auto; }
  .lang-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: .25rem .75rem; cursor: pointer; font-size: .85rem; transition: all .15s; }
  .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .lang-btn:hover:not(.active) { background: var(--accent-light); }
  .filter-row { display: flex; gap: .5rem; align-items: center; font-size: .85rem; }
  #scoreSlider { width: 120px; accent-color: var(--accent); }
  #scoreVal { font-weight: 600; color: var(--accent); min-width: 2ch; }
  #datePicker { border: 1px solid var(--border); border-radius: 6px; padding: .25rem .5rem; font-size: .85rem; }

  /* Main layout */
  main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }
  .stats-bar { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; font-size: .85rem; color: var(--text-muted); flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .4rem .9rem; }
  .stat strong { color: var(--text); }

  /* Paper grid */
  .paper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.25rem; }

  /* Paper card */
  .paper-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; transition: box-shadow .15s, transform .15s; }
  .paper-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .card-header { padding: 1rem 1.25rem .75rem; border-bottom: 1px solid var(--border); }
  .card-tags { display: flex; gap: .4rem; margin-bottom: .5rem; flex-wrap: wrap; }
  .tag { font-size: .7rem; padding: .15rem .5rem; border-radius: 999px; font-weight: 500; }
  .tag-strong { background: var(--strong-light); color: var(--strong); }
  .tag-weak { background: var(--weak-light); color: var(--weak); }
  .tag-domain { background: var(--accent-light); color: var(--accent); }
  .tag-code { background: #fdf4ff; color: #9333ea; }
  .paper-title { font-size: .95rem; font-weight: 600; line-height: 1.4; margin-bottom: .4rem; }
  .paper-title a { color: var(--text); text-decoration: none; }
  .paper-title a:hover { color: var(--accent); }
  .paper-meta { font-size: .78rem; color: var(--text-muted); }
  .card-body { padding: .75rem 1.25rem; }

  /* Score badge */
  .score-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
  .score-badge { font-size: 1.1rem; font-weight: 700; width: 3rem; height: 3rem; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .score-high { background: #dcfce7; color: #16a34a; }
  .score-mid { background: #fff7ed; color: #c2410c; }
  .score-low { background: var(--accent-light); color: var(--accent); }
  .score-breakdown { flex: 1; }
  .score-bars { display: grid; grid-template-columns: auto 1fr auto; gap: .15rem .5rem; font-size: .72rem; align-items: center; }
  .score-label { color: var(--text-muted); white-space: nowrap; }
  .score-bar-bg { background: var(--border); border-radius: 999px; height: 5px; }
  .score-bar-fill { height: 5px; border-radius: 999px; background: var(--accent); transition: width .3s; }
  .score-num { color: var(--text-muted); font-size: .7rem; }

  /* Method overview */
  .section-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; margin-bottom: .4rem; }
  .section-label { font-size: .78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
  .toggle-icon { font-size: .7rem; transition: transform .2s; }
  .toggle-icon.open { transform: rotate(180deg); }
  .collapsible { overflow: hidden; transition: max-height .3s ease; }
  .method-text { font-size: .83rem; color: var(--text-muted); line-height: 1.55; }

  /* Metrics table */
  .metrics-table { width: 100%; border-collapse: collapse; font-size: .8rem; margin-top: .5rem; }
  .metrics-table th { background: var(--code-bg); color: var(--text-muted); font-weight: 600; padding: .3rem .6rem; text-align: left; }
  .metrics-table td { padding: .25rem .6rem; border-bottom: 1px solid var(--border); }
  .metrics-table tr:last-child td { border-bottom: none; }

  /* Figure placeholder */
  .figure-box { background: var(--code-bg); border: 1px dashed var(--border); border-radius: 8px; padding: 1rem; margin: .75rem 0; font-size: .78rem; color: var(--text-muted); }
  .figure-svg { width: 100%; max-height: 160px; }

  /* GitHub link */
  .card-footer { padding: .6rem 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .gh-link { font-size: .75rem; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: .3rem; }
  .gh-link:hover { text-decoration: underline; }
  .date-badge { font-size: .72rem; color: var(--text-muted); }

  /* Source coverage table */
  .coverage-section { margin-bottom: 2rem; }
  .coverage-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: .75rem; color: var(--text-muted); }
  .coverage-table { width: 100%; border-collapse: collapse; font-size: .8rem; background: var(--surface); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .coverage-table th { background: var(--code-bg); padding: .5rem .75rem; text-align: left; font-weight: 600; color: var(--text-muted); }
  .coverage-table td { padding: .4rem .75rem; border-bottom: 1px solid var(--border); }
  .coverage-table tr:last-child td { border-bottom: none; }
  .status-ok { color: var(--strong); font-weight: 600; }
  .status-err { color: #ef4444; }
  .status-na { color: var(--text-muted); }

  /* No results */
  .no-results { text-align: center; padding: 3rem; color: var(--text-muted); }

  /* Responsive */
  @media (max-width: 640px) {
    header { padding: .75rem 1rem; }
    main { padding: 1rem .75rem 2rem; }
    .paper-grid { grid-template-columns: 1fr; }
  }
</style>

// ── State ─────────────────────────────────────────────────────────────────────
let currentLang = 'zh';
let currentDate = '2026-06-13';
let scoreThreshold = 40;
let expandedSections = {};

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  renderPapers();
}

// ── Init date picker ──────────────────────────────────────────────────────────
function initDatePicker() {
  const sel = document.getElementById('datePicker');
  Object.keys(DB).sort().reverse().forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    if (d === currentDate) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', e => {
    currentDate = e.target.value;
    renderAll();
  });
}

// ── Score slider ──────────────────────────────────────────────────────────────
document.getElementById('scoreSlider').addEventListener('input', e => {
  scoreThreshold = +e.target.value;
  document.getElementById('scoreVal').textContent = scoreThreshold;
  renderPapers();
});

// ── Render helpers ────────────────────────────────────────────────────────────
function scoreClass(s) {
  if (s >= 80) return 'score-high';
  if (s >= 65) return 'score-mid';
  return 'score-low';
}

function renderBar(val, max) {
  const pct = Math.round((val / max) * 100);
  return `<div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div>`;
}

function domainTag(d) {
  return `<span class="tag tag-domain">${d}</span>`;
}

function bucketTag(b) {
  return b === 'STRONG'
    ? `<span class="tag tag-strong">STRONG</span>`
    : `<span class="tag tag-weak">WEAK</span>`;
}

function renderScoreBreakdown(s) {
  const rows = [
    ['创新性/Innovation', s.innovation, 30],
    ['实验指标/Results', s.results, 15],
    ['实验质量/Quality', s.quality, 15],
    ['效率/Efficiency', s.efficiency, 10],
    ['泛化/Generalization', s.generalization, 5],
    ['相关性/Relevance', s.relevance, 25],
  ];
  return `<div class="score-bars">` + rows.map(([label, val, max]) =>
    `<span class="score-label">${label}</span>${renderBar(val, max)}<span class="score-num">${val}/${max}</span>`
  ).join('') + `</div>`;
}

function renderMetricsTable(metrics) {
  if (!metrics || !metrics.length) return '';
  return `<table class="metrics-table">
    <thead><tr><th>Metric</th><th>Value</th></tr></thead>
    <tbody>${metrics.map(m => `<tr><td>${m.name}</td><td><strong>${m.val}</strong></td></tr>`).join('')}</tbody>
  </table>`;
}

function makeSVGFigure(p) {
  // Generate a simple SVG module flow diagram
  const cols = p.domains.slice(0, 3);
  const w = 340, h = 120;
  const boxW = 90, boxH = 36, gap = (w - cols.length * boxW) / (cols.length + 1);
  const boxes = cols.map((d, i) => {
    const x = gap + i * (boxW + gap);
    const y = (h - boxH) / 2;
    return `<rect x="${x}" y="${y}" width="${boxW}" height="${boxH}" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="${x + boxW/2}" y="${y + boxH/2 + 5}" text-anchor="middle" font-size="11" fill="#1e40af">${d}</text>`;
  });
  const arrows = cols.slice(0,-1).map((_, i) => {
    const x1 = gap + i * (boxW + gap) + boxW;
    const x2 = gap + (i+1) * (boxW + gap);
    const y = h / 2;
    return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>`;
  });
  return `<svg class="figure-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker></defs>
    <text x="${w/2}" y="16" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">${p.title.substring(0,50)}${p.title.length > 50 ? '…':''}</text>
    ${boxes.join('')}${arrows.join('')}
  </svg>`;
}

function toggleSection(id) {
  expandedSections[id] = !expandedSections[id];
  const el = document.getElementById('sec-' + id);
  const icon = document.getElementById('icon-' + id);
  if (expandedSections[id]) {
    el.style.maxHeight = el.scrollHeight + 'px';
    icon.classList.add('open');
  } else {
    el.style.maxHeight = '0';
    icon.classList.remove('open');
  }
}

function renderCard(p) {
  const secId = p.id + '-method';
  const metricsId = p.id + '-metrics';
  const figId = p.id + '-fig';

  if (!(secId in expandedSections)) expandedSections[secId] = false;
  if (!(metricsId in expandedSections)) expandedSections[metricsId] = false;
  if (!(figId in expandedSections)) expandedSections[figId] = false;

  const method = currentLang === 'zh' ? p.method_zh : p.method_en;
  const innovation = currentLang === 'zh' ? p.innovation_zh : p.innovation_en;
  const rationale = currentLang === 'zh' ? p.rationale_zh : p.rationale_en;

  return `<div class="paper-card" data-score="${p.score}" data-bucket="${p.bucket}">
    <div class="card-header">
      <div class="card-tags">
        ${bucketTag(p.bucket)}
        ${p.domains.map(domainTag).join('')}
        ${p.code ? '<span class="tag tag-code">★ Code</span>' : ''}
      </div>
      <div class="paper-title"><a href="${p.link}" target="_blank">${p.title}</a></div>
      <div class="paper-meta">${p.authors} · ${p.affiliation}</div>
    </div>

    <div class="card-body">
      <!-- Score -->
      <div class="score-row">
        <div class="score-badge ${scoreClass(p.score)}">${p.score}</div>
        <div class="score-breakdown">${renderScoreBreakdown(p.scores)}</div>
      </div>
      <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.75rem;font-style:italic">${rationale}</div>

      <!-- Figure -->
      <div class="section-toggle" onclick="toggleSection('${figId}')">
        <span class="section-label">📊 ${currentLang==='zh'?'方法示意':'Method Diagram'}</span>
        <span class="toggle-icon" id="icon-${figId}">▾</span>
      </div>
      <div class="collapsible" id="sec-${figId}" style="max-height:0">
        <div class="figure-box">${makeSVGFigure(p)}</div>
      </div>

      <!-- Method -->
      <div class="section-toggle" onclick="toggleSection('${secId}')">
        <span class="section-label">🔬 ${currentLang==='zh'?'方法概述 / 创新点':'Method & Innovation'}</span>
        <span class="toggle-icon" id="icon-${secId}">▾</span>
      </div>
      <div class="collapsible" id="sec-${secId}" style="max-height:0">
        <p class="method-text">${method}</p>
        <p class="method-text" style="margin-top:.5rem"><strong>${currentLang==='zh'?'创新性：':'Innovation: '}</strong>${innovation}</p>
      </div>

      <!-- Metrics -->
      <div class="section-toggle" onclick="toggleSection('${metricsId}')">
        <span class="section-label">📈 ${currentLang==='zh'?'关键指标':'Key Metrics'}</span>
        <span class="toggle-icon" id="icon-${metricsId}">▾</span>
      </div>
      <div class="collapsible" id="sec-${metricsId}" style="max-height:0">
        ${renderMetricsTable(p.metrics)}
      </div>
    </div>

    <div class="card-footer">
      <a class="gh-link" href="https://github.com/Sam1224/CCReproduce/tree/main/${p.code || ''}" target="_blank">
        ${p.code ? '🔗 Code: ' + p.code : '🔗 ' + p.link}
      </a>
      <span class="date-badge">${p.date}</span>
    </div>
  </div>`;
}

function renderCoverage(sources) {
  const rows = sources.map(s => {
    const statusClass = s.status.startsWith('200') || s.status.includes('OK') ? 'status-ok' :
                        s.status === 'not yet active' || s.attempted === 'no' ? 'status-na' : 'status-err';
    return `<tr>
      <td>${s.source}</td>
      <td><code>${s.cat}</code></td>
      <td>${s.attempted === 'yes' ? '✓' : '—'}</td>
      <td class="${statusClass}">${s.status}</td>
      <td><strong>${s.yielded}</strong></td>
    </tr>`;
  }).join('');
  return `<div class="coverage-section">
    <h2>📡 Source Coverage — ${currentDate}</h2>
    <table class="coverage-table">
      <thead><tr><th>Source</th><th>Category</th><th>Attempted</th><th>HTTP Status / Error</th><th>Candidates</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderPapers() {
  const data = DB[currentDate];
  if (!data) { document.getElementById('paperGrid').innerHTML = ''; return; }

  const papers = data.papers.filter(p => p.score >= scoreThreshold);
  const grid = document.getElementById('paperGrid');
  const noResults = document.getElementById('noResults');

  if (papers.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
  } else {
    noResults.style.display = 'none';
    grid.innerHTML = papers.map(renderCard).join('');
    // Re-expand any sections that were open
    Object.entries(expandedSections).forEach(([id, open]) => {
      if (open) {
        const el = document.getElementById('sec-' + id);
        if (el) el.style.maxHeight = el.scrollHeight + 1000 + 'px';
      }
    });
  }

  // Stats
  const statsBar = document.getElementById('statsBar');
  const totalPapers = data.papers.length;
  const highScore = data.papers.filter(p => p.score >= 80).length;
  const strong = data.papers.filter(p => p.bucket === 'STRONG').length;
  statsBar.innerHTML = `
    <div class="stat">📅 <strong>${currentDate}</strong></div>
    <div class="stat">📄 <strong>${totalPapers}</strong> papers</div>
    <div class="stat">⭐ <strong>${highScore}</strong> score≥80 (with code)</div>
    <div class="stat">🎯 <strong>${strong}</strong> STRONG candidates</div>
    <div class="stat">Showing <strong>${papers.length}</strong> / ${totalPapers}</div>
  `;
}

function renderAll() {
  const data = DB[currentDate];
  if (!data) return;
  document.getElementById('coverageSection').innerHTML = renderCoverage(data.sources);
  renderPapers();
}

initDatePicker();
renderAll();
</script>
