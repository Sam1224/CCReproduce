<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCReproduce — Daily AI Paper Inspection</title>
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --border: #e2e6ea;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --strong-tag: #059669;
    --weak-tag: #d97706;
    --score-high: #059669;
    --score-mid: #2563eb;
    --score-low: #6b7280;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .header-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .lang-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
  .lang-btn.active, .lang-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

  /* Controls bar */
  .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .control-group { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .control-group label { color: var(--text-muted); white-space: nowrap; }
  input[type=range] { width: 140px; accent-color: var(--accent); }
  select, input[type=date] { padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--surface); color: var(--text); }
  .score-display { font-weight: 600; color: var(--accent); min-width: 28px; }

  /* Stats bar */
  .stats { background: var(--accent-light); padding: 8px 24px; font-size: 12px; color: var(--accent); display: flex; gap: 16px; flex-wrap: wrap; }
  .stat { font-weight: 500; }

  /* Main grid */
  main { padding: 20px 24px; }
  .papers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  /* Paper card */
  .paper-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; gap: 10px; }
  .paper-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

  /* Card header */
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
  .score-badge { font-size: 18px; font-weight: 700; min-width: 36px; text-align: right; flex-shrink: 0; }
  .score-badge.high { color: var(--score-high); }
  .score-badge.mid { color: var(--score-mid); }
  .score-badge.low { color: var(--score-low); }

  /* Card meta */
  .card-meta { font-size: 11px; color: var(--text-muted); }
  .card-meta .authors { margin-bottom: 2px; }

  /* Tags */
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .tag-bucket-STRONG { background: #d1fae5; color: var(--strong-tag); }
  .tag-bucket-WEAK { background: #fef3c7; color: var(--weak-tag); }
  .tag-domain { background: #e0e7ff; color: #3730a3; }

  /* Method overview */
  .card-method { font-size: 13px; line-height: 1.55; color: #374151; }

  /* Innovation */
  .card-innovation { font-size: 12px; background: #f9fafb; border-left: 3px solid var(--accent); padding: 8px 10px; border-radius: 0 6px 6px 0; color: #374151; }

  /* Metrics */
  .card-metrics { font-size: 12px; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 8px 10px; border-radius: 6px; color: #065f46; font-family: 'JetBrains Mono', monospace; }

  /* Score breakdown toggle */
  .toggle-btn { font-size: 11px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; text-underline-offset: 2px; }
  .score-breakdown { display: none; margin-top: 4px; }
  .score-breakdown.visible { display: block; }
  .score-bar { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 11px; }
  .score-bar-label { width: 100px; color: var(--text-muted); flex-shrink: 0; }
  .score-bar-track { flex: 1; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
  .score-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }
  .score-bar-value { width: 32px; text-align: right; color: var(--text); font-weight: 500; }

  /* Figure toggle */
  .figure-section { display: none; }
  .figure-section.visible { display: block; }

  /* Links */
  .card-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; padding-top: 4px; }
  .card-link { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 500; text-decoration: none; transition: opacity 0.15s; }
  .card-link:hover { opacity: 0.8; }
  .link-paper { background: #eff6ff; color: var(--accent); border: 1px solid #bfdbfe; }
  .link-code { background: #f0fdf4; color: #059669; border: 1px solid #bbf7d0; }
  .link-model { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }

  /* Date stamp */
  .date-stamp { font-size: 10px; color: var(--text-muted); }

  /* No results */
  .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 15px; }

  /* Figure SVG */
  .method-figure { margin: 8px 0; background: #f8f9fa; border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
  .method-figure svg { width: 100%; height: auto; }

  @media (max-width: 640px) {
    header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .controls { flex-direction: column; align-items: flex-start; }
    .papers-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📄 CCReproduce Daily Paper Inspection</h1>
    <div class="subtitle">电商内容生态 & 达人治理 · E-Commerce Content Ecosystem & Influencer Governance</div>
  </div>
  <div class="header-controls">
    <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
  </div>
</header>

<div class="controls">
  <div class="control-group">
    <label id="label-date">日期 / Date:</label>
    <select id="date-picker" onchange="filterCards()">
      <option value="all">All Dates</option>
    </select>
  </div>
  <div class="control-group">
    <label id="label-score">最低分 / Min Score:</label>
    <input type="range" id="score-slider" min="0" max="100" value="0" oninput="onScoreSlide(this.value)">
    <span class="score-display" id="score-val">0</span>
  </div>
  <div class="control-group">
    <label id="label-bucket">类别 / Bucket:</label>
    <select id="bucket-filter" onchange="filterCards()">
      <option value="all">All</option>
      <option value="STRONG">STRONG</option>
      <option value="WEAK">WEAK</option>
    </select>
  </div>
</div>

<div class="stats" id="stats-bar">
  <span class="stat" id="stat-total">Loading...</span>
</div>

<main>
  <div class="papers-grid" id="papers-grid"></div>
  <div class="no-results" id="no-results" style="display:none">
    <span id="no-results-text">No papers match the current filters.</span>
  </div>
</main>

<script>
// ─── Data ────────────────────────────────────────────────────────────────────
let PAPERS = [];
let lang = 'zh';

// ─── Language ─────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.getElementById('btn-zh').classList.toggle('active', l === 'zh');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  renderCards(getFilteredPapers());
}

// ─── Score slider ──────────────────────────────────────────────────────────────
function onScoreSlide(v) {
  document.getElementById('score-val').textContent = v;
  filterCards();
}

// ─── Filtering ─────────────────────────────────────────────────────────────────
function getFilteredPapers() {
  const minScore = parseInt(document.getElementById('score-slider').value);
  const dateFilter = document.getElementById('date-picker').value;
  const bucketFilter = document.getElementById('bucket-filter').value;

  return PAPERS.filter(p => {
    if (p.score < minScore) return false;
    if (dateFilter !== 'all' && p.date !== dateFilter) return false;
    if (bucketFilter !== 'all' && p.bucket !== bucketFilter) return false;
    return true;
  });
}

function filterCards() {
  const filtered = getFilteredPapers();
  renderCards(filtered);
}

// ─── Scoring bar ───────────────────────────────────────────────────────────────
const SCORE_DIMS = [
  { key: 'innovation', labelZh: '创新性', labelEn: 'Innovation', max: 30 },
  { key: 'sota_delta', labelZh: 'SOTA提升', labelEn: 'SOTA Delta', max: 15 },
  { key: 'exp_quality', labelZh: '实验质量', labelEn: 'Exp Quality', max: 15 },
  { key: 'efficiency', labelZh: '效率', labelEn: 'Efficiency', max: 10 },
  { key: 'generalization', labelZh: '泛化性', labelEn: 'Generalization', max: 5 },
  { key: 'domain_relevance', labelZh: '领域相关性', labelEn: 'Domain Relevance', max: 25 },
];

function renderScoreBreakdown(scoring, uid) {
  return `
    <button class="toggle-btn" onclick="toggleBreakdown('${uid}')">${lang==='zh'?'▾ 评分详情':'▾ Score Breakdown'}</button>
    <div class="score-breakdown" id="breakdown-${uid}">
      ${SCORE_DIMS.map(d => {
        const v = scoring[d.key] || 0;
        const pct = Math.round(v / d.max * 100);
        const label = lang === 'zh' ? d.labelZh : d.labelEn;
        return `<div class="score-bar">
          <span class="score-bar-label">${label}</span>
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%"></div></div>
          <span class="score-bar-value">${v}/${d.max}</span>
        </div>`;
      }).join('')}
    </div>`;
}

function toggleBreakdown(uid) {
  const el = document.getElementById(`breakdown-${uid}`);
  el && el.classList.toggle('visible');
}

// ─── Render ────────────────────────────────────────────────────────────────────
function scoreClass(s) { return s >= 75 ? 'high' : s >= 55 ? 'mid' : 'low'; }

function renderCards(papers) {
  const grid = document.getElementById('papers-grid');
  const noResults = document.getElementById('no-results');
  const statsBar = document.getElementById('stats-bar');

  if (papers.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    statsBar.innerHTML = `<span class="stat">${lang==='zh'?'无匹配论文':'No matching papers'}</span>`;
    return;
  }

  noResults.style.display = 'none';
  const strongCount = papers.filter(p => p.bucket === 'STRONG').length;
  const weakCount = papers.filter(p => p.bucket === 'WEAK').length;
  statsBar.innerHTML = `
    <span class="stat">${lang==='zh'?'共':'Total'}: <b>${papers.length}</b></span>
    <span class="stat">STRONG: <b>${strongCount}</b></span>
    <span class="stat">WEAK: <b>${weakCount}</b></span>
    <span class="stat">${lang==='zh'?'均分':'Avg Score'}: <b>${Math.round(papers.reduce((s,p)=>s+p.score,0)/papers.length)}</b></span>
  `;

  grid.innerHTML = papers.map(p => {
    const uid = p.id.replace(/[^a-z0-9]/gi, '_');
    const methodText = lang === 'zh' ? p.method_zh : p.method_en;
    const innovText = lang === 'zh' ? p.innovation_zh : p.innovation_en;
    const fig = generateFigure(p);
    const hasCode = !!p.code_url;
    const hasModel = !!p.model_url;

    return `
    <div class="paper-card" id="card-${uid}">
      <div class="card-header">
        <div class="card-title">${p.title}</div>
        <div class="score-badge ${scoreClass(p.score)}">${p.score}</div>
      </div>

      <div class="card-meta">
        <div class="authors">${p.authors}</div>
        <div>${p.affiliation}${p.venue ? ` &middot; <b>${p.venue}</b>` : ''}</div>
      </div>

      <div class="card-tags">
        <span class="tag tag-bucket-${p.bucket}">${p.bucket}</span>
        ${p.tags.slice(0,3).map(t=>`<span class="tag tag-domain">${t}</span>`).join('')}
        <span class="date-stamp">${p.date}</span>
      </div>

      <div class="card-method">${methodText}</div>

      ${fig ? `
        <div class="method-figure">
          <button class="toggle-btn" onclick="toggleFig('${uid}')">${lang==='zh'?'▾ 方法图示':'▾ Method Figure'}</button>
          <div class="figure-section" id="fig-${uid}">${fig}</div>
        </div>` : ''}

      <div class="card-innovation">
        <b>${lang==='zh'?'创新性':'Innovation'}:</b> ${innovText}
      </div>

      <div class="card-metrics">
        <b>${lang==='zh'?'关键指标':'Key Metrics'}:</b><br>${p.key_metrics}
      </div>

      ${renderScoreBreakdown(p.scoring, uid)}

      <div class="card-links">
        <a class="card-link link-paper" href="${p.paper_url}" target="_blank">📄 arXiv</a>
        ${hasCode ? `<a class="card-link link-code" href="${p.code_url}" target="_blank">💻 Code</a>` : ''}
        ${hasModel ? `<a class="card-link link-model" href="${p.model_url}" target="_blank">🤗 Model</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleFig(uid) {
  document.getElementById(`fig-${uid}`)?.classList.toggle('visible');
}

// ─── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch('papers.json');
    const data = await resp.json();
    PAPERS = data.papers || [];

    // Populate date picker
    const datePicker = document.getElementById('date-picker');
    const dates = [...new Set(PAPERS.map(p => p.date))].sort().reverse();
    dates.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      datePicker.appendChild(opt);
    });
    // Default to latest date
    if (dates.length > 0) datePicker.value = dates[0];

    filterCards();
  } catch(e) {
    console.error('Failed to load papers.json', e);
    document.getElementById('papers-grid').innerHTML = '<p style="padding:20px;color:red">Failed to load papers.json</p>';
  }
}

init();
</script>
</body>
</html>
