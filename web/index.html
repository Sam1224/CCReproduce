<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCReproduce — Daily AI Paper Inspection</title>
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e0e4ea;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --text: #1a1d23;
    --muted: #6b7280;
    --tag-ecom: #d1fae5; --tag-ecom-t: #065f46;
    --tag-mod: #fee2e2; --tag-mod-t: #991b1b;
    --tag-mllm: #dbeafe; --tag-mllm-t: #1e40af;
    --tag-prod: #fef3c7; --tag-prod-t: #92400e;
    --tag-bench: #ede9fe; --tag-bench-t: #5b21b6;
    --tag-rag: #ecfdf5; --tag-rag-t: #065f46;
    --score-high: #16a34a;
    --score-mid: #d97706;
    --score-low: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Pro Text', 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.6; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-weight: 700; font-size: 18px; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--accent2); }
  .header-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .lang-toggle { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
  .lang-toggle:hover, .lang-toggle.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Main layout */
  .main { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

  /* Date picker bar */
  .topbar { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; }
  .topbar label { font-size: 13px; color: var(--muted); font-weight: 500; }
  .topbar select, .topbar input[type=range] { font-size: 13px; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; background: var(--bg); }
  .score-filter { display: flex; gap: 8px; align-items: center; flex: 1; }
  .score-val { font-weight: 700; color: var(--accent); min-width: 32px; }
  .stat { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* Cards grid */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: box-shadow .2s; display: flex; flex-direction: column; }
  .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .card-header { padding: 16px 18px 10px; border-bottom: 1px solid var(--border); }
  .card-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .score-badge { font-size: 13px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .score-high { background: #dcfce7; color: var(--score-high); }
  .score-mid { background: #fef3c7; color: var(--score-mid); }
  .score-low { background: #fee2e2; color: var(--score-low); }
  .date-badge { font-size: 11px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; }
  .venue-badge { font-size: 11px; color: #5b21b6; background: #ede9fe; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .card-title { font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--text); margin-bottom: 6px; }
  .card-affil { font-size: 12px; color: var(--muted); }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
  .tag-ecom { background: var(--tag-ecom); color: var(--tag-ecom-t); }
  .tag-mod { background: var(--tag-mod); color: var(--tag-mod-t); }
  .tag-mllm { background: var(--tag-mllm); color: var(--tag-mllm-t); }
  .tag-prod { background: var(--tag-prod); color: var(--tag-prod-t); }
  .tag-bench { background: var(--tag-bench); color: var(--tag-bench-t); }
  .tag-rag { background: var(--tag-rag); color: var(--tag-rag-t); }

  /* Card body */
  .card-body { padding: 14px 18px; flex: 1; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; margin-top: 12px; }
  .section-title:first-child { margin-top: 0; }
  .method-text { font-size: 13px; line-height: 1.65; color: #374151; }
  .method-text.zh { display: none; }

  /* Toggle buttons */
  .toggle-bar { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .toggle-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; transition: all .12s; }
  .toggle-btn:hover, .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Figure block */
  .figure-block { display: none; margin-top: 12px; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .figure-block.visible { display: block; }
  .figure-block svg { width: 100%; height: auto; max-height: 200px; }

  /* Experiment block */
  .experiment-block { display: none; margin-top: 12px; }
  .experiment-block.visible { display: block; }
  .metric-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .metric-table th { background: var(--bg); color: var(--muted); padding: 5px 8px; text-align: left; border: 1px solid var(--border); font-weight: 600; }
  .metric-table td { padding: 5px 8px; border: 1px solid var(--border); }
  .metric-table tr:nth-child(even) { background: #fafafa; }
  .metric-highlight { font-weight: 700; color: var(--score-high); }

  /* Score breakdown */
  .score-breakdown { display: none; margin-top: 12px; }
  .score-breakdown.visible { display: block; }
  .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px; }
  .score-dim { flex: 0 0 160px; color: var(--muted); }
  .score-bar-wrap { flex: 1; background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
  .score-bar { height: 100%; background: var(--accent); border-radius: 4px; }
  .score-num { flex: 0 0 40px; text-align: right; font-weight: 600; color: var(--text); }
  .score-just { color: #6b7280; font-size: 11px; margin-left: 4px; flex: 1; }

  /* Card footer */
  .card-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .card-link { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; }
  .card-link:hover { text-decoration: underline; }
  .code-link { font-size: 12px; background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 6px; text-decoration: none; font-weight: 600; }
  .code-link:hover { background: #1d4ed8; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1/-1; }

  /* Responsive */
  @media (max-width: 600px) {
    .cards { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 10px; }
  }
</style>
</head>

// ──────────────────────────────────────
// State
// ──────────────────────────────────────
let lang = 'en';
let minScore = 0;
let currentDate = '2026-05-16';

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-zh').classList.toggle('active', l === 'zh');
  renderCards();
}

function updateSlider() {
  minScore = parseInt(document.getElementById('score-slider').value);
  document.getElementById('score-display').textContent = minScore;
  renderCards();
}

function scoreClass(s) {
  if (s >= 80) return 'score-high';
  if (s >= 65) return 'score-mid';
  return 'score-low';
}

function tagClass(t) {
  const map = {ecom:'tag-ecom',mod:'tag-mod',mllm:'tag-mllm',prod:'tag-prod',bench:'tag-bench',rag:'tag-rag'};
  return map[t] || 'tag-mllm';
}

function tagLabel(t) {
  const map = {ecom:'E-Commerce',mod:'Content Mod',mllm:'MLLM/VLM',prod:'Production',bench:'Benchmark',rag:'RAG'};
  return map[t] || t;
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('visible');
  const btn = document.querySelector(`[data-toggle="${id}"]`);
  if (btn) btn.classList.toggle('active', el.classList.contains('visible'));
}

function renderCards() {
  const papers = DB[currentDate] || [];
  const filtered = papers.filter(p => p.score >= minScore);
  document.getElementById('stat-line').textContent = `Showing ${filtered.length} / ${papers.length} papers`;

  const container = document.getElementById('cards-container');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state">No papers match the current score filter (≥${minScore}).</div>`;
    return;
  }

  container.innerHTML = filtered.map(p => {
    const sc = scoreClass(p.score);
    const tagsHtml = p.tags.map(t => `<span class="tag ${tagClass(t)}">${tagLabel(t)}</span>`).join('');
    const venue = p.venue ? `<span class="venue-badge">${p.venue}</span>` : '';
    const method = lang === 'zh' ? p.method_zh : p.method_en;
    const innov = lang === 'zh' ? p.innovation_zh : p.innovation_en;

    const metricsHtml = p.metrics.map(([ds, metric, val, base]) =>
      `<tr><td>${ds}</td><td>${metric}</td><td class="metric-highlight">${val}</td><td>${base}</td></tr>`
    ).join('');

    const breakdownHtml = p.breakdown.map(([dim, score, max, just]) => {
      const pct = (score / max * 100).toFixed(0);
      return `<div class="score-row">
        <span class="score-dim">${dim}</span>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div>
        <span class="score-num">${score}/${max}</span>
        <span class="score-just">${just}</span>
      </div>`;
    }).join('');

    const svgHtml = p.svg ? `
      <div class="figure-block" id="fig-${p.id}">
        ${p.svg}
      </div>` : '';

    const figBtn = p.svg ? `<button class="toggle-btn" data-toggle="fig-${p.id}" onclick="toggleSection('fig-${p.id}')">📊 Figure</button>` : '';
    const codeFooter = p.code
      ? `<a class="code-link" href="https://github.com/Sam1224/CCReproduce/tree/main/${p.code}" target="_blank">💻 Code</a>`
      : '';

    return `<div class="card">
      <div class="card-header">
        <div class="card-meta">
          <span class="score-badge ${sc}">${p.score}</span>
          <span class="date-badge">${p.date}</span>
          ${venue}
        </div>
        <div class="card-title">${p.title}</div>
        <div class="card-affil">${p.affil}</div>
        <div class="tags">${tagsHtml}</div>
      </div>
      <div class="card-body">
        <div class="section-title">${lang === 'zh' ? '方法概述' : 'Method Overview'}</div>
        <div class="method-text">${method}</div>

        <div class="section-title">${lang === 'zh' ? '创新性分析' : 'Innovation'}</div>
        <div class="method-text">${innov}</div>

        <div class="toggle-bar">
          ${figBtn}
          <button class="toggle-btn" data-toggle="exp-${p.id}" onclick="toggleSection('exp-${p.id}')">📈 Experiments</button>
          <button class="toggle-btn" data-toggle="score-${p.id}" onclick="toggleSection('score-${p.id}')">🏆 Score</button>
        </div>

        ${svgHtml}

        <div class="experiment-block" id="exp-${p.id}">
          <div class="section-title" style="margin-top:10px">Key Metrics</div>
          <table class="metric-table">
            <tr><th>Dataset / Setting</th><th>Metric</th><th>This Work</th><th>Baseline</th></tr>
            ${metricsHtml}
          </table>
        </div>

        <div class="score-breakdown" id="score-${p.id}">
          <div class="section-title" style="margin-top:10px">Score Breakdown (Total: ${p.score}/100)</div>
          ${breakdownHtml}
        </div>
      </div>
      <div class="card-footer">
        <a class="card-link" href="https://arxiv.org/abs/${p.arxiv}" target="_blank">📄 arXiv:${p.arxiv}</a>
        ${codeFooter}
      </div>
    </div>`;
  }).join('');
}

// Init
renderCards();
</script>
