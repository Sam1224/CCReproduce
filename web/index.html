<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCReproduce — AI Paper Daily</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card-bg: #fff;
    --border: #e2e6ea;
    --text: #212529;
    --muted: #6c757d;
    --accent: #3b5bdb;
    --accent-light: #e7ecff;
    --strong-tag: #d1f0d1;
    --weak-tag: #fff3cd;
    --tag-text: #333;
    --score-high: #1a7a2e;
    --score-mid: #865a00;
    --score-low: #555;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-size: 14px; }

  /* Header */
  header { background: #fff; border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 20px; font-weight: 700; color: var(--accent); }
  header .subtitle { font-size: 12px; color: var(--muted); }
  .lang-toggle { margin-left: auto; display: flex; gap: 8px; }
  .lang-toggle button { padding: 4px 12px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 12px; }
  .lang-toggle button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Controls */
  .controls { padding: 16px 32px; background: #fff; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .controls label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .controls select, .controls input[type=date] {
    padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
    font-size: 13px; background: var(--bg);
  }
  .score-filter { display: flex; align-items: center; gap: 8px; }
  .score-filter input[type=range] { width: 120px; }
  #scoreVal { font-weight: 700; color: var(--accent); }
  .domain-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .domain-tag {
    padding: 3px 10px; border-radius: 12px; font-size: 11px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg); transition: background 0.15s;
  }
  .domain-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Grid */
  main { padding: 24px 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

  /* Card */
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
  .card-header { padding: 16px 18px 10px; border-bottom: 1px solid var(--border); }
  .card-header h2 { font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .tag.strong { background: var(--strong-tag); color: #1a5c2a; }
  .tag.weak { background: var(--weak-tag); color: #7a5200; }
  .tag.domain { background: var(--accent-light); color: var(--accent); }
  .score-badge { padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 700; }
  .score-badge.high { background: #d4edda; color: var(--score-high); }
  .score-badge.mid { background: #fff3cd; color: var(--score-mid); }
  .score-badge.low { background: #f0f0f0; color: var(--score-low); }
  .date-tag { font-size: 11px; color: var(--muted); }

  .card-body { padding: 14px 18px; flex: 1; }
  .card-body h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
  .card-body p { font-size: 13px; line-height: 1.55; color: var(--text); margin-bottom: 12px; }
  .bilingual { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .bilingual .col { font-size: 12px; line-height: 1.5; }
  .bilingual .col .lang-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }

  /* Collapsible sections */
  .toggle-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--accent); padding: 0; text-decoration: underline; }
  .collapsible { overflow: hidden; transition: max-height 0.3s ease; max-height: 0; }
  .collapsible.open { max-height: 600px; }
  .score-breakdown { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .score-breakdown th { text-align: left; font-weight: 600; padding: 4px 8px; background: var(--bg); }
  .score-breakdown td { padding: 4px 8px; border-top: 1px solid var(--border); }
  .score-bar { height: 6px; border-radius: 3px; background: #dee2e6; }
  .score-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }

  /* Metrics highlight */
  .metrics-block { background: #f8f9fa; border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 0 6px 6px 0; margin: 10px 0; font-size: 12px; }
  .metrics-block strong { color: var(--accent); }

  /* Figure */
  .figure-block { background: #f8f9fa; border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin: 10px 0; text-align: center; }
  .figure-block svg { max-width: 100%; height: auto; }
  .figure-caption { font-size: 11px; color: var(--muted); margin-top: 8px; }

  .card-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; }
  .card-footer a { font-size: 12px; color: var(--accent); text-decoration: none; }
  .card-footer a:hover { text-decoration: underline; }

  /* No results */
  .no-results { text-align: center; padding: 60px; color: var(--muted); }

  /* Date bar */
  .date-bar { font-size: 13px; color: var(--muted); margin-bottom: 16px; font-weight: 600; }
  .date-bar span { color: var(--accent); }

  @media (max-width: 700px) {
    header { padding: 12px 16px; }
    .controls, main { padding: 12px 16px; }
    .grid { grid-template-columns: 1fr; }
    .bilingual { grid-template-columns: 1fr; }
  }
</style>
</head>

  currentLang = lang;
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
  renderGrid();
}

function setTag(btn, tag) {
  document.querySelectorAll('.domain-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTag = tag;
  filterCards();
}

function updateScore(val) {
  currentMinScore = parseInt(val);
  document.getElementById('scoreVal').textContent = val;
  filterCards();
}

function filterCards() {
  currentDate = document.getElementById('datePicker').value;
  document.getElementById('currentDate').textContent = currentDate;
  renderGrid();
}

function scoreBadgeClass(score) {
  if (score >= 75) return 'high';
  if (score >= 55) return 'mid';
  return 'low';
}

function buildScoreBreakdown(paper) {
  let rows = '';
  const breakdown = paper.scoreBreakdown;
  for (const [dim, {score, max}] of Object.entries(breakdown)) {
    const pct = Math.round(score / max * 100);
    rows += `
      <tr>
        <td>${dim}</td>
        <td>${score}/${max}</td>
        <td style="width:80px"><div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div></td>
      </tr>`;
  }
  return `<table class="score-breakdown"><tr><th>Dimension</th><th>Score</th><th>Bar</th></tr>${rows}</table>`;
}

function buildCard(paper) {
  const bucketTag = `<span class="tag ${paper.bucket}">${paper.bucket.toUpperCase()}</span>`;
  const scoreTag = `<span class="score-badge ${scoreBadgeClass(paper.score)}">${paper.score}/100</span>`;
  const domainTags = paper.domains.map(d => `<span class="tag domain">${d}</span>`).join(' ');
  const dateTag = `<span class="date-tag">📅 ${paper.date}</span>`;

  const methodLabel = currentLang === 'en' ? 'Method Overview' : '方法概述';
  const innovLabel = currentLang === 'en' ? 'Innovation' : '创新性';
  const methodText = currentLang === 'en' ? paper.method_en : paper.method_zh;
  const innovText = currentLang === 'en' ? paper.innovation_en : paper.innovation_zh;

  const figHtml = paper.hasFigure ? buildFigure(paper) : '';

  const codeHtml = paper.codeLink
    ? `<a href="${paper.codeLink}" target="_blank">🔗 Code</a>`
    : '<span style="color:#aaa;font-size:12px">No official code</span>';

  return `
  <div class="card" data-score="${paper.score}" data-domains="${paper.domains.join(' ')}">
    <div class="card-header">
      <h2>${paper.title}</h2>
      <div class="card-meta">
        ${bucketTag} ${scoreTag} ${domainTags} ${dateTag}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">${paper.authors} · ${paper.affiliation}</div>
    </div>
    <div class="card-body">
      ${figHtml}
      <h3>${methodLabel}</h3>
      <p>${methodText}</p>
      <h3>${innovLabel}</h3>
      <p>${innovText}</p>
      <div class="metrics-block"><strong>Key Metrics:</strong> ${paper.metrics}</div>

      <div style="display:flex;gap:12px;margin-bottom:8px">
        <button class="toggle-btn" onclick="toggleSection(this,'fig-${paper.id}')">
          ${paper.hasFigure ? '▼ Hide Figure' : '(no figure)'}
        </button>
        <button class="toggle-btn" onclick="toggleSection(this,'score-${paper.id}')">▼ Score Breakdown</button>
      </div>
      <div class="collapsible open" id="score-${paper.id}">
        ${buildScoreBreakdown(paper)}
      </div>
    </div>
    <div class="card-footer">
      <a href="https://arxiv.org/abs/${paper.arxiv}" target="_blank">📄 arXiv:${paper.arxiv}</a>
      ${codeHtml}
    </div>
  </div>`;
}

function toggleSection(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  const isOpen = el.classList.contains('open');
  if (btn.textContent.includes('▼')) btn.textContent = btn.textContent.replace('▼', '▲');
  else btn.textContent = btn.textContent.replace('▲', '▼');
}

function renderGrid() {
  const papers = PAPERS_DB[currentDate] || [];
  const filtered = papers.filter(p => {
    if (p.score < currentMinScore) return false;
    if (currentTag !== 'all' && !p.domains.includes(currentTag)) return false;
    return true;
  });

  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';
  grid.innerHTML = filtered.map(buildCard).join('');
}

// Init
renderGrid();
</script>
