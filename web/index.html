<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCReproduce — Daily AI Paper Inspector</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card-bg: #ffffff;
    --border: #e2e6ea;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --text: #1a202c;
    --muted: #6b7280;
    --tag-ecom: #0e7490;
    --tag-govern: #7c3aed;
    --tag-aigc: #b45309;
    --tag-rec: #065f46;
    --tag-data: #9f1239;
    --tag-agent: #1e40af;
    --tag-rag: #166534;
    --score-high: #15803d;
    --score-mid: #b45309;
    --score-low: #6b7280;
    --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }

  /* Nav */
  .nav { background: #fff; border-bottom: 1px solid var(--border); padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-weight: 700; font-size: 16px; color: var(--accent); }
  .nav-logo span { color: var(--text); }
  .nav-controls { display: flex; align-items: center; gap: 16px; }
  .lang-toggle { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); cursor: pointer; font-size: 13px; }
  .lang-toggle.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Filters */
  .filters { background: #fff; border-bottom: 1px solid var(--border); padding: 12px 24px;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .score-slider { display: flex; align-items: center; gap: 8px; }
  .score-slider input { width: 120px; }
  .score-display { font-weight: 700; color: var(--accent); min-width: 28px; }
  .date-picker { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--bg); }
  .domain-filter { display: flex; gap: 6px; flex-wrap: wrap; }
  .domain-tag { padding: 3px 10px; border-radius: 100px; font-size: 12px; cursor: pointer; border: 1px solid transparent; font-weight: 500; }
  .domain-tag.active { opacity: 1; }
  .domain-tag:not(.active) { opacity: 0.4; }

  /* Grid */
  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .date-header { font-size: 22px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .date-header .count { font-size: 14px; font-weight: 500; color: var(--muted); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }

  /* Card */
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .card.hidden { display: none; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; flex: 1; }
  .score-badge { padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: 700; white-space: nowrap; }
  .score-badge.high { background: #dcfce7; color: var(--score-high); }
  .score-badge.mid { background: #fef3c7; color: var(--score-mid); }
  .score-badge.low { background: #f3f4f6; color: var(--score-low); }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .authors { font-size: 12px; color: var(--muted); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bucket-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .bucket-badge.strong { background: #eff6ff; color: var(--accent); }
  .bucket-badge.weak { background: #f9fafb; color: var(--muted); }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; color: white; }
  .tag.ecom { background: var(--tag-ecom); }
  .tag.govern { background: var(--tag-govern); }
  .tag.aigc { background: var(--tag-aigc); }
  .tag.rec { background: var(--tag-rec); }
  .tag.data { background: var(--tag-data); }
  .tag.agent { background: var(--tag-agent); }
  .tag.rag { background: var(--tag-rag); }

  /* Toggle sections */
  .section { border-top: 1px solid var(--border); padding-top: 10px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .toggle-btn { font-size: 12px; color: var(--accent); background: none; border: none; cursor: pointer; }
  .section-body { margin-top: 8px; }
  .section-body.collapsed { display: none; }
  .method-zh, .method-en { font-size: 13px; line-height: 1.6; color: var(--text); }
  .method-en { display: none; }
  .lang-en .method-zh { display: none; }
  .lang-en .method-en { display: block; }

  /* Story arc */
  .story-arc { font-size: 12px; line-height: 1.6; color: var(--muted); font-style: italic; }
  .story-arc strong { color: var(--text); font-style: normal; }

  /* Metrics table */
  .metrics-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .metrics-table th { text-align: left; color: var(--muted); padding: 4px 6px; font-weight: 600; border-bottom: 1px solid var(--border); }
  .metrics-table td { padding: 4px 6px; }
  .metrics-table tr:nth-child(even) { background: var(--bg); }
  .delta { color: var(--score-high); font-weight: 600; }

  /* Score breakdown */
  .score-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 12px; }
  .score-row { display: flex; justify-content: space-between; }
  .score-dim { color: var(--muted); }
  .score-val { font-weight: 600; }

  /* Figure */
  .figure-box { background: var(--accent-light); border: 1px solid #bfdbfe; border-radius: 8px; padding: 16px; }
  .figure-title { font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
  .figure-svg { width: 100%; }

  /* Links */
  .card-links { display: flex; gap: 10px; flex-wrap: wrap; }
  .card-links a { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; }
  .card-links a:hover { text-decoration: underline; }
  .code-link { background: #f0fdf4; padding: 2px 8px; border-radius: 4px; color: var(--score-high) !important; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }

  /* Source coverage table */
  .source-table-wrapper { overflow-x: auto; }
  .source-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .source-table th { background: var(--bg); border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-weight: 600; }
  .source-table td { border: 1px solid var(--border); padding: 6px 10px; }
  .status-ok { color: var(--score-high); font-weight: 600; }
  .status-err { color: #dc2626; font-weight: 600; }
  .status-no { color: var(--muted); }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .filters { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">CC<span>Reproduce</span> — Daily AI Paper Inspector</div>
  <div class="nav-controls">
    <button class="lang-toggle active" id="lang-zh" onclick="setLang('zh')">中文</button>

</div>

</div>

// ─── State ─────────────────────────────────────────────────────────────────
let currentLang = 'zh';
let activeTags = new Set(['govern','ecom','aigc','data','agent']);
let scoreMin = 0;

// ─── Render ────────────────────────────────────────────────────────────────
function scoreClass(s) {
  return s >= 75 ? 'high' : s >= 55 ? 'mid' : 'low';
}

function tagsHtml(tags) {
  const labels = { govern:'Governance', ecom:'E-Commerce', aigc:'AIGC', rec:'Rec', data:'Data', agent:'Agent', rag:'RAG' };
  return tags.map(t => `<span class="tag ${t}">${labels[t]||t}</span>`).join('');
}

function metricsHtml(metrics) {
  if (!metrics || !metrics.length) return '';
  const rows = metrics.map(([ds, metric, val, base]) =>
    `<tr><td>${ds}</td><td>${metric}</td><td><strong>${val}</strong></td><td style="color:var(--muted)">${base}</td></tr>`
  ).join('');
  return `<table class="metrics-table"><thead><tr><th>Dataset</th><th>Metric</th><th>Model</th><th>Baseline</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function scoreHtml(breakdown) {
  if (!breakdown || !breakdown.length) return '';
  const rows = breakdown.map(([dim, val]) =>
    `<div class="score-row"><span class="score-dim">${dim}</span><span class="score-val">${val}</span></div>`
  ).join('');
  return `<div class="score-breakdown">${rows}</div>`;
}

function figureHtml(paper) {
  // Generate a simple SVG flow diagram
  const tagColorMap = { govern:'#7c3aed', ecom:'#0e7490', aigc:'#b45309', rec:'#065f46', data:'#9f1239', agent:'#1e40af' };
  const mainTag = paper.tags[0];
  const color = tagColorMap[mainTag] || '#2563eb';
  return `<div class="figure-box">
    <div class="figure-title">Method Overview — ${paper.id.toUpperCase()}</div>
    <svg viewBox="0 0 360 80" class="figure-svg" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="10" width="80" height="60" rx="8" fill="${color}22" stroke="${color}" stroke-width="1.5"/>
      <text x="42" y="38" text-anchor="middle" fill="${color}" font-size="9" font-weight="600">Input</text>
      <text x="42" y="52" text-anchor="middle" fill="${color}" font-size="8">(Image+Text)</text>
      <polygon points="90,40 104,34 104,46" fill="${color}"/>
      <rect x="108" y="10" width="140" height="60" rx="8" fill="${color}33" stroke="${color}" stroke-width="1.5"/>
      <text x="178" y="36" text-anchor="middle" fill="${color}" font-size="9" font-weight="700">${paper.id.toUpperCase()}</text>
      <text x="178" y="50" text-anchor="middle" fill="${color}" font-size="8">Core Module</text>
      <polygon points="254,40 268,34 268,46" fill="${color}"/>
      <rect x="272" y="10" width="86" height="60" rx="8" fill="${color}22" stroke="${color}" stroke-width="1.5"/>
      <text x="315" y="38" text-anchor="middle" fill="${color}" font-size="9" font-weight="600">Output</text>
      <text x="315" y="52" text-anchor="middle" fill="${color}" font-size="8">(Decision)</text>
    </svg>
  </div>`;
}

function renderCard(paper) {
  const sc = scoreClass(paper.score);
  const bucketClass = paper.bucket === 'STRONG' ? 'strong' : 'weak';
  const codeHtml = paper.code
    ? `<a href="https://github.com/Sam1224/CCReproduce/tree/main/${paper.code}" class="code-link" target="_blank">📂 Code Repro</a>`
    : '';
  return `
<div class="card" id="card-${paper.id}" data-score="${paper.score}" data-tags="${paper.tags.join(',')}">
  <div class="card-header">
    <div class="card-title">${paper.title}</div>
    <span class="score-badge ${sc}">${paper.score}</span>
  </div>
  <div class="card-meta">
    <span class="authors" title="${paper.authors} · ${paper.affiliation}">${paper.authors} · ${paper.affiliation}</span>
    <span class="bucket-badge ${bucketClass}">${paper.bucket}</span>
  </div>
  <div class="tags">${tagsHtml(paper.tags)}</div>

  <!-- Figure -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-title">📊 Figure</span>
      <button class="toggle-btn">show/hide</button>
    </div>
    <div class="section-body collapsed">${figureHtml(paper)}</div>
  </div>

  <!-- Method -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-title">📝 Method</span>
      <button class="toggle-btn">show/hide</button>
    </div>
    <div class="section-body">
      <div class="method-zh">${paper.method_zh}</div>
      <div class="method-en">${paper.method_en}</div>
    </div>
  </div>

  <!-- Story Arc -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-title">🔍 Story Arc</span>
      <button class="toggle-btn">show/hide</button>
    </div>
    <div class="section-body collapsed">
      <div class="story-arc method-zh">${paper.story_zh}</div>
      <div class="story-arc method-en">${paper.story_en}</div>
    </div>
  </div>

  <!-- Metrics -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-title">📈 Key Metrics</span>
      <button class="toggle-btn">show/hide</button>
    </div>
    <div class="section-body collapsed">${metricsHtml(paper.metrics)}</div>
  </div>

  <!-- Score Breakdown -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-title">🏆 Score Breakdown</span>
      <button class="toggle-btn">show/hide</button>
    </div>
    <div class="section-body collapsed">${scoreHtml(paper.score_breakdown)}</div>
  </div>

  <!-- Links -->
  <div class="card-links">
    <a href="https://arxiv.org/abs/${paper.arxiv}" target="_blank">📄 arXiv:${paper.arxiv}</a>
    <span style="color:var(--muted);font-size:12px">🗓 ${paper.submitted}</span>
    ${codeHtml}
  </div>
</div>`;
}

function renderAll() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = PAPERS.map(renderCard).join('');
  updateLangClasses();
  filterCards();
}

// ─── Filters ───────────────────────────────────────────────────────────────
function filterCards() {
  const scoreMin = parseInt(document.getElementById('score-filter').value);
  document.getElementById('score-val').textContent = scoreMin;
  let visible = 0;
  PAPERS.forEach(p => {
    const card = document.getElementById(`card-${p.id}`);
    const tags = p.tags;
    const tagMatch = tags.some(t => activeTags.has(t));
    const scoreMatch = p.score >= scoreMin;
    if (tagMatch && scoreMatch) {
      card.classList.remove('hidden'); visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  document.getElementById('visible-count').textContent = `${visible} papers`;
}

function toggleTag(btn) {
  const tag = btn.dataset.tag;
  if (activeTags.has(tag)) {
    activeTags.delete(tag);
    btn.classList.remove('active');
  } else {
    activeTags.add(tag);
    btn.classList.add('active');
  }
  filterCards();
}

// ─── Sections ──────────────────────────────────────────────────────────────
function toggleSection(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('collapsed');
}

// ─── Language ──────────────────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  updateLangClasses();
}

function updateLangClasses() {
  document.querySelectorAll('.card').forEach(card => {
    if (currentLang === 'en') card.classList.add('lang-en');
    else card.classList.remove('lang-en');
  });
}

// ─── Init ──────────────────────────────────────────────────────────────────
renderAll();
</script>
