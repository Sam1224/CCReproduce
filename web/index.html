    .controls label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
    .controls input[type=range] { width: 120px; accent-color: var(--accent); }
    #scoreVal { font-weight: 700; color: var(--accent); min-width: 28px; }
    #langBtn {

    .meta-bar span { font-size: 12px; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; display: flex; flex-direction: column; gap: 14px;
      transition: box-shadow .15s, transform .15s;
    }
    .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.09); transform: translateY(-2px); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card-title { font-size: 15px; font-weight: 700; line-height: 1.4; flex: 1; }
    .score-badge {
      display: flex; flex-direction: column; align-items: center;
      background: var(--accent-light); border-radius: 10px; padding: 8px 12px;
      min-width: 56px; flex-shrink: 0;
    }
    .score-num { font-size: 22px; font-weight: 800; line-height: 1; }
    .score-sub { font-size: 10px; color: var(--muted); }
    .score-high .score-num { color: var(--score-high); }
    .score-mid  .score-num { color: var(--score-mid); }
    .score-low  .score-num { color: var(--score-low); }

    .card-meta { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .card-meta a { color: var(--accent); text-decoration: none; }
    .card-meta a:hover { text-decoration: underline; }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      background: var(--tag-bg); border-radius: 99px; padding: 2px 10px;
      font-size: 11px; color: var(--muted); font-weight: 500;
    }

    details { border-top: 1px solid var(--border); padding-top: 12px; }
    summary {
      cursor: pointer; font-size: 12px; font-weight: 600; color: var(--accent);
      list-style: none; display: flex; align-items: center; gap: 6px;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: "▶"; font-size: 9px; transition: transform .2s; }
    details[open] summary::before { transform: rotate(90deg); }
    .detail-body { margin-top: 10px; font-size: 13px; line-height: 1.65; color: var(--text); }
    .detail-body h4 { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 10px 0 4px; }

    .metric-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
    .metric-table th { background: var(--tag-bg); text-align: left; padding: 5px 8px; font-weight: 600; }
    .metric-table td { padding: 4px 8px; border-top: 1px solid var(--border); }

    .score-breakdown { display: grid; grid-template-columns: 1fr auto; gap: 4px 16px; margin-top: 6px; }
    .score-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .score-label { font-size: 12px; }
    .score-bar { height: 6px; background: var(--tag-bg); border-radius: 99px; flex: 1; overflow: hidden; }
    .score-fill { height: 100%; background: var(--accent); border-radius: 99px; }
    .score-val { font-size: 12px; font-weight: 700; color: var(--accent); min-width: 32px; text-align: right; }

    .code-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff; text-decoration: none;
      border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600;
    }
    .code-link:hover { background: #1d4ed8; }
    .links-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .no-results {
      grid-column: 1/-1; text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 16px;
    }

    @media (max-width: 600px) {
      .controls { gap: 12px; }
      .controls input[type=range] { width: 80px; }
    }
  </style>
</head>

      <span class="score-bar"><span class="score-fill" style="width:${bd[i.k]/i.max*100}%"></span></span>
      <span class="score-val">${bd[i.k]}/${i.max}</span>
    </span>`).join('')}</div>`;
}

function renderCards() {
  const visible = PAPERS.filter(p => p.score >= minScore);
  countLbl.textContent = currentLang === 'zh'
    ? `${visible.length} 篇 ≥ ${minScore} 分`
    : `${visible.length} papers ≥ ${minScore}`;

  grid.innerHTML = visible.length === 0
    ? `<div class="no-results">${currentLang === 'zh' ? '暂无符合条件的论文' : 'No papers match the current filter'}</div>`
    : visible.map(p => {
      const method    = currentLang === 'zh' ? p.method_zh    : p.method_en;
      const innov     = currentLang === 'zh' ? p.innovation_zh : p.innovation_en;
      const rationale = currentLang === 'zh' ? p.rationale_zh : p.rationale_en;
      const labelMethod = currentLang === 'zh' ? '方法概述' : 'Method';
      const labelInnov  = currentLang === 'zh' ? '创新分析' : 'Innovation';
      const labelMetrics = currentLang === 'zh' ? '关键指标' : 'Key Metrics';
      const labelScore  = currentLang === 'zh' ? '评分详情' : 'Score Breakdown';
      const codeLabel   = currentLang === 'zh' ? '代码' : 'Code';
      const paperLabel  = currentLang === 'zh' ? '论文' : 'Paper';

      return `<article class="card" data-score="${p.score}">
        <div class="card-top">
          <div class="card-title">${p.title}</div>
          <div class="score-badge ${scoreClass(p.score)}">
            <div class="score-num">${p.score}</div>
            <div class="score-sub">/100</div>
          </div>
        </div>
        <div class="card-meta">
          <strong>${p.authors}</strong> · ${p.affil}<br>
          <span>${p.date}</span>
        </div>
        <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <div class="card-meta">${rationale}</div>

        <details>
          <summary>${labelMethod}</summary>
          <div class="detail-body">
            <h4>${labelMethod}</h4><p>${method}</p>
            <h4>${labelInnov}</h4><p>${innov}</p>
          </div>
        </details>

        <details>
          <summary>${labelMetrics}</summary>
          <div class="detail-body">${metricsTable(p.metrics)}</div>
        </details>

        <details>
          <summary>${labelScore}</summary>
          <div class="detail-body">${breakdown(p.breakdown)}</div>
        </details>

        <div class="links-row">
          <a class="code-link" href="${p.abs}" target="_blank" rel="noopener">📄 ${paperLabel}</a>
          ${p.code ? `<a class="code-link" href="${p.code}" target="_blank" rel="noopener">💻 ${codeLabel}</a>` : ''}
          ${p.local ? `<a class="code-link" href="https://github.com/Sam1224/CCReproduce/tree/main/${p.local}" target="_blank" rel="noopener">🔁 Reproduce</a>` : ''}
        </div>
      </article>`;
    }).join('');
}

slider.addEventListener('input', () => {
  minScore = +slider.value;
  scoreV.textContent = minScore;
  renderCards();
});

langBtn.addEventListener('click', () => {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  langBtn.textContent = currentLang === 'zh' ? 'EN' : '中';
  document.getElementById('lbl-score').textContent = currentLang === 'zh' ? '最低分' : 'Min Score';
  document.getElementById('pageTitle').textContent = currentLang === 'zh'
    ? '2026-06-14 巡检报告' : '2026-06-14 Paper Inspection';
  renderCards();
});

renderCards();
</script>
</body>
</html>
