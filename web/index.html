  .tag-strong { background: #fff0f0; color: var(--strong); }
  .tag-weak { background: #e6f7f5; color: var(--weak); }
  .tag-domain { background: #eef2ff; color: var(--accent); }

  .card-title a:hover { color: var(--accent); }
  .card-meta { font-size: 0.78rem; color: var(--muted); }
  .score-badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 0.8rem; font-weight: 700; margin-left: 8px; }
  .score-high { background: #d4f4d9; color: #1a7a31; }
  .score-mid { background: #fde8cc; color: #7a4210; }
  .score-low { background: #fde8cc; color: #7a4210; }
  .card-body { padding: 14px 18px; }
  .section-toggle { font-size: 0.78rem; color: var(--accent); cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 8px; background: none; border: none; }
  .section-toggle::before { content: '▸'; transition: transform 0.2s; }
  .section-toggle.open::before { transform: rotate(90deg); }
  .collapsible { display: none; }
  .collapsible.open { display: block; }
  .method-box { background: #f7f9ff; border-left: 3px solid var(--accent); padding: 10px 12px; border-radius: 0 6px 6px 0; font-size: 0.83rem; margin-bottom: 10px; }
  .innovation-box { background: #fff7ed; border-left: 3px solid #f4a261; padding: 10px 12px; border-radius: 0 6px 6px 0; font-size: 0.83rem; margin-bottom: 10px; }
  .metrics-table { width: 100%; font-size: 0.8rem; border-collapse: collapse; margin-bottom: 10px; }
  .metrics-table th { background: #f1f3f5; padding: 5px 8px; text-align: left; font-weight: 600; }
  .metrics-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .score-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 8px; }
  .score-row { font-size: 0.78rem; display: flex; justify-content: space-between; }
  .score-row span:last-child { font-weight: 600; color: var(--accent); }
  .card-footer { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn { font-size: 0.78rem; padding: 4px 12px; border-radius: 5px; border: 1px solid var(--border); background: white; cursor: pointer; text-decoration: none; color: var(--text); transition: background 0.1s; }

  .date-badge { font-size: 0.72rem; background: #eef2ff; color: var(--accent); padding: 2px 8px; border-radius: 4px; }
  .hidden { display: none !important; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1 / -1; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; padding: 12px; } header { padding: 14px 16px; } .toolbar { padding: 10px 16px; } }
</style>

function setLang(lang) {

function populateDatePicker() {
  const sel = document.getElementById('date-picker');
  Object.keys(PAPERS_DB).sort().reverse().forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d;
    if (d === '2026-06-10') opt.selected = true;
    sel.appendChild(opt);

function getScoreClass(score) {
  if (score >= 80) return 'score-high';
  if (score >= 60) return 'score-mid';
  return 'score-low';

function makeMetricsTable(metrics) {
  if (!metrics || metrics.length === 0) return '';
  let rows = metrics.map(([k, v]) => `<tr><td>${k}</td><td><strong>${v}</strong></td></tr>`).join('');
  return `<table class="metrics-table"><thead><tr><th>指标</th><th>值</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function makeScoreBreakdown(breakdown) {
  let rows = Object.entries(breakdown).map(([k, v]) =>
    `<div class="score-row"><span>${k}</span><span>${v}</span></div>`
  ).join('');
  return `<div class="score-breakdown">${rows}</div>`;
}

function makeArchDiagram(paper) {
  // Generate a simple SVG diagram showing paper's key flow
  const id = paper.id.replace('.','_');
  const flow = paper.tags.slice(0,3);
  const w = 280, h = 70;
  const colors = ['#4361ee','#3a0ca3','#e63946','#2a9d8f'];
  let rects = flow.map((t,i) => {
    const x = 20 + i * 90;
    return `<rect x="${x}" y="20" width="80" height="30" rx="6" fill="${colors[i%4]}" opacity="0.15" stroke="${colors[i%4]}" stroke-width="1.5"/>
            <text x="${x+40}" y="39" text-anchor="middle" font-size="10" fill="${colors[i%4]}" font-weight="600">${t.length>8?t.slice(0,8)+'…':t}</text>`;
  }).join('');
  let arrows = flow.slice(0,-1).map((_,i) => {
    const x = 100 + i * 90;
    return `<line x1="${x}" y1="35" x2="${x+10}" y2="35" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr${id})"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs><marker id="arr${id}" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#aaa"/></marker></defs>
    ${rects}${arrows}
  </svg>`;
}

function makeCard(paper) {
  const scoreClass = getScoreClass(paper.score);
  const method = currentLang === 'zh' ? paper.method_zh : paper.method_en;
  const innovation = currentLang === 'zh' ? paper.innovation_zh : paper.innovation_en;
  const domainLabel = currentLang === 'zh' ? '领域相关' : 'Domain';
  const bucketLabel = paper.bucket === 'STRONG' ? (currentLang === 'zh' ? '强相关' : 'STRONG') : (currentLang === 'zh' ? '弱相关' : 'WEAK');
  const bucketClass = paper.bucket === 'STRONG' ? 'tag-strong' : 'tag-weak';

  const codeLink = paper.code_url
    ? `<a href="${paper.code_url}" class="btn" target="_blank">💻 Code</a>`
    : paper.code
    ? `<span class="btn">💻 ${paper.code}</span>`
    : '';

  const projectLink = paper.project ? `<a href="${paper.project}" class="btn" target="_blank">🌐 Project</a>` : '';

  return `
<div class="card" data-score="${paper.score}" data-bucket="${paper.bucket}" data-date="${paper.date}">
  <div class="card-header">
    <div class="card-tags">
      <span class="tag ${bucketClass}">${bucketLabel}</span>
      ${paper.tags.slice(0,2).map(t => `<span class="tag tag-domain">${t}</span>`).join('')}
    </div>
    <div class="card-title">
      <a href="${paper.arxiv}" target="_blank">${paper.title}</a>
      <span class="score-badge ${scoreClass}">${paper.score}</span>
    </div>
    <div class="card-meta">
      ${paper.authors} · <span class="date-badge">${paper.date}</span>
    </div>
    <div class="card-meta" style="margin-top:2px;font-size:0.75rem;">${paper.affiliations}</div>
  </div>
  <div class="card-body">
    <div class="figure-box">${makeArchDiagram(paper)}</div>

    <button class="section-toggle open" onclick="toggleSection(this)">
      ${currentLang==='zh'?'方法概述':'Method Overview'}
    </button>
    <div class="collapsible open method-box">${method}</div>

    <button class="section-toggle open" onclick="toggleSection(this)">
      ${currentLang==='zh'?'创新性分析':'Innovation'}
    </button>
    <div class="collapsible open innovation-box">${innovation}</div>

    <button class="section-toggle" onclick="toggleSection(this)">
      ${currentLang==='zh'?'关键指标':'Key Metrics'}
    </button>
    <div class="collapsible">${makeMetricsTable(paper.metrics)}</div>

    <button class="section-toggle" onclick="toggleSection(this)">
      ${currentLang==='zh'?'评分细则':'Score Breakdown'}
    </button>
    <div class="collapsible">
      ${makeScoreBreakdown(paper.score_breakdown)}
      <p style="font-size:0.78rem;color:var(--muted);margin-top:8px;">${paper.score_rationale_zh||''}</p>
    </div>
  </div>
  <div class="card-footer">
    <a href="${paper.arxiv}" class="btn btn-primary" target="_blank">📄 arXiv</a>
    ${projectLink}
    ${codeLink}
  </div>
</div>`;
}

function toggleSection(btn) {
  btn.classList.toggle('open');
  const sibling = btn.nextElementSibling;
  sibling.classList.toggle('open');
}

function renderCards() {
  const grid = document.getElementById('paper-grid');
  const minScore = parseInt(document.getElementById('score-slider').value);
  const dateFilter = document.getElementById('date-picker').value;
  const bucketFilter = document.getElementById('bucket-filter').value;

  document.getElementById('score-label').textContent = minScore;

  const papers = PAPERS_DB[dateFilter] || [];
  const filtered = papers.filter(p =>
    p.score >= minScore &&
    (bucketFilter === '' || p.bucket === bucketFilter)
  );

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>No papers match the current filters.</h3></div>';
    return;
  }

  grid.innerHTML = filtered.sort((a,b) => b.score - a.score).map(makeCard).join('');
}

function filterCards() {
  currentDate = document.getElementById('date-picker').value;
  renderCards();
}

// Init
populateDatePicker();
renderCards();
</script>
