<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCReproduce — AI 论文巡检</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card-bg: #ffffff;
    --primary: #1a73e8;
    --accent: #fbbc04;
    --text: #202124;
    --sub: #5f6368;
    --border: #e0e0e0;
    --strong-color: #137333;
    --weak-color: #1967d2;
    --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
  header { background: var(--primary); color: #fff; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 22px; font-weight: 700; }
  header .subtitle { font-size: 13px; opacity: 0.85; }
  .toolbar { padding: 14px 32px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .toolbar label { font-size: 13px; color: var(--sub); }
  .toolbar input[type=range] { width: 160px; cursor: pointer; }
  .toolbar select, .toolbar input[type=date] { border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 13px; }
  .lang-btn { cursor: pointer; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 13px; background: #fff; }
  .lang-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .score-display { font-weight: 600; color: var(--primary); min-width: 30px; }
  main { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
  .date-section { margin-bottom: 32px; }
  .date-section h2 { font-size: 18px; border-left: 4px solid var(--primary); padding-left: 12px; margin-bottom: 16px; color: var(--text); }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
  .card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 18px; transition: box-shadow .2s; display: flex; flex-direction: column; gap: 10px; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
  .card-header { display: flex; align-items: flex-start; gap: 10px; }
  .score-badge { flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #fff; }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
  .card-authors { font-size: 12px; color: var(--sub); }
  .card-affil { font-size: 12px; color: var(--sub); font-style: italic; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: #e8f0fe; color: var(--primary); }
  .tag.strong { background: #e6f4ea; color: var(--strong-color); }
  .method-block { font-size: 13px; line-height: 1.6; color: #333; }
  .section-toggle { cursor: pointer; font-size: 12px; color: var(--primary); user-select: none; }
  .collapsible { display: none; margin-top: 8px; }
  .collapsible.open { display: block; }
  .metrics-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .metrics-table th { background: #f1f3f4; padding: 5px 8px; text-align: left; }
  .metrics-table td { padding: 4px 8px; border-top: 1px solid var(--border); }
  .score-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 12px; }
  .score-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .score-row .s-val { font-weight: 600; color: var(--primary); }
  .card-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .card-link { font-size: 12px; text-decoration: none; color: var(--primary); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; }
  .card-link:hover { background: var(--primary); color: #fff; }
  .hidden { display: none !important; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
  .figure-placeholder { background: linear-gradient(135deg, #e8f0fe 0%, #fce8b2 100%); border-radius: 8px; padding: 24px; text-align: center; font-size: 12px; color: var(--sub); }
  footer { text-align: center; padding: 24px; color: var(--sub); font-size: 12px; border-top: 1px solid var(--border); margin-top: 40px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>CCReproduce — AI 论文巡检</h1>
    <div class="subtitle">E-commerce Content Ecosystem & Influencer Governance · Daily Paper Watch</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="lang-btn active" id="btnZh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="toolbar">
  <label>
    最低评分 / Min Score:
    <input type="range" id="scoreSlider" min="0" max="100" value="40" oninput="filterCards()">
    <span class="score-display" id="scoreVal">40</span>
  </label>
  <label>
    日期 / Date:
    <select id="dateSelect" onchange="filterCards()">
      <option value="all">全部 / All</option>
      <option value="2026-06-09" selected>2026-06-09</option>
    </select>
  </label>
  <label>
    类型 / Bucket:
    <select id="bucketSelect" onchange="filterCards()">
      <option value="all">全部 / All</option>
      <option value="STRONG">STRONG</option>
      <option value="WEAK">WEAK</option>
    </select>
  </label>
</div>

    <div class="cards-grid" id="cards-2026-06-09"></div>

</main>

<footer>
  CCReproduce · 每日 08:30 GMT+8 自动巡检 · 数据来源: arXiv / HuggingFace / SIGIR 2026
</footer>

let currentLang = 'zh';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  renderAll();
}

function scoreColor(s) {
  if (s >= 85) return '#137333';
  if (s >= 75) return '#1967d2';
  if (s >= 60) return '#e37400';
  return '#9e9e9e';
}

function renderCard(p) {
  const isZh = currentLang === 'zh';
  const method = isZh ? p.method_zh : p.method_en;
  const innov = isZh ? p.innovation_zh : p.innovation_en;
  const tags = p.tags.map(t => `<span class="tag ${p.bucket === 'STRONG' ? 'strong' : ''}">${t}</span>`).join('');
  const metricsRows = p.metrics.map(m =>
    `<tr><td>${m[0]}</td><td>${m[1]}</td><td>${m[2]}</td><td style="color:var(--sub)">${m[3]}</td></tr>`
  ).join('');
  const scoreRows = Object.entries(p.scores).map(([k, v]) => {
    const labels = {innovation: isZh ? '创新' : 'Innovation', metrics: isZh ? '指标' : 'Metrics',
      quality: isZh ? '实验质量' : 'Exp Quality', efficiency: isZh ? '效率' : 'Efficiency',
      generalization: isZh ? '泛化' : 'Generalize', relevance: isZh ? '相关性' : 'Relevance'};
    return `<div class="score-row"><span>${labels[k] || k}</span><span class="s-val">${v}</span></div>`;
  }).join('');
  const cardId = 'card_' + p.arxiv.replace('.', '_');

  return `
<div class="card" data-score="${p.score}" data-date="${p.date}" data-bucket="${p.bucket}" id="${cardId}">
  <div class="card-header">
    <div class="score-badge" style="background:${scoreColor(p.score)}">${p.score}</div>
    <div>
      <div class="card-title">${p.title}</div>
      <div class="card-authors">${p.authors}</div>
      <div class="card-affil">${p.affil}</div>
    </div>
  </div>
  <div class="tags">${tags}</div>
  <div class="method-block">${method}</div>
  <div class="section-toggle" onclick="toggleSection('${cardId}_innov')">
    💡 ${isZh ? '创新性' : 'Innovation'} ▾
  </div>
  <div class="collapsible" id="${cardId}_innov">
    <div class="method-block" style="color:#333;font-style:italic;">${innov}</div>
  </div>
  <div class="section-toggle" onclick="toggleSection('${cardId}_metrics')">
    📊 ${isZh ? '关键指标' : 'Key Metrics'} ▾
  </div>
  <div class="collapsible" id="${cardId}_metrics">
    <table class="metrics-table">
      <tr><th>${isZh ? '场景' : 'Scenario'}</th><th>${isZh ? '指标' : 'Metric'}</th><th>${isZh ? '结果' : 'Result'}</th><th>vs.</th></tr>
      ${metricsRows}
    </table>
  </div>
  <div class="section-toggle" onclick="toggleSection('${cardId}_score')">
    🏆 ${isZh ? '评分明细' : 'Score Breakdown'} ▾
  </div>
  <div class="collapsible" id="${cardId}_score">
    <div class="score-breakdown">${scoreRows}</div>
    <div style="margin-top:6px;text-align:right;font-weight:700;color:${scoreColor(p.score)}">
      Total: ${p.score}/100
    </div>
  </div>
  <div class="card-links">
    <a class="card-link" href="${p.link}" target="_blank">arXiv ↗</a>
    ${p.code ? `<a class="card-link" href="https://github.com/Sam1224/CCReproduce/tree/main/2026-06-09/${p.code}" target="_blank">💻 Code</a>` : ''}
    <span class="card-link" style="cursor:default;background:#f1f3f4;color:var(--sub)">${p.bucket}</span>
  </div>
</div>`;
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function renderAll() {
  const container = document.getElementById('cards-2026-06-09');
  const minScore = parseInt(document.getElementById('scoreSlider').value);
  const dateFilter = document.getElementById('dateSelect').value;
  const bucketFilter = document.getElementById('bucketSelect').value;

  const filtered = papers.filter(p =>
    p.score >= minScore &&
    (dateFilter === 'all' || p.date === dateFilter) &&
    (bucketFilter === 'all' || p.bucket === bucketFilter)
  );

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">没有符合条件的论文 / No matching papers</div>';
  } else {
    container.innerHTML = filtered.map(renderCard).join('');
  }
}

function filterCards() {
  const val = document.getElementById('scoreSlider').value;
  document.getElementById('scoreVal').textContent = val;
  renderAll();
}

// Initial render
renderAll();
</script>
</body>
</html>
