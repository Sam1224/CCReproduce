<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CCReproduce — Daily AI Paper Digest</title>
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e2e6ea;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --text: #1a1d23;
    --muted: #6b7280;
    --tag-bg: #eff6ff;
    --tag-color: #1d4ed8;
    --tag2-bg: #f5f3ff;
    --tag2-color: #7c3aed;
    --strong-bg: #ecfdf5;
    --strong-color: #065f46;
    --weak-bg: #fffbeb;
    --weak-color: #92400e;
    --score-high: #059669;
    --score-mid: #d97706;
    --score-low: #dc2626;
    --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.04);
    --radius: 12px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.6; }

  /* ── Header ── */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  .header .subtitle { color: var(--muted); font-size: 13px; }
  .lang-toggle { margin-left: auto; display: flex; gap: 4px; }
  .lang-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 13px; color: var(--muted); transition: all .15s; }
  .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Controls ── */
  .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .ctrl-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .date-picker { padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; color: var(--text); background: var(--surface); cursor: pointer; }
  .score-range { display: flex; align-items: center; gap: 8px; }
  .score-range input[type=range] { width: 120px; accent-color: var(--accent); }
  #score-display { font-weight: 600; color: var(--accent); min-width: 30px; }
  .bucket-filter { display: flex; gap: 6px; }
  .bucket-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; }
  .bucket-btn.all { color: var(--text); }
  .bucket-btn.strong { color: var(--strong-color); border-color: var(--strong-bg); }
  .bucket-btn.weak   { color: var(--weak-color); border-color: var(--weak-bg); }
  .bucket-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Paper count ── */
  .count-bar { padding: 8px 24px; background: var(--bg); font-size: 12px; color: var(--muted); }

  /* ── Grid ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; padding: 18px 24px 40px; }

  /* ── Card ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: box-shadow .2s, transform .2s; }
  .card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
  .card-header { padding: 16px 18px 10px; border-bottom: 1px solid var(--border); }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .date-tag { font-size: 11px; color: var(--muted); }
  .bucket-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  .bucket-badge.STRONG { background: var(--strong-bg); color: var(--strong-color); }
  .bucket-badge.WEAK   { background: var(--weak-bg);   color: var(--weak-color); }
  .domain-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--tag-bg); color: var(--tag-color); }
  .domain-tag.purple { background: var(--tag2-bg); color: var(--tag2-color); }

  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; color: var(--text); margin-bottom: 4px; }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-affil { font-size: 12px; color: var(--muted); margin-bottom: 6px; }

  /* Score bar */
  .score-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .score-label { font-size: 11px; color: var(--muted); width: 38px; flex-shrink: 0; }
  .score-bar-bg { flex: 1; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }
  .score-val { font-size: 13px; font-weight: 700; min-width: 28px; text-align: right; }

  /* Card body */
  .card-body { padding: 14px 18px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }

  .method-text { font-size: 13px; color: var(--text); line-height: 1.6; }
  .method-zh { display: none; }

  .toggle-btn { font-size: 12px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 4px 0; font-weight: 500; }
  .toggle-section { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .toggle-section.open { display: block; }

  /* Metrics table */
  .metrics-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  .metrics-table th { text-align: left; font-weight: 600; color: var(--muted); padding: 4px 6px; border-bottom: 1px solid var(--border); }
  .metrics-table td { padding: 4px 6px; color: var(--text); }
  .metrics-table tr:nth-child(even) { background: var(--bg); }
  .metric-val { font-weight: 700; color: var(--score-high); }

  /* Scoring breakdown */
  .score-breakdown { display: grid; gap: 4px; }
  .sb-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid #f3f4f6; }
  .sb-dim { color: var(--muted); }
  .sb-score { font-weight: 600; }

  /* Figure placeholder */
  .figure-box { background: #f3f4f6; border-radius: var(--radius-sm); padding: 16px; text-align: center; margin-top: 8px; }

  /* Card footer */
  .card-footer { padding: 10px 18px; background: var(--bg); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .arxiv-link { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; }
  .arxiv-link:hover { text-decoration: underline; }
  .code-link { font-size: 12px; color: var(--accent2); text-decoration: none; font-weight: 500; }
  .code-link:hover { text-decoration: underline; }

  /* No results */
  .no-results { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }

  /* SVG figure style */
  .arch-svg { width: 100%; height: auto; border-radius: var(--radius-sm); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>CCReproduce · Daily AI Paper Digest</h1>
    <div class="subtitle">E-commerce content ecosystem &amp; influencer governance — LLM / VLM / MLLM focus</div>
  </div>
  <div class="lang-toggle">

<div class="controls">

  <div class="score-range">
    <input type="range" min="0" max="100" value="0" id="score-slider" oninput="updateScoreDisplay()" onchange="filterCards()"/>
    <span id="score-display">0</span>
  </div>

  <span class="ctrl-label" style="margin-left:12px">Bucket:</span>
  <div class="bucket-filter">
    <button class="bucket-btn all active" id="bucket-all" onclick="setBucket('all')">All</button>

</div>

<div class="count-bar" id="count-bar">Showing 6 papers</div>

<div class="grid" id="card-grid">

</div>

// ── State ─────────────────────────────────────────────────────────────────────
let currentLang = 'en';
let currentBucket = 'all';
let expandedSections = {}; // {cardId: {metrics: bool, innov: bool, score: bool, fig: bool}}

// ── Language toggle ───────────────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
  document.querySelectorAll('.method-en').forEach(el => el.style.display = lang === 'en' ? '' : 'none');
  document.querySelectorAll('.method-zh').forEach(el => el.style.display = lang === 'zh' ? '' : 'none');
}

// ── Score slider ──────────────────────────────────────────────────────────────
function updateScoreDisplay() {
  document.getElementById('score-display').textContent = document.getElementById('score-slider').value;
}

// ── Bucket filter ─────────────────────────────────────────────────────────────
function setBucket(bucket) {
  currentBucket = bucket;
  ['all','STRONG','WEAK'].forEach(b => {
    document.getElementById('bucket-' + b).classList.toggle('active', b === bucket);
  });
  filterCards();
}

// ── Main filter ───────────────────────────────────────────────────────────────
function filterCards() {
  const minScore = parseInt(document.getElementById('score-slider').value);
  const date = document.getElementById('date-picker').value;
  const grid = document.getElementById('card-grid');
  let visible = 0;

  grid.querySelectorAll('.card').forEach(card => {
    const score = parseInt(card.dataset.score);
    const bucket = card.dataset.bucket;
    const cardDate = card.dataset.date;
    const show =
      score >= minScore &&
      (currentBucket === 'all' || bucket === currentBucket) &&
      (date === 'all' || cardDate === date);
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  document.getElementById('count-bar').textContent = `Showing ${visible} paper${visible !== 1 ? 's' : ''}`;
}

// ── Toggle sections ───────────────────────────────────────────────────────────
function toggleSection(cardId, section) {
  if (!expandedSections[cardId]) expandedSections[cardId] = {};
  expandedSections[cardId][section] = !expandedSections[cardId][section];
  const el = document.getElementById(`${cardId}-${section}`);
  el.classList.toggle('open', expandedSections[cardId][section]);
}

// ── Score color ───────────────────────────────────────────────────────────────
function scoreColor(s) {
  if (s >= 80) return '#059669';
  if (s >= 60) return '#d97706';
  return '#dc2626';
}

const SVG_FN = { univid: unividSVG, anchor: anchorSVG, queryagent: queryagentSVG };

// ── Render cards ──────────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';

  PAPERS.forEach(p => {
    const sc = scoreColor(p.score);
    const pct = p.score;
    const fig = p.figure && SVG_FN[p.figure] ? SVG_FN[p.figure]() : null;

    // Score breakdown rows
    const sbRows = p.scoreBreakdown.map(([dim, score]) =>
      `<div class="sb-row"><span class="sb-dim">${dim}</span><span class="sb-score">${score}</span></div>`
    ).join('');

    // Metrics table rows
    const metRows = p.metrics.map(([ds, metric, val, base]) =>
      `<tr><td>${ds}</td><td>${metric}</td><td class="metric-val">${val}</td><td style="color:#6b7280">${base}</td></tr>`
    ).join('');

    const codeLink = p.code
      ? `<a class="code-link" href="${p.code}" target="_blank">📦 Code</a>`
      : '';

    const figHtml = fig
      ? `<button class="toggle-btn" onclick="toggleSection('${p.id}','fig')">📊 Architecture figure ▾</button>
         <div class="toggle-section" id="${p.id}-fig">
           <div style="margin-top:8px">${fig}</div>
         </div>`
      : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.score = p.score;
    card.dataset.bucket = p.bucket;
    card.dataset.date = p.date;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-meta">
          <span class="date-tag">${p.date}</span>
          <span class="bucket-badge ${p.bucket}">${p.bucket}</span>
          ${p.domains.map((d,i) => `<span class="domain-tag${i>0?' purple':''}">${d}</span>`).join('')}
        </div>
        <div class="card-title"><a href="${p.arxiv}" target="_blank">${p.title}</a></div>
        <div class="card-affil">${p.authors} · <strong>${p.affil}</strong></div>
        <div class="score-row">
          <span class="score-label">Score</span>
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${pct}%;background:${sc}"></div>
          </div>
          <span class="score-val" style="color:${sc}">${p.score}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="section-title">Method Overview</div>
        <div class="method-text method-en">${p.methodEn}</div>
        <div class="method-text method-zh" style="display:none">${p.methodZh}</div>

        ${figHtml}

        <div style="margin-top:10px">
          <button class="toggle-btn" onclick="toggleSection('${p.id}','innov')">💡 Innovation ▾</button>
          <div class="toggle-section" id="${p.id}-innov">
            <div class="method-text method-en" style="margin-top:6px">${p.innovEn}</div>
            <div class="method-text method-zh" style="margin-top:6px;display:none">${p.innovZh}</div>
          </div>
        </div>

        <div style="margin-top:8px">
          <button class="toggle-btn" onclick="toggleSection('${p.id}','metrics')">📊 Key Metrics ▾</button>
          <div class="toggle-section" id="${p.id}-metrics">
            <table class="metrics-table">
              <tr><th>Dataset</th><th>Metric</th><th>Ours</th><th>Baseline</th></tr>
              ${metRows}
            </table>
          </div>
        </div>

        <div style="margin-top:8px">
          <button class="toggle-btn" onclick="toggleSection('${p.id}','score')">🏅 Score Breakdown ▾</button>
          <div class="toggle-section" id="${p.id}-score">
            <div class="score-breakdown" style="margin-top:6px">${sbRows}</div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <a class="arxiv-link" href="${p.arxiv}" target="_blank">arXiv ↗</a>
        ${codeLink}
      </div>
    `;
    grid.appendChild(card);
  });

  setLang(currentLang);
  filterCards();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderCards();
</script>
