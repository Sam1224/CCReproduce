<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CCReproduce · 每日论文速览</title>
<style>
:root {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #1a1a1a;
  --subtext: #666;
  --border: #e0e0e0;
  --accent: #2563eb;
  --accent-light: #dbeafe;
  --tag: #e0e7ff;
  --tag-text: #3730a3;
  --score-hi: #16a34a;
  --score-mid: #ca8a04;
  --score-lo: #dc2626;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f1f5f9;
  --subtext: #94a3b8;
  --border: #334155;
  --accent: #60a5fa;
  --accent-light: #1e3a5f;
  --tag: #312e81;
  --tag-text: #a5b4fc;
  --shadow: 0 2px 8px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background .2s, color .2s;
  min-height: 100vh;
}
header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.logo { font-size: 1.2rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.logo span { color: var(--text); }
.controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.ctrl-group { display: flex; align-items: center; gap: 6px; }
label { font-size: 0.82rem; color: var(--subtext); white-space: nowrap; }
input[type=range] { width: 80px; accent-color: var(--accent); cursor: pointer; }
input[type=date] {
  font-size: 0.82rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
}
.btn {
  font-size: 0.8rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  transition: background .15s;
}
.btn:hover { background: var(--accent-light); }
.btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 16px;
}
.summary-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  box-shadow: var(--shadow);
}
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-n { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.75rem; color: var(--subtext); }
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
.filter-bar label { font-size: 0.82rem; color: var(--subtext); }
#score-val { font-weight: 600; color: var(--accent); min-width: 28px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: transform .15s, box-shadow .15s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.4; flex: 1; }
.score-badge {
  font-size: 1rem;
  font-weight: 700;
  min-width: 44px;
  height: 44px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.score-hi { background: #dcfce7; color: var(--score-hi); }
.score-mid { background: #fef9c3; color: var(--score-mid); }
.score-lo { background: #fee2e2; color: var(--score-lo); }
[data-theme="dark"] .score-hi { background: #14532d; color: #86efac; }
[data-theme="dark"] .score-mid { background: #713f12; color: #fde68a; }
[data-theme="dark"] .score-lo { background: #7f1d1d; color: #fca5a5; }
.meta { font-size: 0.78rem; color: var(--subtext); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.meta a { color: var(--accent); text-decoration: none; }
.meta a:hover { text-decoration: underline; }
.tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  font-size: 0.72rem;
  background: var(--tag);
  color: var(--tag-text);
  border-radius: 4px;
  padding: 2px 7px;
  font-weight: 500;
}
.section-label { font-size: 0.75rem; color: var(--subtext); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.desc { font-size: 0.85rem; line-height: 1.55; color: var(--text); }
.metric-row { font-size: 0.83rem; color: var(--subtext); }
.metric-row strong { color: var(--accent); }
.code-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.75rem;
  background: #f0fdf4;
  color: #15803d;
  border: 1px solid #bbf7d0;
  border-radius: 5px;
  padding: 3px 8px;
  font-weight: 600;
}
[data-theme="dark"] .code-badge { background: #052e16; color: #86efac; border-color: #14532d; }
.score-bars { display: flex; flex-direction: column; gap: 4px; }
.score-bar-row { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; }
.score-bar-label { width: 90px; color: var(--subtext); flex-shrink: 0; }
.score-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
.score-bar-val { width: 26px; text-align: right; color: var(--subtext); flex-shrink: 0; }
.empty { text-align: center; padding: 60px; color: var(--subtext); font-size: 0.9rem; }
#lang-toggle { font-weight: 600; }
</style>
</head>

const SCORE_LABELS_ZH = {
  innovation: "创新性",
  sota: "SOTA提升",
  exp: "实验质量",
  eff: "效率",
  gen: "泛化性",
  domain: "领域相关"
};
const SCORE_LABELS_EN = {
  innovation: "Innovation",
  sota: "SOTA Delta",
  exp: "Exp Quality",
  eff: "Efficiency",
  gen: "Generalization",
  domain: "Domain Rel."
};
const SCORE_MAX = { innovation: 30, sota: 15, exp: 15, eff: 10, gen: 5, domain: 25 };

let lang = "zh";
let minScore = 0;
let theme = "light";

function scoreClass(s) {
  if (s >= 80) return "score-hi";
  if (s >= 65) return "score-mid";
  return "score-lo";
}

function renderCard(p) {
  const title = lang === "zh" ? p.title_zh : p.title_en;
  const method = lang === "zh" ? p.method_zh : p.method_en;
  const metrics = lang === "zh" ? p.metrics_zh : p.metrics_en;
  const innovation = lang === "zh" ? p.innovation_zh : p.innovation_en;
  const tags = lang === "zh" ? p.tags_zh : p.tags_en;
  const scoreLabel = lang === "zh" ? SCORE_LABELS_ZH : SCORE_LABELS_EN;
  const methodLabel = lang === "zh" ? "方法" : "Method";
  const metricsLabel = lang === "zh" ? "关键指标" : "Key Metrics";
  const innovLabel = lang === "zh" ? "核心创新" : "Core Innovation";
  const scoreBreakLabel = lang === "zh" ? "评分明细" : "Score Breakdown";

  const scoreBars = Object.entries(p.scores).map(([k, v]) => {
    const pct = Math.round(100 * v / SCORE_MAX[k]);
    return `<div class="score-bar-row">
      <div class="score-bar-label">${scoreLabel[k]}</div>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%"></div></div>
      <div class="score-bar-val">${v}/${SCORE_MAX[k]}</div>
    </div>`;
  }).join("");

  const codePart = p.code
    ? `<span class="code-badge">✓ ${lang === "zh" ? "已复现" : "Reproduced"} · ${p.code_path}</span>`
    : "";

  return `<div class="card" data-id="${p.id}">
    <div class="card-header">
      <div class="card-title">${title}</div>
      <div class="score-badge ${scoreClass(p.score)}">${p.score}</div>
    </div>
    <div class="meta">
      <span>${p.authors}</span>
      <span>·</span>
      <span>${p.venue}</span>
      <span>·</span>
      <a href="https://arxiv.org/abs/${p.arxiv}" target="_blank" rel="noopener">arXiv:${p.arxiv}</a>
    </div>
    <div class="tags">${tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
    ${codePart}
    <div>
      <div class="section-label">${methodLabel}</div>
      <div class="desc" style="margin-top:4px">${method}</div>
    </div>
    <div>
      <div class="section-label">${metricsLabel}</div>
      <div class="metric-row" style="margin-top:4px"><strong>${metrics}</strong></div>
    </div>
    <div>
      <div class="section-label">${innovLabel}</div>
      <div class="desc" style="margin-top:4px">${innovation}</div>
    </div>
    <div>
      <div class="section-label" style="margin-bottom:6px">${scoreBreakLabel}</div>
      <div class="score-bars">${scoreBars}</div>
    </div>
  </div>`;
}

function render() {
  const selectedDate = document.getElementById("date-picker").value;
  const filtered = PAPERS.filter(p => p.score >= minScore && p.date === selectedDate);
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  if (filtered.length === 0) {
    grid.style.display = "none";
    empty.style.display = "block";
    document.getElementById("empty-msg").textContent =
      lang === "zh" ? "暂无符合条件的论文" : "No papers match the current filters";
  } else {
    grid.style.display = "grid";
    empty.style.display = "none";
    grid.innerHTML = filtered.map(renderCard).join("");
  }

  const totalForDate = PAPERS.filter(p => p.date === selectedDate);
  document.getElementById("s-total").textContent = totalForDate.length;
  document.getElementById("s-code").textContent = totalForDate.filter(p => p.code).length;
  document.getElementById("s-shown").textContent = filtered.length;
  document.getElementById("s-date").textContent = selectedDate;

  if (lang === "zh") {
    document.getElementById("l-total").textContent = "论文总数";
    document.getElementById("l-code").textContent = "已复现 (≥80)";
    document.getElementById("l-shown").textContent = "当前显示";
    document.getElementById("l-date").textContent = "数据日期 (GMT+8)";
    document.getElementById("empty-msg").textContent = "暂无符合条件的论文";
  } else {
    document.getElementById("l-total").textContent = "Total Papers";
    document.getElementById("l-code").textContent = "Reproduced (≥80)";
    document.getElementById("l-shown").textContent = "Shown";
    document.getElementById("l-date").textContent = "Data Date (GMT+8)";
    document.getElementById("empty-msg").textContent = "No papers match the current filters";
  }
}

document.getElementById("score-slider").addEventListener("input", function() {
  minScore = parseInt(this.value);
  document.getElementById("score-val").textContent = minScore;
  render();
});

document.getElementById("date-picker").addEventListener("change", render);

document.getElementById("lang-toggle").addEventListener("click", function() {
  lang = lang === "zh" ? "en" : "zh";
  this.textContent = lang === "zh" ? "EN" : "中";
  document.documentElement.lang = lang;
  render();
});

document.getElementById("theme-toggle").addEventListener("click", function() {
  theme = theme === "light" ? "dark" : "light";
  document.body.setAttribute("data-theme", theme);
  this.textContent = theme === "light" ? "🌙" : "☀️";
});

render();
</script>
</body>
</html>
