<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Paper Digest — 2026-05-30</title>
<style>
  :root {
    --bg: #f8f9fb;
    --card-bg: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --accent-strong: #1e40af;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --success: #16a34a;
    --warn: #d97706;
    --strong-tag: #2563eb;
    --weak-tag: #7c3aed;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ─── Header ─── */
  header {
    background: linear-gradient(135deg, #1e40af 0%, #2563eb 60%, #3b82f6 100%);
    color: white;
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header .meta { font-size: 12px; opacity: 0.85; margin-top: 4px; }
  .lang-toggle button {
    padding: 6px 14px;
    border: 1.5px solid rgba(255,255,255,0.5);
    background: transparent;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    margin-left: 6px;
  }
  .lang-toggle button.active, .lang-toggle button:hover {
    background: rgba(255,255,255,0.2);
    border-color: white;
  }

  /* ─── Controls ─── */
  .controls {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .controls input[type=range] { width: 180px; accent-color: var(--accent); }
  .score-display {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    min-width: 60px;
  }
  .bucket-filter {
    display: flex;
    gap: 8px;
  }
  .bucket-filter button {
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    background: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .bucket-filter button.active-strong {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent-strong);
  }
  .bucket-filter button.active-weak {
    background: #ede9fe;
    border-color: #7c3aed;
    color: #5b21b6;
  }
  .bucket-filter button.active-all {
    background: var(--text);
    border-color: var(--text);
    color: white;
  }
  .result-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* ─── Grid ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
    padding: 24px 32px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ─── Paper Card ─── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.10); transform: translateY(-2px); }

  .card-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: #fafbfc;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .tag-strong { background: var(--accent-light); color: var(--accent-strong); }
  .tag-weak   { background: #ede9fe; color: #5b21b6; }
  .tag-code   { background: #dcfce7; color: #15803d; }
  .tag-domain { background: #fef3c7; color: #92400e; }

  .card-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .card-meta a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .card-meta a:hover { text-decoration: underline; }

  /* Score bar */
  .score-section {
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .score-label { font-size: 11px; color: var(--text-muted); font-weight: 600; min-width: 40px; }
  .score-bar-wrap { flex: 1; background: var(--bg); border-radius: 6px; height: 8px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
  .score-val { font-size: 13px; font-weight: 800; min-width: 32px; text-align: right; }

  /* Sub-scores breakdown */
  .breakdown { padding: 0 18px 10px; display: none; }
  .breakdown.show { display: block; }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    font-size: 11px;
    border-bottom: 1px dashed var(--border);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-dim { color: var(--text-muted); }
  .breakdown-score { font-weight: 700; color: var(--text); }

  /* Body */
  .card-body { padding: 14px 18px; flex: 1; }
  .card-body .section-title {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin: 10px 0 4px;
  }
  .card-body .section-title:first-child { margin-top: 0; }

  .method-text, .innovation-text {
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.65;
  }
  .method-text.zh, .innovation-text.zh { display: none; }
  .method-text.en, .innovation-text.en { display: block; }

  /* Experiment block */
  .experiment-block {
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 12px;
  }
  .experiment-block table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    font-family: var(--mono);
  }
  .experiment-block th {
    text-align: left;
    color: var(--text-muted);
    padding: 2px 6px;
    border-bottom: 1px solid #bae6fd;
    font-size: 10px;
    font-weight: 700;
  }
  .experiment-block td { padding: 2px 6px; }
  .experiment-block .best { color: var(--success); font-weight: 700; }

  /* Figure placeholder */
  .figure-block {
    background: #f8f9fb;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-top: 8px;
    text-align: center;
  }
  .figure-svg { width: 100%; max-width: 320px; }

  /* Toggles */
  .toggle-row {
    display: flex;
    gap: 8px;
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    background: #fafbfc;
    flex-wrap: wrap;
  }
  .toggle-btn {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .toggle-btn:hover { background: #bfdbfe; }

  /* Footer */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; padding: 12px; }
    header, .controls { padding: 14px 16px; }
  }
</style>
</head>

let currentLang = 'en';
let currentBucket = 'all';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');

  document.querySelectorAll('.method-text.en, .innovation-text.en').forEach(el => {
    el.style.display = lang === 'en' ? 'block' : 'none';
  });
  document.querySelectorAll('.method-text.zh, .innovation-text.zh').forEach(el => {
    el.style.display = lang === 'zh' ? 'block' : 'none';
  });
}

function setBucket(bucket) {
  currentBucket = bucket;
  document.getElementById('btn-all').className = bucket === 'all' ? 'active-all' : '';
  document.getElementById('btn-strong').className = bucket === 'strong' ? 'active-strong' : '';
  document.getElementById('btn-weak').className = bucket === 'weak' ? 'active-weak' : '';
  filterCards();
}

function filterCards() {
  const minScore = parseInt(document.getElementById('score-slider').value);
  document.getElementById('score-val').textContent = `≥ ${minScore}`;

  let visible = 0;
  document.querySelectorAll('.card').forEach(card => {
    const score = parseInt(card.dataset.score);
    const bucket = card.dataset.bucket;
    const bucketOk = currentBucket === 'all' || bucket === currentBucket.toUpperCase();
    const show = score >= minScore && bucketOk;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  document.getElementById('result-count').textContent = `${visible} paper${visible !== 1 ? 's' : ''}`;
}

function getScoreColor(score) {
  if (score >= 80) return '#16a34a';
  if (score >= 70) return '#2563eb';
  if (score >= 60) return '#d97706';
  return '#64748b';
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('show');
}

function buildCard(p) {
  const color = getScoreColor(p.score);
  const scorePercent = p.score;

  const tagHtml = [
    `<span class="tag tag-${p.bucket.toLowerCase()}">${p.bucket}</span>`,
    ...p.domains.map(d => `<span class="tag tag-domain">${d}</span>`),
    p.hasCode ? `<span class="tag tag-code">Code ✓</span>` : '',
  ].join('');

  const breakdownHtml = Object.entries(p.breakdown).map(([dim, [got, max]]) =>
    `<div class="breakdown-row">
       <span class="breakdown-dim">${dim}</span>
       <span class="breakdown-score">${got}/${max}</span>
     </div>`
  ).join('');

  const metricsHtml = p.metrics.map(row =>
    `<tr><td>${row[0]}</td><td>${row[1]}</td><td class="best">${row[2]}</td><td>${row[3]}</td></tr>`
  ).join('');

  const ghLink = p.hasCode
    ? `<a href="https://github.com/Sam1224/CCReproduce/tree/daily/2026-05-30/code/${p.codeDir}" target="_blank">GitHub Code</a> ·`
    : '';

  return `
<div class="card" data-score="${p.score}" data-bucket="${p.bucket}" id="card-${p.id}">
  <div class="card-header">
    <div class="card-tags">${tagHtml}</div>
    <div class="card-title">${p.title}</div>
    <div class="card-meta">
      <span>📅 ${p.date}</span>
      <span>🏛️ ${p.affiliation}</span>
      <a href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv:${p.arxiv}</a>
      <span>${p.venue}</span>
    </div>
  </div>

  <div class="score-section">
    <span class="score-label">Score</span>
    <div class="score-bar-wrap">
      <div class="score-bar" style="width:${scorePercent}%; background:${color}"></div>
    </div>
    <span class="score-val" style="color:${color}">${p.score}</span>
  </div>

  <div class="breakdown" id="bd-${p.id}">
    ${breakdownHtml}
  </div>

  <div class="card-body">
    <div class="section-title">Method Overview</div>
    <div class="method-text en">${p.method_en}</div>
    <div class="method-text zh" style="display:none">${p.method_zh}</div>

    <div class="section-title">Innovation</div>
    <div class="innovation-text en">${p.innovation_en}</div>
    <div class="innovation-text zh" style="display:none">${p.innovation_zh}</div>

    <div class="section-title">Key Experiments</div>
    <div class="experiment-block" id="exp-${p.id}">
      <table>
        <thead><tr><th>Dataset/Task</th><th>Metric</th><th>This Work</th><th>vs. Baseline</th></tr></thead>
        <tbody>${metricsHtml}</tbody>
      </table>
    </div>
  </div>

  <div class="toggle-row">
    <button class="toggle-btn" onclick="toggleSection('bd-${p.id}')">Score Breakdown</button>
    ${p.hasCode ? `<button class="toggle-btn" onclick="window.open('https://github.com/Sam1224/CCReproduce/tree/daily/2026-05-30/code/${p.codeDir}')">View Code</button>` : ''}
    <a href="https://arxiv.org/abs/${p.arxiv}" target="_blank" style="font-size:11px;color:var(--accent);padding:4px 10px;font-weight:600;text-decoration:none;">arXiv ↗</a>
  </div>
</div>`;
}

// Render
const grid = document.getElementById('paper-grid');
const sorted = [...PAPERS].sort((a,b) => b.score - a.score);
grid.innerHTML = sorted.map(buildCard).join('');
filterCards();
</script>
</body>
</html>
