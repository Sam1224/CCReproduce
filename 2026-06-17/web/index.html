let lang = "en";

function scoreClass(s) {
  if (s >= 80) return "score-high";
  if (s >= 65) return "score-mid";
  return "score-low";
}

function maxScore(dim) {
  const maxes = {Innovation:30, Results:15, ExpQuality:15, Efficiency:10, Generalization:5, Relevance:25};
  return maxes[dim] || 10;
}

function renderCard(p) {
  const method = lang === "zh" ? p.method_zh : p.method_en;
  const innov  = lang === "zh" ? p.innovation_zh : p.innovation_en;

  const metricsHtml = p.metrics.map(([ds,m,v]) => `
    <tr><td>${ds}</td><td>${m}</td><td><strong>${v}</strong></td></tr>
  `).join("");

  const scoreHtml = Object.entries(p.scores).map(([dim, val]) => {
    const max = maxScore(dim);
    const pct = (val / max * 100).toFixed(0);
    return `<div class="score-row">
      <span class="score-label">${dim}</span>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div>
      <span class="score-num">${val}/${max}</span>
    </div>`;
  }).join("");

  const codeLink = p.code ? `<a class="link-btn primary" href="https://github.com/Sam1224/CCReproduce/tree/main/2026-06-17/${p.code}" target="_blank">Code</a>` : "";
  const arxivLink = p.arxiv ? `<a class="link-btn" href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv ${p.arxiv}</a>` : "";

  return `<div class="card" data-id="${p.id}" data-score="${p.score}" data-bucket="${p.bucket}" data-search="${(p.title+p.authors+p.tags.join(' ')).toLowerCase()}">
  <div class="card-header">
    <div class="card-badge">
      <span class="bucket-badge bucket-${p.bucket}">${p.bucket}</span>
      <span class="score-badge ${scoreClass(p.score)}">${p.score} / 100</span>
    </div>
    <div class="card-title">${p.title}</div>
    <div class="card-authors">${p.authors}</div>
    <div class="card-affil">${p.affil}</div>
    <div class="card-date">${p.date}</div>
  </div>
  <div class="card-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
  <div class="card-body">
    <div class="section-toggle" onclick="toggle(this)"><span>${lang==='zh'?'方法概述':'Method'}</span><span class="arrow">▶</span></div>
    <div class="section-content visible"><p>${method}</p></div>

    <div class="section-toggle" onclick="toggle(this)"><span>${lang==='zh'?'创新性':'Innovation'}</span><span class="arrow">▶</span></div>
    <div class="section-content"><p>${innov}</p></div>

    <div class="section-toggle" onclick="toggle(this)"><span>${lang==='zh'?'关键指标':'Key Metrics'}</span><span class="arrow">▶</span></div>
    <div class="section-content">
      <table class="metrics-table"><tr><th>Dataset</th><th>Metric</th><th>Value</th></tr>${metricsHtml}</table>
    </div>

    <div class="section-toggle" onclick="toggle(this)"><span>${lang==='zh'?'评分详情':'Score Breakdown'}</span><span class="arrow">▶</span></div>
    <div class="section-content"><div class="score-bars">${scoreHtml}</div><p style="margin-top:0.5rem;font-size:0.82rem;color:var(--accent);font-weight:700">Total: ${p.score} / 100</p></div>
  </div>
  <div class="card-footer">${arxivLink}${codeLink}</div>
</div>`;
}

function toggle(el) {
  el.classList.toggle("open");
  const content = el.nextElementSibling;
  content.classList.toggle("visible");
}

function filterAndRender() {
  const minScore = parseInt(document.getElementById("score-slider").value);
  const bucket   = document.getElementById("bucket-filter").value;
  const search   = document.getElementById("search-box").value.toLowerCase().trim();

  let shown = 0;
  const grid = document.getElementById("paper-grid");
  grid.innerHTML = papers
    .filter(p =>
      p.score >= minScore &&
      (bucket === "all" || p.bucket === bucket) &&
      (search === "" || p.title.toLowerCase().includes(search) || p.authors.toLowerCase().includes(search) || p.tags.some(t => t.includes(search)))
    )
    .sort((a, b) => b.score - a.score)
    .map(p => { shown++; return renderCard(p); })
    .join("");

  document.getElementById("shown-count").textContent = shown;
  if (shown === 0) {
    grid.innerHTML = '<div class="no-results">No papers match the current filters.</div>';
  }
}

document.getElementById("score-slider").addEventListener("input", e => {
  document.getElementById("score-val").textContent = e.target.value;
  filterAndRender();
});
document.getElementById("bucket-filter").addEventListener("change", filterAndRender);
document.getElementById("search-box").addEventListener("input", filterAndRender);

document.getElementById("lang-btn").addEventListener("click", () => {
  lang = lang === "en" ? "zh" : "en";
  filterAndRender();
});

filterAndRender();
</script>
