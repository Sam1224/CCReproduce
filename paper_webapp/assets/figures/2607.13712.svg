<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef6f1"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#14b8a6"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/></filter>
  </defs>
  <rect width="1120" height="620" rx="34" fill="url(#bg)"/>
  <text x="56" y="74" font-family="Inter, Arial" font-size="34" font-weight="800" fill="#0f172a">Groc-PO Methodology</text>
  <text x="56" y="112" font-family="Inter, Arial" font-size="18" fill="#475569">Stage-wise grounded preference optimization for truthful multimodal reasoning</text>

  <g filter="url(#shadow)">
    <rect x="56" y="160" width="226" height="300" rx="24" fill="#ffffff"/>
    <text x="86" y="206" font-family="Inter, Arial" font-size="20" font-weight="700" fill="#0f172a">Input</text>
    <rect x="86" y="232" width="166" height="112" rx="18" fill="#dbeafe" stroke="#93c5fd"/>
    <circle cx="138" cy="288" r="30" fill="#ef4444" opacity="0.85"/>
    <rect x="164" y="264" width="56" height="52" rx="10" fill="#f59e0b" opacity="0.82"/>
    <text x="88" y="382" font-family="Inter, Arial" font-size="16" fill="#334155">Image + prompt:</text>
    <text x="88" y="410" font-family="Inter, Arial" font-size="15" fill="#64748b">“Does the product claim match visible evidence?”</text>
  </g>

  <g font-family="Inter, Arial" font-size="18" font-weight="700" fill="#0f172a">
    <rect x="360" y="140" width="228" height="92" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="392" y="178">1. Object Grounding</text>
    <text x="392" y="207" font-size="14" font-weight="500" fill="#64748b">prefer visible-object evidence</text>

    <rect x="360" y="264" width="228" height="92" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="392" y="302">2. Context Grounding</text>
    <text x="392" y="331" font-size="14" font-weight="500" fill="#64748b">prefer consistent context</text>

    <rect x="360" y="388" width="228" height="92" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="392" y="426">3. Grounded Reasoning</text>
    <text x="392" y="455" font-size="14" font-weight="500" fill="#64748b">prefer faithful conclusion</text>
  </g>

  <path d="M282 310 C320 310 326 186 360 186" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
  <path d="M282 310 C320 310 326 310 360 310" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
  <path d="M282 310 C320 310 326 434 360 434" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="684" y="168" width="196" height="264" rx="28" fill="#ffffff"/>
    <text x="720" y="214" font-family="Inter, Arial" font-size="20" font-weight="800" fill="#0f172a">Groc-PO Loss</text>
    <text x="720" y="257" font-family="Inter, Arial" font-size="16" fill="#475569">Chosen grounded path</text>
    <rect x="720" y="276" width="124" height="16" rx="8" fill="#14b8a6"/>
    <text x="720" y="329" font-family="Inter, Arial" font-size="16" fill="#475569">Rejected drifting path</text>
    <rect x="720" y="348" width="82" height="16" rx="8" fill="#fb7185"/>
    <text x="720" y="395" font-family="Inter, Arial" font-size="15" fill="#64748b">maximize preference margin at each stage</text>
  </g>

  <path d="M588 310 C626 310 646 300 684 300" fill="none" stroke="url(#blue)" stroke-width="6" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="946" y="210" width="132" height="180" rx="26" fill="url(#blue)"/>
    <text x="976" y="260" font-family="Inter, Arial" font-size="20" font-weight="800" fill="#ffffff">Output</text>
    <text x="976" y="302" font-family="Inter, Arial" font-size="15" fill="#e0f2fe">lower</text>
    <text x="976" y="327" font-family="Inter, Arial" font-size="15" fill="#e0f2fe">hallucination</text>
    <text x="976" y="352" font-family="Inter, Arial" font-size="15" fill="#e0f2fe">risk</text>
  </g>
  <path d="M880 300 C910 300 916 300 946 300" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round"/>
</svg>
