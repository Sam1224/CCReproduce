<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" font-family="Inter, system-ui, sans-serif"><defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/></filter></defs><rect width="980" height="430" fill="#ffffff"/><text x="28" y="34" font-size="17" fill="#0f172a" font-weight="700" text-anchor="start">ProductConsistency — identity-preserving product image editing (SFT + RL)</text><text x="28" y="54" font-size="12" fill="#64748b" font-weight="400" text-anchor="start">Cyclic Consistency reward: description → edit → re-caption → similarity</text><line x1="28" y1="66" x2="952" y2="66" stroke="#cbd5e1" stroke-width="1"/><rect x="40" y="100" width="150" height="110" rx="12" fill="#f7f8fb" stroke="#0891b2" stroke-width="1.5" filter="url(#sh)"/><text x="115" y="124" font-size="13" fill="#0891b2" font-weight="700" text-anchor="middle">Product image</text><text x="115" y="148" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">🧴 logo + text</text><text x="115" y="168" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">desc: 'BrandX</text><text x="115" y="182" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">serum 30ml'</text><text x="115" y="200" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">+ edit instruction</text><rect x="250" y="110" width="160" height="90" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#sh)"/><text x="330" y="138" font-size="14" fill="#2563eb" font-weight="700" text-anchor="middle">Editor (SFT)</text><text x="330" y="158" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">Qwen-Image-Edit /</text><text x="330" y="174" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">Flux.1-Kontext</text><rect x="470" y="110" width="150" height="90" rx="12" fill="#f7f8fb" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/><text x="545" y="138" font-size="13" fill="#10b981" font-weight="700" text-anchor="middle">Edited image</text><text x="545" y="160" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">new scene,</text><text x="545" y="176" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">same identity</text><line x1="190" y1="155" x2="248" y2="155" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><line x1="410" y1="155" x2="468" y2="155" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><rect x="470" y="250" width="150" height="70" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/><text x="545" y="276" font-size="13" fill="#7c3aed" font-weight="700" text-anchor="middle">Re-caption</text><text x="545" y="296" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">(VLM/OCR)</text><rect x="250" y="250" width="160" height="70" rx="12" fill="#ffffff" stroke="#e11d48" stroke-width="1.5" filter="url(#sh)"/><text x="330" y="272" font-size="12" fill="#e11d48" font-weight="700" text-anchor="middle">Cyclic Consistency</text><text x="330" y="292" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">sim(desc, caption)</text><text x="330" y="308" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">→ RL reward</text><line x1="545" y1="200" x2="545" y2="248" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><line x1="468" y1="285" x2="412" y2="285" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><path d="M250 285 q -70 0 -70 -85 q 0 -45 70 -45" fill="none" stroke="#e11d48" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arr)"/><text x="120" y="250" font-size="11" fill="#e11d48" font-weight="600" text-anchor="middle">reward → policy update</text><rect x="700" y="150" width="240" height="110" rx="12" fill="#f7f8fb" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/><text x="820" y="176" font-size="14" fill="#f59e0b" font-weight="700" text-anchor="middle">Outcome</text><text x="820" y="200" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">OCR CER ↓ ~5×</text><text x="820" y="216" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">Seg CLIP-I / DINO-I ↑</text><text x="820" y="232" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">MLLM judge ↑</text><text x="820" y="248" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">(brand+text fidelity)</text><line x1="620" y1="175" x2="698" y2="175" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><text x="40" y="400" font-size="12" fill="#64748b" font-weight="500" text-anchor="start">Data: 87k SFT + 869 RL synthetic products w/ unique brand &amp; verifiable text; benchmark 174 imgs / 870 samples</text></svg>