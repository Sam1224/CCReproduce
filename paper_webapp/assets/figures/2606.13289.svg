<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#ecfeff"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">HYDRA-X</text>
  <text class="s" x="76" y="118">Holistic image+video tokenizer for native unified multimodal models</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="220" width="260" height="150" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="h" x="112" y="252">1) Inputs</text>
  <text class="p" x="112" y="282">images + videos</text>
  <text class="p" x="112" y="308">multi-task supervision</text>

  <rect x="380" y="220" width="340" height="200" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="h" x="400" y="252">2) Holistic tokenizer</text>
  <text class="m" x="400" y="282">single ViT for image+video</text>
  <text class="p" x="400" y="312">tubelet causal temporal attn</text>
  <text class="p" x="400" y="338">hierarchical temporal patchify</text>

  <rect x="750" y="220" width="320" height="200" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="h" x="770" y="252">3) Distillation</text>
  <text class="m" x="770" y="282">Decompressor</text>
  <text class="p" x="770" y="312">align compressed video latents</text>
  <text class="p" x="770" y="338">image teacher + video teacher</text>

  <rect x="92" y="450" width="978" height="150" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="h" x="112" y="482">4) Unified multimodal model</text>
  <text class="p" x="112" y="512">Same tokenizer supports understanding, generation, and editing</text>
  <text class="p" x="112" y="538">Tokenizer-stage source-target interaction (STI) improves editing consistency</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 352 295 L 380 295"/>
    <path d="M 720 320 L 750 320"/>
    <path d="M 560 420 L 560 450"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="375,295 363,288 363,302"/>
    <polygon points="745,320 733,313 733,327"/>
    <polygon points="560,450 553,438 567,438"/>
  </g>
</svg>
