<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f1f5f9"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#0ea5e9"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">HELMSMAN</text>
  <text class="s" x="76" y="118">Cost-effective SSD ANNS via clustering + userspace I/O + learned pruning</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="220" width="250" height="150" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="h" x="112" y="252">1) Vectors @ scale</text>
  <text class="p" x="112" y="282">billions of embeddings</text>
  <text class="p" x="112" y="308">stored on SSD (low DRAM)</text>

  <rect x="370" y="220" width="330" height="200" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="h" x="390" y="252">2) Userspace I/O</text>
  <text class="m" x="390" y="282">bypass kernel storage stack</text>
  <text class="p" x="390" y="312">higher SSD bandwidth utilization</text>
  <text class="p" x="390" y="338">stable tail latency</text>

  <rect x="730" y="220" width="340" height="200" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="h" x="750" y="252">3) Learned pruning</text>
  <text class="m" x="750" y="282">leveling-learned pruning</text>
  <text class="p" x="750" y="312">less redundant scans</text>
  <text class="p" x="750" y="338">better QPS / cost</text>

  <rect x="92" y="450" width="978" height="150" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="h" x="112" y="482">4) Fast construction & serving</text>
  <text class="p" x="112" y="512">GPU-assisted index build + elastic CPU workers</text>
  <text class="p" x="112" y="538">Production gains: ~90% DRAM saving and large QPS/$ improvements</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 342 295 L 370 295"/>
    <path d="M 700 320 L 730 320"/>
    <path d="M 560 420 L 560 450"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="365,295 353,288 353,302"/>
    <polygon points="725,320 713,313 713,327"/>
    <polygon points="560,450 553,438 567,438"/>
  </g>
</svg>
