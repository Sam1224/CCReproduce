<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 34px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0f172a;}
      .sub{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#475569;}
      .boxTitle{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0f172a;}
      .txt{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#334155;}
      .mono{font:600 13px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New"; fill:#334155;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="700" rx="28" fill="url(#bg)"/>
  <rect x="48" y="42" width="1104" height="86" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#accent)"/>
  <text class="title" x="76" y="92">DiffCold</text>
  <text class="sub" x="76" y="118">Cold-start item recommendation via retrieval-initialized conditional diffusion</text>

  <!-- Boxes -->
  <g filter="url(#shadow)">
    <rect x="60" y="170" width="330" height="470" rx="18" fill="#ffffff"/>
    <rect x="435" y="170" width="330" height="470" rx="18" fill="#ffffff"/>
    <rect x="810" y="170" width="330" height="470" rx="18" fill="#ffffff"/>
  </g>

  <!-- Left -->
  <text class="boxTitle" x="92" y="216">Inputs</text>
  <text class="txt" x="92" y="250">• Cold item content features</text>
  <text class="txt" x="92" y="280">• Warm items: behavioral embeddings</text>
  <text class="txt" x="92" y="310">• Similarity search in content space</text>

  <rect x="92" y="350" width="266" height="96" rx="14" fill="#f1f5f9"/>
  <text class="mono" x="110" y="382">Retriever (top-k neighbors)</text>
  <text class="txt" x="110" y="410">aggregate warm embeddings as</text>
  <text class="txt" x="110" y="434">a better diffusion start point</text>

  <!-- Middle -->
  <text class="boxTitle" x="467" y="216">Core Modules</text>

  <rect x="467" y="246" width="266" height="120" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="mono" x="485" y="280">Retrieval-enhanced Aggregator</text>
  <text class="txt" x="485" y="308">start = mean(emb(neighbors))</text>
  <text class="txt" x="485" y="334">avoid pure Gaussian noise</text>

  <rect x="467" y="386" width="266" height="140" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="mono" x="485" y="420">Conditional DDPM on embeddings</text>
  <text class="txt" x="485" y="448">x_t → ε_θ(x_t, t, content, start)</text>
  <text class="txt" x="485" y="474">iterative denoising to x_0</text>
  <text class="txt" x="485" y="500">learn behavioral manifold</text>

  <rect x="467" y="540" width="266" height="88" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="mono" x="485" y="572">Simulated alignment (aux)</text>
  <text class="txt" x="485" y="598">pull generated x0 toward warm</text>

  <!-- Right -->
  <text class="boxTitle" x="842" y="216">Outputs</text>
  <text class="txt" x="842" y="250">• Cold item behavioral embedding</text>
  <text class="txt" x="842" y="280">• Consistent warm/cold space</text>
  <text class="txt" x="842" y="310">• Better top-K recommendation</text>

  <rect x="842" y="350" width="266" height="150" rx="16" fill="#0b1220"/>
  <text class="mono" x="860" y="390" fill="#e2e8f0">User u · Item e</text>
  <text class="txt" x="860" y="420" fill="#e2e8f0">rank items by dot-product</text>
  <text class="txt" x="860" y="448" fill="#e2e8f0">warm: keep original embeddings</text>
  <text class="txt" x="860" y="476" fill="#e2e8f0">cold: use generated embeddings</text>

  <!-- Arrows -->
  <path d="M 390 405 C 420 405 420 405 435 405" stroke="#94a3b8" stroke-width="4" fill="none"/>
  <path d="M 765 405 C 795 405 795 405 810 405" stroke="#94a3b8" stroke-width="4" fill="none"/>
  <polygon points="430,405 418,398 418,412" fill="#94a3b8"/>
  <polygon points="805,405 793,398 793,412" fill="#94a3b8"/>
</svg>
