<svg xmlns="http://www.w3.org/2000/svg" width="760" height="660" viewBox="0 0 760 660">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrR" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#f43f5e"/>
    </marker>
    <marker id="arrO" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#f97316"/>
    </marker>
    <style>
      .t  { font:700 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0f172a }
      .s  { font:500 13px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#475569 }
      .h  { font:700 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0f172a }
      .p  { font:500 11.5px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#334155 }
      .m  { font:600 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; fill:#0f766e }
      .lbl{ font:600 11px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#475569 }
      .stage { font:800 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0ea5e9 }
    </style>
  </defs>
<rect width="760" height="660" rx="18" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="20" y="18" width="720" height="60" rx="14" fill="#ffffff"/></g>
  <rect x="20" y="18" width="720" height="5" rx="2.5" fill="url(#bar)"/>
  <text class="t" x="38" y="48">SRPFN</text>
  <text class="s" x="38" y="68">Synthetic-prior PFN -&gt; update-free single-pass next-item inference</text>

<rect x="60" y="82" width="26" height="18" rx="9" fill="#8b5cf6" opacity="0.16"/><text class="stage" x="67" y="95">pre</text>
<g filter="url(#sh)"><rect x="60" y="100" width="320" height="96" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/></g>
<text class="h" x="74" y="122">Synthetic Prior (offline, once)</text>
<text class="p" x="74" y="142">hDCSBM item graph + random walks</text>
<text class="p" x="74" y="160">-&gt; 25.6M synthetic sequences</text>
<text class="p" x="74" y="178">covers diverse transition regimes</text>
<g filter="url(#sh)"><rect x="420" y="100" width="280" height="96" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/></g>
<text class="h" x="434" y="122">Pretrain PFN  (once)</text>
<text class="p" x="434" y="142">causal Transformer trained to</text>
<text class="p" x="434" y="160">approximate posterior-predictive</text>
<text class="p" x="434" y="178">distribution (PPD)</text>
<line x1="380" y1="148" x2="420" y2="148" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<rect x="60" y="232" width="26" height="18" rx="9" fill="#0ea5e9" opacity="0.16"/><text class="stage" x="67" y="245">inf</text>
<g filter="url(#sh)"><rect x="60" y="250" width="320" height="96" rx="12" fill="#eff6ff" stroke="#bfdbfe"/></g>
<text class="h" x="74" y="272">Target-domain Support Set</text>
<text class="p" x="74" y="292">item-item transition samples</text>
<text class="p" x="74" y="310">(as in-context memory)</text>
<g filter="url(#sh)"><rect x="60" y="366" width="320" height="96" rx="12" fill="#ecfeff" stroke="#a5f3fc"/></g>
<text class="h" x="74" y="388">User Sequence Embedding</text>
<text class="p" x="74" y="408">low-rank PPMI + truncated SVD</text>
<text class="p" x="74" y="426">source/destination directionality</text>
<g filter="url(#sh)"><rect x="420" y="250" width="280" height="80" rx="12" fill="#f0fdfa" stroke="#99f6e4"/></g>
<text class="h" x="434" y="272">Causal Transformer Encoder</text>
<text class="p" x="434" y="292">encode user sequence -&gt; query q</text>
<g filter="url(#sh)"><rect x="420" y="366" width="280" height="96" rx="12" fill="#fefce8" stroke="#fde68a"/></g>
<text class="h" x="434" y="388">Cross-Attention over Support</text>
<text class="p" x="434" y="408">q attends to support-set memory</text>
<text class="p" x="434" y="426">gated posterior update</text>
<line x1="380" y1="290" x2="420" y2="290" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<line x1="380" y1="408" x2="420" y2="408" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<path d="M 560 330 L 560 366" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<g filter="url(#sh)"><rect x="60" y="510" width="640" height="80" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/></g>
<text class="h" x="74" y="532">Next-item Distribution   (update-free, ~1 min)</text>
<text class="p" x="74" y="552">single forward pass, NO gradient update at inference time</text>
<text class="m" x="74" y="570">p(next item | user seq, support set)</text>
<path d="M 560 462 L 560 510" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<path d="M 220 462 L 220 510" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/></svg>
