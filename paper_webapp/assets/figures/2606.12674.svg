<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#fdf2f8"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#db2777"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">Evoflux</text>
  <text class="s" x="76" y="118">Inference-time evolution for executable MCP tool workflows</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="220" width="260" height="170" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="h" x="112" y="252">1) Task input</text>
  <text class="p" x="112" y="282">goal + constraints</text>
  <text class="p" x="112" y="308">live MCP tool catalog</text>

  <rect x="382" y="220" width="330" height="170" rx="16" fill="#fdf2f8" stroke="#fbcfe8"/>
  <text class="h" x="402" y="252">2) Small planner</text>
  <text class="m" x="402" y="282">typed workflow graph</text>
  <text class="p" x="402" y="308">often fails to execute</text>

  <rect x="742" y="220" width="366" height="170" rx="16" fill="#faf5ff" stroke="#e9d5ff"/>
  <text class="h" x="762" y="252">3) Evo loop (test-time)</text>
  <text class="p" x="762" y="282">mutate → validate schemas</text>
  <text class="p" x="762" y="308">execute → score → select</text>

  <rect x="92" y="450" width="1016" height="160" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="h" x="112" y="482">4) Executable workflow</text>
  <text class="p" x="112" y="512">grounded in executed evidence</text>
  <text class="m" x="112" y="542">feasibility ↑ (≈3% → 17–24%)</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 352 305 L 382 305"/>
    <path d="M 712 305 L 742 305"/>
    <path d="M 590 390 L 590 450"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="377,305 365,298 365,312"/>
    <polygon points="737,305 725,298 725,312"/>
    <polygon points="590,450 583,438 597,438"/>
  </g>
</svg>
