<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="520" rx="18" fill="url(#bg)"/>

  <text x="28" y="54" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="800" fill="#0f172a">RA-RFT: Retrieval-Augmented Reinforcement Fine-Tuning</text>
  <text x="28" y="82" font-family="ui-sans-serif, system-ui" font-size="14" fill="#475569">Retrieve reasoning-analogous traces to improve RLVR training</text>

  <g filter="url(#shadow)">
    <rect x="60" y="150" width="260" height="140" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="80" y="185" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0f172a">Input</text>
    <text x="80" y="212" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Competition-level problem</text>
    <text x="80" y="234" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">(AIME/HMMT/BrUMO)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="135" width="480" height="170" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="380" y="170" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0f172a">Reasoning-utility retrieval</text>
    <text x="380" y="197" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Judge distills relevance labels</text>
    <text x="380" y="219" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Retriever trained for “analogous strategy”</text>
    <text x="380" y="241" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Retrieve 1 trace per problem</text>
  </g>

  <path d="M320 220 L360 220" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="130" y="330" width="640" height="135" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="150" y="365" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0f172a">RLVR with retrieved demonstrations</text>
    <text x="150" y="392" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Augment prompts → better rollouts → verifiable rewards → policy improvement</text>
    <text x="150" y="414" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Example: Qwen3-1.7B AIME25 41.6 → 48.7 (avg@32)</text>
  </g>

  <path d="M600 305 L600 330" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="28" y="492" font-family="ui-sans-serif, system-ui" font-size="13" fill="#475569">Highlights: consistent gains across AIME24/25, HMMT25, BrUMO25 with reasoning-aware retrieval</text>
</svg>
