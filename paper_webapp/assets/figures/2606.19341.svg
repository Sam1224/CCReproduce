<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" font-family="Inter, system-ui, sans-serif"><defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/></filter></defs><rect width="980" height="430" fill="#ffffff"/><text x="28" y="34" font-size="17" fill="#0f172a" font-weight="700" text-anchor="start">OmniAgent — Native Active Perception (POMDP / OTA cycle)</text><text x="28" y="54" font-size="12" fill="#64748b" font-weight="400" text-anchor="start">Long video + audio  -&gt;  on-demand Observe-Think-Act  -&gt;  persistent textual memory  -&gt;  answer</text><line x1="28" y1="66" x2="952" y2="66" stroke="#cbd5e1" stroke-width="1"/><rect x="40" y="100" width="150" height="120" rx="12" fill="#f7f8fb" stroke="#0891b2" stroke-width="1.5" filter="url(#sh)"/><text x="115" y="124" font-size="13" fill="#0891b2" font-weight="700" text-anchor="middle">Input (hours)</text><text x="115" y="150" font-size="12" fill="#64748b" font-weight="400" text-anchor="middle">🎞 frames</text><text x="115" y="166" font-size="12" fill="#64748b" font-weight="400" text-anchor="middle">🔊 audio</text><text x="115" y="182" font-size="12" fill="#64748b" font-weight="400" text-anchor="middle">🎬 AV clips</text><text x="115" y="208" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">query: 'why did</text><rect x="260" y="110" width="150" height="80" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" filter="url(#sh)"/><text x="335" y="134" font-size="14" fill="#2563eb" font-weight="700" text-anchor="middle">Observe</text><text x="335" y="154" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">browse / listen /</text><text x="335" y="170" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">watch on-demand</text><rect x="470" y="110" width="150" height="80" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/><text x="545" y="134" font-size="14" fill="#7c3aed" font-weight="700" text-anchor="middle">Think</text><text x="545" y="154" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">reason over</text><text x="545" y="170" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">memory + percept</text><rect x="680" y="110" width="150" height="80" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/><text x="755" y="134" font-size="14" fill="#10b981" font-weight="700" text-anchor="middle">Act</text><text x="755" y="154" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">next action or</text><text x="755" y="170" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">STOP &amp; answer</text><line x1="190" y1="150" x2="258" y2="150" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><line x1="410" y1="150" x2="468" y2="150" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><line x1="620" y1="150" x2="678" y2="150" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><path d="M755 190 q 30 60 -250 60 q -280 0 -245 -60" fill="none" stroke="#f59e0b" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arr)"/><text x="490" y="268" font-size="12" fill="#f59e0b" font-weight="600" text-anchor="middle">iterate until sufficient evidence (test-time scaling)</text><rect x="330" y="300" width="300" height="56" rx="12" fill="#f7f8fb" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/><text x="480" y="324" font-size="13" fill="#7c3aed" font-weight="700" text-anchor="middle">Persistent Textual Memory</text><text x="480" y="342" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">state depends on reasoning, not video length</text><rect x="700" y="300" width="240" height="56" rx="12" fill="#eff6ff" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/><text x="820" y="324" font-size="13" fill="#10b981" font-weight="700" text-anchor="middle">Answer / grounding</text><text x="820" y="342" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">LVBench 50.5% (&gt;72B)</text><line x1="630" y1="328" x2="698" y2="328" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><text x="40" y="392" font-size="12" fill="#64748b" font-weight="500" text-anchor="start">Train: Agentic SFT (best-of-N) → Agentic RL w/ TAURA (turn-level entropy credit assignment)</text></svg>