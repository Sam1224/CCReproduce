<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Arial, sans-serif" font-size="13">
  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">AIR: Atomic Intent Reasoning (2606.10357)</text>

  <!-- Offline Phase Box -->
  <rect x="20" y="45" width="200" height="130" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="65" text-anchor="middle" font-weight="bold" fill="#1e40af">OFFLINE PHASE</text>
  <text x="120" y="85" text-anchor="middle" fill="#1e40af" font-size="11">Content behaviors B_u</text>
  <rect x="40" y="93" width="160" height="36" rx="5" fill="#3b82f6"/>
  <text x="120" y="106" text-anchor="middle" fill="white" font-weight="bold">LLM</text>
  <text x="120" y="120" text-anchor="middle" fill="white" font-size="11">Intent Atomizer</text>
  <text x="120" y="145" text-anchor="middle" fill="#1e40af" font-size="11">Intent Atoms A_u</text>
  <rect x="50" y="153" width="140" height="16" rx="4" fill="#93c5fd"/>
  <text x="120" y="165" text-anchor="middle" fill="#1e40af" font-size="10">FAISS Index</text>

  <!-- Arrow offline → online -->
  <line x1="220" y1="125" x2="280" y2="125" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250" y="118" text-anchor="middle" fill="#374151" font-size="10">~400×</text>
  <text x="250" y="140" text-anchor="middle" fill="#374151" font-size="10">faster</text>

  <!-- Online Phase Box -->
  <rect x="280" y="45" width="210" height="130" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="385" y="65" text-anchor="middle" font-weight="bold" fill="#065f46">ONLINE SERVING</text>
  <text x="385" y="82" text-anchor="middle" fill="#065f46" font-size="11">User request (no LLM call!)</text>
  <rect x="300" y="88" width="170" height="36" rx="5" fill="#10b981"/>
  <text x="385" y="102" text-anchor="middle" fill="white" font-weight="bold">Atom Retrieval</text>
  <text x="385" y="116" text-anchor="middle" fill="white" font-size="11">+ Dynamic Composition</text>
  <text x="385" y="143" text-anchor="middle" fill="#065f46" font-size="11">Composed intent r_u</text>
  <rect x="305" y="150" width="160" height="16" rx="4" fill="#6ee7b7"/>
  <text x="385" y="162" text-anchor="middle" fill="#065f46" font-size="10">Attention-weighted pooling</text>

  <!-- Arrow online → ranking -->
  <line x1="490" y1="125" x2="545" y2="125" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Ranking Box -->
  <rect x="545" y="85" width="170" height="82" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="630" y="107" text-anchor="middle" font-weight="bold" fill="#92400e">Cross-domain</text>
  <text x="630" y="122" text-anchor="middle" font-weight="bold" fill="#92400e">Item Ranking</text>
  <text x="630" y="140" text-anchor="middle" fill="#92400e" font-size="11">score = r_u · item_emb</text>
  <text x="630" y="157" text-anchor="middle" fill="#92400e" font-size="11">E-commerce Items</text>

  <!-- Results Box -->
  <rect x="180" y="220" width="400" height="80" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="380" y="242" text-anchor="middle" font-weight="bold" fill="#111827">Key Results (Kuaishou E-commerce)</text>
  <text x="280" y="265" text-anchor="middle" fill="#374151" font-size="12">GMV: <tspan font-weight="bold" fill="#10b981">+3.446%</tspan></text>
  <text x="480" y="265" text-anchor="middle" fill="#374151" font-size="12">Latency: <tspan font-weight="bold" fill="#3b82f6">~400× faster</tspan></text>
  <text x="380" y="285" text-anchor="middle" fill="#374151" font-size="11">vs. online LLM inference baseline</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#374151"/>
    </marker>
  </defs>
</svg>
