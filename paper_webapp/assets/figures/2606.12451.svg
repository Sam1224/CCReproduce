<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#ecfeff"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">ToolSense</text>
  <text class="s" x="76" y="118">Diagnose parametric tool knowledge beyond constrained decoding</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="222" width="280" height="168" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="h" x="112" y="254">1) Tool catalog</text>
  <text class="p" x="112" y="284">name + description</text>
  <text class="p" x="112" y="310">~47k tools (ToolBench)</text>

  <rect x="404" y="222" width="340" height="168" rx="16" fill="#ecfeff" stroke="#bae6fd"/>
  <text class="h" x="424" y="254">2) ToolSense generator</text>
  <text class="m" x="424" y="284">LLM-assisted synthesis</text>
  <text class="p" x="424" y="312">hard negatives + tiers</text>

  <rect x="776" y="222" width="332" height="168" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="h" x="796" y="254">3) Diagnostic sets</text>
  <text class="p" x="796" y="284">RRB (realistic queries)</text>
  <text class="p" x="796" y="310">MCQ / QA probing</text>

  <rect x="92" y="430" width="1016" height="190" rx="16" fill="#fefce8" stroke="#fde68a"/>
  <text class="h" x="112" y="462">4) Evaluate tool retrievers</text>
  <text class="p" x="112" y="492">Compare constrained decoding vs free-form generation</text>
  <text class="m" x="112" y="522">Internalization Score = free@k / constrained@k</text>
  <text class="p" x="112" y="550">Reveal knowledge–retrieval dissociation under realistic queries</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 372 306 L 404 306"/>
    <path d="M 744 306 L 776 306"/>
    <path d="M 592 390 L 592 430"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="399,306 387,299 387,313"/>
    <polygon points="771,306 759,299 759,313"/>
    <polygon points="592,430 585,418 599,418"/>
  </g>
</svg>
