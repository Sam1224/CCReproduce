<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#ecfeff"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">OneRetrieval</text>
  <text class="s" x="76" y="118">Editable generative retrieval for multi-branch e-commerce recall</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="220" width="290" height="165" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="h" x="112" y="252">1) Query + context</text>
  <text class="p" x="112" y="282">user query / session</text>
  <text class="p" x="112" y="308">candidate attributes</text>

  <rect x="412" y="220" width="330" height="165" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
  <text class="h" x="432" y="252">2) KAE encoder</text>
  <text class="p" x="432" y="282">identifier positions</text>
  <text class="m" x="432" y="308">pos ↔ interpretable keyword</text>

  <rect x="772" y="220" width="336" height="165" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="h" x="792" y="252">3) Codebook + slots</text>
  <text class="p" x="792" y="282">grouped by attributes</text>
  <text class="m" x="792" y="308">reserved slots for new words</text>

  <rect x="92" y="440" width="1016" height="180" rx="16" fill="#fefce8" stroke="#fde68a"/>
  <text class="h" x="112" y="472">4) Editable binding + retrieval</text>
  <text class="p" x="112" y="502">Ops binds new keyword → reserved slot (hour-level)</text>
  <text class="p" x="112" y="528">Model generates identifiers → map to items → unify branches</text>
  <text class="m" x="112" y="556">edit(\"new_term\") = bind(slot_k)</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 382 302 L 412 302"/>
    <path d="M 742 302 L 772 302"/>
    <path d="M 590 385 L 590 440"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="407,302 395,295 395,309"/>
    <polygon points="767,302 755,295 755,309"/>
    <polygon points="590,440 583,428 597,428"/>
  </g>
</svg>
