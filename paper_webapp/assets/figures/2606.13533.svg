<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2ff"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">OneRetrieval</text>
  <text class="s" x="76" y="118">Editable generative retrieval with keyword-aligned multi-slot codes</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="220" width="250" height="150" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="h" x="112" y="252">1) Query</text>
  <text class="p" x="112" y="282">user intent + keywords</text>
  <text class="p" x="112" y="308">multi-branch retrieval input</text>

  <rect x="370" y="220" width="330" height="210" rx="16" fill="#faf5ff" stroke="#e9d5ff"/>
  <text class="h" x="390" y="252">2) KAE encoder</text>
  <text class="m" x="390" y="282">[c1..c6] aligned slots</text>
  <text class="p" x="390" y="312">category / brand / color / style</text>
  <text class="p" x="390" y="338">price / material</text>
  <text class="p" x="390" y="366">predict discrete codebook tokens</text>

  <rect x="730" y="220" width="340" height="210" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="h" x="750" y="252">3) Code-based retrieval</text>
  <text class="m" x="750" y="282">code → candidate items</text>
  <text class="p" x="750" y="312">replace multiple recall branches</text>
  <text class="p" x="750" y="338">optimize HR@K for deep recall</text>

  <rect x="92" y="470" width="978" height="130" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="h" x="112" y="502">4) Editability (serving-time)</text>
  <text class="m" x="112" y="532">reserved slots + intervention bypass</text>
  <text class="p" x="112" y="558">new keyword → force slot token; bind token → target item set (no retrain)</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 342 295 L 370 295"/>
    <path d="M 700 320 L 730 320"/>
    <path d="M 560 430 L 560 470"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="365,295 353,288 353,302"/>
    <polygon points="725,320 713,313 713,327"/>
    <polygon points="560,470 553,458 567,458"/>
  </g>
</svg>
