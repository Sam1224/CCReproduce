<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f0f9ff"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">Doc-to-Atom</text>
  <text class="s" x="76" y="118">Compile documents into reusable memory atoms, then compose for tasks</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="240" width="280" height="160" rx="16" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text class="h" x="112" y="272">1) Raw document</text>
  <text class="p" x="112" y="302">long text / tables</text>
  <text class="p" x="112" y="328">procedures / policies</text>

  <rect x="410" y="220" width="320" height="200" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
  <text class="h" x="430" y="252">2) Atom compiler</text>
  <text class="p" x="430" y="282">segment + normalize</text>
  <text class="p" x="430" y="308">extract atomic facts</text>
  <text class="m" x="430" y="344">atom = {key, value, type}</text>
  <text class="p" x="430" y="372">learnable compilation policy</text>

  <rect x="410" y="450" width="320" height="150" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="h" x="430" y="482">3) Memory bank</text>
  <text class="p" x="430" y="512">store atoms (parametric)</text>
  <text class="p" x="430" y="538">dedup + reuse across tasks</text>

  <rect x="770" y="240" width="350" height="360" rx="16" fill="#faf5ff" stroke="#e9d5ff"/>
  <text class="h" x="790" y="272">4) Atom composer</text>
  <text class="p" x="790" y="302">query → select atoms</text>
  <text class="p" x="790" y="328">compose reasoning chain</text>
  <text class="p" x="790" y="368">outputs:</text>
  <text class="p" x="810" y="396">• concise context</text>
  <text class="p" x="810" y="422">• structured plan</text>
  <text class="p" x="810" y="448">• answer / action</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 372 320 L 410 320"/>
    <path d="M 570 420 L 570 450"/>
    <path d="M 730 520 L 770 520"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="405,320 393,313 393,327"/>
    <polygon points="570,450 563,438 577,438"/>
    <polygon points="765,520 753,513 753,527"/>
  </g>
</svg>
