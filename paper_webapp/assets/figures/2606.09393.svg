<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Arial, sans-serif" font-size="13">
  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">CapRL++: RLVR for Dense Captioning (2606.09393)</text>

  <!-- Image/Video Input -->
  <rect x="20" y="55" width="120" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="80" text-anchor="middle" font-weight="bold" fill="#1e40af" font-size="12">Image/Video</text>
  <text x="80" y="97" text-anchor="middle" fill="#1e40af" font-size="10">Visual Input</text>
  <text x="80" y="113" text-anchor="middle" fill="#1e40af" font-size="10">1M pair dataset</text>

  <!-- Arrow -->
  <line x1="140" y1="90" x2="185" y2="90" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- LVLM Box -->
  <rect x="185" y="50" width="150" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="260" y="75" text-anchor="middle" font-weight="bold" fill="#4c1d95">LVLM Captioner</text>
  <text x="260" y="92" text-anchor="middle" fill="#4c1d95" font-size="10">InternLM2.5-7B</text>
  <text x="260" y="107" text-anchor="middle" fill="#4c1d95" font-size="10">+ CLIP-ViT-L</text>
  <text x="260" y="120" text-anchor="middle" fill="#4c1d95" font-size="10">cap = LVLM(image)</text>

  <!-- Arrow -->
  <line x1="335" y1="90" x2="385" y2="90" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- MCQ Scorer Box -->
  <rect x="385" y="45" width="180" height="90" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="475" y="68" text-anchor="middle" font-weight="bold" fill="#065f46">Vision-Free LLM</text>
  <text x="475" y="84" text-anchor="middle" fill="#065f46" font-size="11">MCQ Answering</text>
  <text x="475" y="100" text-anchor="middle" fill="#065f46" font-size="10">LLM reads caption only</text>
  <text x="475" y="115" text-anchor="middle" fill="#065f46" font-size="10">(no image access!)</text>
  <text x="475" y="127" text-anchor="middle" fill="#065f46" font-size="10">R = Accuracy(MCQ answers)</text>

  <!-- Reward arrow back -->
  <path d="M475 135 Q475 190 260 190 Q260 175 260 130" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arr3)"/>
  <text x="370" y="210" text-anchor="middle" fill="#065f46" font-size="11" font-weight="bold">Verifiable Reward R(cap)</text>
  <text x="370" y="225" text-anchor="middle" fill="#6b7280" font-size="10">Reference-free · No human annotation needed</text>

  <!-- RL Update Box -->
  <rect x="600" y="55" width="145" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="672" y="78" text-anchor="middle" font-weight="bold" fill="#92400e">GRPO / PPO</text>
  <text x="672" y="95" text-anchor="middle" fill="#92400e" font-size="10">L(θ) = -R(cap)</text>
  <text x="672" y="110" text-anchor="middle" fill="#92400e" font-size="10">∇_θ update</text>
  <text x="672" y="118" text-anchor="middle" fill="#92400e" font-size="9">batch=64 × 4 caps</text>

  <line x1="565" y1="88" x2="600" y2="88" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Results Box -->
  <rect x="100" y="265" width="570" height="62" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="385" y="285" text-anchor="middle" font-weight="bold" fill="#111827">Key Results: 3B model ≥ Qwen2.5-VL-72B on Prism Captioning</text>
  <text x="220" y="305" text-anchor="middle" fill="#374151" font-size="11">20+ benchmarks: <tspan font-weight="bold" fill="#10b981">SOTA</tspan></text>
  <text x="385" y="305" text-anchor="middle" fill="#374151" font-size="11">MCQ Accuracy: <tspan font-weight="bold" fill="#3b82f6">+12.4%</tspan></text>
  <text x="570" y="305" text-anchor="middle" fill="#374151" font-size="11">Efficiency: <tspan font-weight="bold" fill="#7c3aed">24× smaller</tspan></text>
  <text x="385" y="320" text-anchor="middle" fill="#6b7280" font-size="10">CapRL-Image-1M training dataset · Image + Video benchmarks</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#374151"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#10b981"/>
    </marker>
  </defs>
</svg>
