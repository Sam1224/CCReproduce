<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6" fill="#0f172a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="520" rx="18" fill="url(#bg)"/>

  <text x="28" y="54" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="800" fill="#0f172a">EvoArena + EvoMem</text>
  <text x="28" y="82" font-family="ui-sans-serif, system-ui" font-size="14" fill="#475569">Benchmark agents under evolving environments; keep memory as a patch history</text>

  <g filter="url(#shadow)">
    <rect x="60" y="140" width="260" height="160" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="80" y="175" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0f172a">Environment releases</text>
    <text x="80" y="202" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">v1 → v2 → v3 → …</text>
    <text x="80" y="224" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">APIs / workflows / code</text>
    <text x="80" y="246" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Preferences evolve</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="140" width="480" height="160" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="380" y="175" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0f172a">Agent memory</text>
    <text x="380" y="202" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Latest state (default)</text>
    <text x="380" y="224" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">+ EvoMem patch history (git-like)</text>
    <text x="380" y="246" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Before/after · rationale · evidence</text>
  </g>

  <path d="M320 220 L360 220" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="330" width="660" height="135" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="140" y="365" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0f172a">Evaluation</text>
    <text x="140" y="392" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Step accuracy vs chain accuracy on evolving task sequences</text>
    <text x="140" y="414" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">EvoMem improves chain accuracy (+3.7%) by preventing state collapse</text>
  </g>

  <text x="28" y="492" font-family="ui-sans-serif, system-ui" font-size="13" fill="#475569">Highlights: average accuracy ~39.6%; EvoMem gains on EvoArena and long-horizon benchmarks</text>
</svg>
