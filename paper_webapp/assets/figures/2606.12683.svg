<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2ff"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#0ea5e9"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">From AGI to ASI</text>
  <text class="s" x="76" y="118">Pathways × frictions (a research roadmap)</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="230" width="260" height="150" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="h" x="112" y="262">AGI</text>
  <text class="p" x="112" y="292">human-level generality</text>

  <rect x="382" y="210" width="726" height="210" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
  <text class="h" x="402" y="242">Four pathways to ASI</text>
  <text class="p" x="402" y="272">1) Scaling AGI  ·  2) Paradigm shifts</text>
  <text class="p" x="402" y="298">3) Recursive improvement  ·  4) Multi-agent collectives</text>

  <rect x="92" y="460" width="1016" height="150" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text class="h" x="112" y="492">Frictions & open questions</text>
  <text class="p" x="112" y="522">compute, data, engineering, alignment, governance…</text>
  <text class="p" x="112" y="548">How each friction impacts each pathway remains uncertain</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 352 305 L 382 305"/>
    <path d="M 590 420 L 590 460"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="377,305 365,298 365,312"/>
    <polygon points="590,460 583,448 597,448"/>
  </g>
</svg>
