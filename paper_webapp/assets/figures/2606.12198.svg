<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2ff"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#22c55e"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">LLM-Based User Personas</text>
  <text class="s" x="76" y="118">Async persona generation + distillation for scalable recommendation</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <!-- left column -->
  <rect x="92" y="220" width="300" height="170" rx="16" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text class="h" x="112" y="252">1) User signals</text>
  <text class="p" x="112" y="282">click / watch / purchase</text>
  <text class="p" x="112" y="308">creator follows + categories</text>
  <text class="p" x="112" y="334">recent sequences + stats</text>

  <rect x="92" y="420" width="300" height="160" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="h" x="112" y="452">2) Feature encoder</text>
  <text class="m" x="112" y="480">user embedding u</text>
  <text class="p" x="112" y="508">normalize + project features</text>

  <!-- middle -->
  <rect x="430" y="220" width="340" height="190" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
  <text class="h" x="450" y="252">3) Persona clustering</text>
  <text class="p" x="450" y="282">group similar users</text>
  <text class="p" x="450" y="308">centroid → persona seed</text>
  <text class="p" x="450" y="334">reduces LLM calls</text>
  <text class="m" x="450" y="366">cluster_id, centroid</text>

  <rect x="430" y="430" width="340" height="150" rx="16" fill="#fefce8" stroke="#fde68a"/>
  <text class="h" x="450" y="462">4) Async LLM persona</text>
  <text class="p" x="450" y="492">prompt(cluster summary)</text>
  <text class="p" x="450" y="518">generate persona text + tags</text>

  <!-- right -->
  <rect x="810" y="220" width="310" height="170" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="h" x="830" y="252">5) Persona embedding</text>
  <text class="p" x="830" y="282">encode persona → p</text>
  <text class="p" x="830" y="308">attach to user features</text>

  <rect x="810" y="420" width="310" height="160" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="h" x="830" y="452">6) Distilled serving</text>
  <text class="p" x="830" y="482">train small model: (u, p) → score</text>
  <text class="p" x="830" y="510">LLM offline, fast online</text>

  <!-- arrows -->
  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 392 305 L 430 305"/>
    <path d="M 260 390 L 260 420"/>
    <path d="M 392 500 L 430 500"/>
    <path d="M 770 305 L 810 305"/>
    <path d="M 770 505 L 810 505"/>
    <path d="M 980 390 L 980 420"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="425,305 413,298 413,312"/>
    <polygon points="260,420 253,408 267,408"/>
    <polygon points="425,500 413,493 413,507"/>
    <polygon points="805,305 793,298 793,312"/>
    <polygon points="805,505 793,498 793,512"/>
    <polygon points="980,420 973,408 987,408"/>
  </g>
</svg>
