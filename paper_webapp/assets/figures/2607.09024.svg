<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520"><style>text{font-family:Inter,Arial;fill:#162036}.box{fill:white;stroke:#ccd7ff;stroke-width:2}</style><rect width="900" height="520" rx="28" fill="#f6f8ff"/><text x="42" y="58" font-size="30" font-weight="700">GenCeption: Generation as Vision Pretraining</text><rect class="box" x="70" y="130" width="210" height="130" rx="22"/><text x="100" y="175" font-size="19" font-weight="700">Text-to-Video DiT</text><text x="100" y="210" font-size="14">spatiotemporal priors</text><rect class="box" x="345" y="130" width="210" height="130" rx="22"/><text x="375" y="175" font-size="19" font-weight="700">Multi-task Post-train</text><text x="375" y="210" font-size="14">synthetic dense/sparse data</text><rect class="box" x="620" y="130" width="210" height="130" rx="22"/><text x="650" y="175" font-size="19" font-weight="700">Unified Vision Model</text><text x="650" y="210" font-size="14">prompt-steered tasks</text><path d="M280 195 L345 195 M555 195 L620 195" stroke="#6b7cff" stroke-width="4"/><text x="115" y="365" font-size="20">Input: product / creator video + task prompt</text><text x="115" y="405" font-size="20">Output: depth, segmentation, pose, keypoints, captions-ready structure</text></svg>