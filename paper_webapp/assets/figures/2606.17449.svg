<g filter="url(#sh)"><rect x="120" y="434" width="300" height="56" rx="12" fill="#f0fdfa" stroke="#99f6e4"/></g>
<text class="h" x="134" y="456">Ret-Agent</text>
<text class="p" x="134" y="476">retrieval + manifold filter</text>
<line x1="270.0" y1="418" x2="270.0" y2="434" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<g filter="url(#sh)"><rect x="120" y="506" width="300" height="56" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/></g>
<text class="h" x="134" y="528">Rea-Agent</text>
<text class="p" x="134" y="548">MCTS causal DAG reasoning</text>
<line x1="270.0" y1="490" x2="270.0" y2="506" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<g filter="url(#sh)"><rect x="120" y="578" width="300" height="56" rx="12" fill="#fff7ed" stroke="#fed7aa"/></g>
<text class="h" x="134" y="600">Gen-Agent</text>
<text class="p" x="134" y="620">generation + logit perturbation</text>
<line x1="270.0" y1="562" x2="270.0" y2="578" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<g filter="url(#sh)"><rect x="470" y="330" width="230" height="120" rx="12" fill="#fff1f2" stroke="#fecdd3"/></g>
<text class="h" x="484" y="352">PORAG Overseer</text>
<text class="p" x="484" y="372">triple-consistency check</text>
<text class="p" x="484" y="390">over agent outputs</text>
<text class="p" x="484" y="408"></text>
<text class="p" x="484" y="426">recursive fallback -&gt;</text>
<path d="M 420 606.0 C 440 606.0, 470 430, 470 430" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<path d="M 470 360 C 440 320, 420 516, 420 534.0" fill="none" stroke="#f43f5e" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrR)"/>
<text class="lbl" x="450" y="320">recursive fallback</text>
<g filter="url(#sh)"><rect x="470" y="480" width="230" height="56" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/></g>
<text class="h" x="484" y="502">Hallucination-free report</text>
<line x1="585" y1="450" x2="585" y2="480" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/></svg>
