<text class="lbl" x="510.0" y="192">low risk</text>
<text class="lbl" x="40" y="285">high risk (F &gt; gamma)</text>
<path d="M 290.0 230 C 200 250, 270.0 260, 270.0 290" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<g filter="url(#sh)"><rect x="120" y="290" width="300" height="56" rx="12" fill="#eff6ff" stroke="#bfdbfe"/></g>
<text class="h" x="134" y="312">Per-Agent</text>
<text class="p" x="134" y="332">perception / parse</text>
<g filter="url(#sh)"><rect x="120" y="362" width="300" height="56" rx="12" fill="#ecfeff" stroke="#a5f3fc"/></g>
<text class="h" x="134" y="384">Cor-Agent</text>
<text class="p" x="134" y="404">cross-modal correction</text>
