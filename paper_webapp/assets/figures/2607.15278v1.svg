<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520"><rect width="960" height="520" rx="28" fill="#fbfdff"/><text x="48" y="60" font-family="Inter,Arial" font-size="28" font-weight="800" fill="#0f172a">HDR: Hierarchical Denoising</text><g fill="none" stroke-width="4"><path d="M130 250 C260 100, 420 100, 550 250" stroke="#2563eb"/><path d="M130 250 C260 400, 420 400, 550 250" stroke="#10b981"/><path d="M550 250 C660 175, 760 175, 850 250" stroke="#f59e0b"/><path d="M550 250 C660 325, 760 325, 850 250" stroke="#ef4444"/></g><g font-family="Inter,Arial" text-anchor="middle"><circle cx="130" cy="250" r="48" fill="#dbeafe"/><text x="130" y="256" font-size="15" fill="#1e3a8a">prompt</text><circle cx="550" cy="250" r="58" fill="#d1fae5"/><text x="550" y="246" font-size="15" fill="#065f46">coarse</text><text x="550" y="266" font-size="15" fill="#065f46">planning</text><circle cx="850" cy="250" r="54" fill="#fff7ed"/><text x="850" y="246" font-size="15" fill="#9a3412">streamed</text><text x="850" y="266" font-size="15" fill="#9a3412">states</text></g><text x="80" y="450" font-family="Inter,Arial" font-size="17" fill="#475569">Tree-structured latents keep uncertain hypotheses at coarse levels, then refine into visual states with sparse hierarchical attention.</text></svg>