<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="720" height="420" fill="#f8fbff"/>
  <rect x="24" y="24" width="672" height="372" rx="24" fill="#ffffff" stroke="#dbe7ff"/>
  <text x="40" y="58" font-size="24" font-weight="700" fill="#0f172a">Rubric4Setwise · Methodology Overview</text>
  <text x="40" y="84" font-size="14" fill="#475569">Query-specific rubrics turn retrieval from relevance-only ranking into evidence-set optimization.</text>
  <rect x="42" y="118" width="148" height="88" rx="18" fill="#eef4ff" stroke="#bfd3ff"/>
  <text x="58" y="148" font-size="16" font-weight="700" fill="#1d4ed8">Input Query</text>
  <text x="58" y="176" font-size="13" fill="#334155">"Is this creator review</text>
  <text x="58" y="194" font-size="13" fill="#334155">consistent with product facts?"</text>
  <rect x="220" y="118" width="168" height="88" rx="18" fill="#effcf6" stroke="#b7f0cf"/>
  <text x="236" y="148" font-size="16" font-weight="700" fill="#047857">Rubric Generator</text>
  <text x="236" y="176" font-size="13" fill="#334155">coverage · conflict</text>
  <text x="236" y="194" font-size="13" fill="#334155">redundancy · authenticity</text>
  <rect x="418" y="118" width="126" height="88" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="434" y="148" font-size="16" font-weight="700" fill="#c2410c">Candidate Set</text>
  <text x="434" y="176" font-size="13" fill="#334155">docs A / B / C / D</text>
  <text x="434" y="194" font-size="13" fill="#334155">from search / RAG</text>
  <rect x="566" y="118" width="110" height="88" rx="18" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="582" y="148" font-size="16" font-weight="700" fill="#6d28d9">Setwise Rank</text>
  <text x="582" y="176" font-size="13" fill="#334155">select the best</text>
  <text x="582" y="194" font-size="13" fill="#334155">evidence bundle</text>
  <path d="M190 162H220" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M388 162H418" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M544 162H566" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="44" y="248" width="632" height="110" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="278" font-size="16" font-weight="700" fill="#0f172a">Output evidence set for governance / RAG</text>
  <text x="60" y="305" font-size="14" fill="#334155">• complementary creator posts  • official spec sheet  • no conflicting claims  • fewer but denser documents</text>
  <text x="60" y="334" font-size="14" fill="#334155">This is useful for e-commerce moderation, product fact checking, and creator-content quality review.</text>
