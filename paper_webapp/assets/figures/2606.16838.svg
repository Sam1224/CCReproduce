<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrR" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#f43f5e"/>
    </marker>
    <marker id="arrO" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#f97316"/>
    </marker>
    <style>
      .t  { font:700 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0f172a }
      .s  { font:500 13px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#475569 }
      .h  { font:700 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0f172a }
      .p  { font:500 11.5px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#334155 }
      .m  { font:600 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; fill:#0f766e }
      .lbl{ font:600 11px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#475569 }
      .stage { font:800 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0ea5e9 }
    </style>
  </defs>
<rect width="760" height="760" rx="18" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="20" y="18" width="720" height="60" rx="14" fill="#ffffff"/></g>
  <rect x="20" y="18" width="720" height="5" rx="2.5" fill="url(#bar)"/>
  <text class="t" x="38" y="48">OneRank</text>
  <text class="s" x="38" y="68">Transformer-native multi-task ranking (bottom -&gt; top forward pass)</text>

<rect x="60" y="580" width="26" height="18" rx="9" fill="#0ea5e9" opacity="0.16"/><text class="stage" x="67" y="593">in</text>
<g filter="url(#sh)"><rect x="60" y="600" width="640" height="110" rx="12" fill="#eff6ff" stroke="#bfdbfe"/></g>
<text class="h" x="74" y="622">1. Structured Tokenization</text>
<text class="p" x="74" y="642">Interaction History  |  Preference Anchor</text>
<text class="m" x="74" y="660">per-candidate group:  [ candidate e_i + task tokens t1 / t2 / t3 ]</text>
<text class="p" x="74" y="678">tokens assembled into one sequence</text>
<rect x="60" y="450" width="26" height="18" rx="9" fill="#14b8a6" opacity="0.16"/><text class="stage" x="67" y="463">x L</text>
<g filter="url(#sh)"><rect x="60" y="470" width="640" height="92" rx="12" fill="#ecfeff" stroke="#a5f3fc"/></g>
<text class="h" x="74" y="492">2. Task-Specific Encoding  (x L layers)</text>
<text class="p" x="74" y="512">masked multi-head self-attention</text>
<text class="p" x="74" y="530">the 3 task tokens are MUTUALLY INVISIBLE -&gt; early specialization</text>
<rect x="60" y="330" width="26" height="18" rx="9" fill="#8b5cf6" opacity="0.16"/><text class="stage" x="67" y="343">ctx</text>
<g filter="url(#sh)"><rect x="60" y="350" width="640" height="82" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/></g>
<text class="h" x="74" y="372">3. Candidate-Aware Contextualization</text>
<text class="p" x="74" y="392">Situational Descriptor -&gt; per-task query</text>
<text class="p" x="74" y="410">per-task multi-head cross-attention over candidates -&gt; h_k</text>
<rect x="60" y="210" width="26" height="18" rx="9" fill="#f97316" opacity="0.16"/><text class="stage" x="67" y="223">mtl</text>
<g filter="url(#sh)"><rect x="60" y="230" width="640" height="82" rx="12" fill="#fefce8" stroke="#fde68a"/></g>
<text class="h" x="74" y="252">4. Multi-Task Prediction</text>
<text class="p" x="74" y="272">cross-task relational attention over {h_k}</text>
<text class="p" x="74" y="290">GRADIENT DETACHMENT: only diagonal/self grads flow -&gt; z_k</text>
<rect x="60" y="90" width="26" height="18" rx="9" fill="#22c55e" opacity="0.16"/><text class="stage" x="67" y="103">out</text>
<g filter="url(#sh)"><rect x="60" y="110" width="640" height="82" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/></g>
<text class="h" x="74" y="132">5. Matching-based Scoring</text>
<text class="m" x="74" y="152">s_i = z_k . r_k^i   (inner product per task)</text>
<text class="p" x="74" y="170">Click  /  Cart  /  Order  scores</text>
<line x1="380.0" y1="600" x2="380.0" y2="562" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<line x1="380.0" y1="470" x2="380.0" y2="432" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<line x1="380.0" y1="350" x2="380.0" y2="312" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<line x1="380.0" y1="230" x2="380.0" y2="192" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/></svg>
