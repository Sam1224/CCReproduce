<text class="h" x="434" y="172">Models</text>
<text class="p" x="434" y="192">GlobalPop / CatPop</text>
<text class="p" x="434" y="210">UserCF / ItemCF</text>
<text class="p" x="434" y="228">ExplicitMF / ImplicitMF</text>
<text class="p" x="434" y="246">CBF</text>
<g filter="url(#sh)"><rect x="615" y="150" width="115" height="130" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/></g>
<text class="h" x="629" y="172">Eval</text>
<text class="p" x="629" y="192">HR@K</text>
<text class="p" x="629" y="210">NDCG@K</text>
<line x1="205" y1="215" x2="225" y2="215" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<line x1="400" y1="215" x2="420" y2="215" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<line x1="595" y1="215" x2="615" y2="215" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<g filter="url(#sh)"><rect x="255" y="400" width="220" height="96" rx="12" fill="#fefce8" stroke="#fde68a"/></g>
<text class="h" x="269" y="422">k-core sparsity ablation</text>
