<text class="p" x="269" y="478">ItemCF most robust</text>
<g filter="url(#sh)"><rect x="510" y="400" width="220" height="96" rx="12" fill="#fff7ed" stroke="#fed7aa"/></g>
<text class="h" x="524" y="422">Language-stratified CBF</text>
<text class="p" x="524" y="442">char 1-2gram TF-IDF</text>
<text class="p" x="524" y="460">Banglish NDCG@10 -46.8%</text>
<text class="p" x="524" y="478">vs Bengali users</text>
<path d="M 660 280 C 660 340, 420 350, 365 400" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<path d="M 690 280 C 700 340, 640 360, 620 400" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/></svg>
