<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#0ea5e9"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/></filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 Z" fill="#94a3b8"/></marker>
    <marker id="arB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 Z" fill="#0284c7"/></marker>
    <style>
      .t{font:700 21px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#0f172a}
      .s{font:500 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#64748b}
      .h{font:700 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#0f172a}
      .p{font:500 10.5px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#475569}
      .m{font:600 10px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#b45309}
      .big{font:700 13px ui-sans-serif,system-ui;fill:#0f172a}
    </style>
  </defs>

  <rect width="900" height="460" rx="20" fill="url(#bg)"/>
  <rect x="20" y="18" width="860" height="56" rx="14" fill="#fff" filter="url(#sh)"/>
  <rect x="20" y="18" width="860" height="5" rx="2.5" fill="url(#bar)"/>
  <text class="t" x="40" y="46">AGAR</text>
  <text class="s" x="40" y="64">Attention-guided adaptive rendering — "magnify what matters" for visual text comprehension</text>

  <!-- 1 page image -->
  <rect x="24" y="118" width="124" height="170" rx="12" fill="#fff" stroke="#cbd5e1"/>
  <text class="h" x="36" y="138">1) Text -&gt; page</text>
  <rect x="36" y="146" width="100" height="130" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <g fill="#cbd5e1"><rect x="44" y="156" width="84" height="5" rx="2"/><rect x="44" y="167" width="84" height="5" rx="2"/><rect x="44" y="178" width="60" height="5" rx="2"/><rect x="44" y="189" width="84" height="5" rx="2"/><rect x="44" y="200" width="84" height="5" rx="2"/><rect x="44" y="211" width="70" height="5" rx="2"/><rect x="44" y="222" width="84" height="5" rx="2"/><rect x="44" y="233" width="50" height="5" rx="2"/><rect x="44" y="244" width="84" height="5" rx="2"/><rect x="44" y="255" width="64" height="5" rx="2"/></g>
  <text class="m" x="36" y="282">rendered image</text>

  <!-- 2 VLM reads -->
  <rect x="172" y="150" width="110" height="108" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text class="h" x="184" y="172">2) VLM reads</text>
  <text class="p" x="184" y="192">first pass</text>
  <text class="p" x="184" y="210">over page image</text>
  <text class="m" x="184" y="234">collect attention</text>

  <!-- 3 attention top-K -->
  <rect x="306" y="118" width="146" height="170" rx="12" fill="#fef3c7" stroke="#fcd34d"/>
  <text class="h" x="318" y="138">3) Attention locate</text>
  <text class="p" x="318" y="156">mid / late layers</text>
  <text class="p" x="318" y="172">top-K salient patches</text>
  <rect x="318" y="182" width="122" height="80" rx="6" fill="#fff" stroke="#fcd34d"/>
  <g><rect x="326" y="190" width="22" height="22" rx="3" fill="#fde68a"/><rect x="352" y="190" width="22" height="22" rx="3" fill="#f59e0b"/><rect x="378" y="190" width="22" height="22" rx="3" fill="#fde68a"/><rect x="404" y="190" width="22" height="22" rx="3" fill="#fde68a"/>
  <rect x="326" y="216" width="22" height="22" rx="3" fill="#fde68a"/><rect x="352" y="216" width="22" height="22" rx="3" fill="#fde68a"/><rect x="378" y="216" width="22" height="22" rx="3" fill="#ea580c"/><rect x="404" y="216" width="22" height="22" rx="3" fill="#fde68a"/></g>
  <text class="m" x="318" y="280">heat = importance</text>

  <!-- 4 map to word spans -->
  <rect x="476" y="150" width="142" height="108" rx="12" fill="#ecfeff" stroke="#a5f3fc"/>
  <text class="h" x="488" y="172">4) Map to spans</text>
  <text class="p" x="488" y="192">patches -&gt; word spans</text>
  <rect x="488" y="202" width="118" height="42" rx="6" fill="#fff" stroke="#a5f3fc"/>
  <text class="m" x="496" y="220" fill="#0e7490">net  margin  rate</text>
  <text class="p" x="496" y="237">key tokens</text>

  <!-- 5 re-render magnified -->
  <rect x="642" y="118" width="128" height="170" rx="12" fill="#fff" stroke="#fdba74"/>
  <text class="h" x="654" y="138">5) Re-render</text>
  <rect x="654" y="146" width="104" height="130" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <g fill="#cbd5e1"><rect x="662" y="156" width="88" height="5" rx="2"/><rect x="662" y="167" width="60" height="5" rx="2"/></g>
  <rect x="662" y="178" width="88" height="26" rx="4" fill="#fed7aa" stroke="#fb923c"/>
  <text class="big" x="670" y="197" fill="#c2410c">MAGNIFIED</text>
  <g fill="#cbd5e1"><rect x="662" y="212" width="88" height="5" rx="2"/><rect x="662" y="223" width="70" height="5" rx="2"/><rect x="662" y="234" width="88" height="5" rx="2"/><rect x="662" y="245" width="50" height="5" rx="2"/><rect x="662" y="256" width="88" height="5" rx="2"/></g>
  <text class="m" x="654" y="282">spans enlarged</text>

  <!-- 6 re-infer answer -->
  <rect x="640" y="320" width="230" height="100" rx="12" fill="#ecfdf5" stroke="#86efac"/>
  <text class="h" x="654" y="344">6) VLM re-infers -&gt; Answer</text>
  <text class="p" x="654" y="366">training-free, model-agnostic</text>
  <text class="p" x="654" y="384">recovers many failed cases</text>
  <text class="m" x="654" y="406" fill="#15803d">localize -&gt; utilize</text>

  <!-- arrows -->
  <g fill="none" stroke="#94a3b8" stroke-width="2.3">
    <path d="M148 200 L172 200" marker-end="url(#ar)"/>
    <path d="M282 200 C 294 190, 298 180, 306 178" marker-end="url(#ar)"/>
    <path d="M452 200 L476 200" marker-end="url(#ar)"/>
    <path d="M618 200 C 630 190, 634 180, 642 178" marker-end="url(#ar)"/>
  </g>
  <path d="M706 288 L730 320" fill="none" stroke="#0284c7" stroke-width="2.3" marker-end="url(#arB)"/>
</svg>
