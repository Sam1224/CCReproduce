<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrR" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#f43f5e"/>
    </marker>
    <marker id="arrO" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#f97316"/>
    </marker>
    <style>
      .t  { font:700 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0f172a }
      .s  { font:500 13px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#475569 }
      .h  { font:700 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0f172a }
      .p  { font:500 11.5px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#334155 }
      .m  { font:600 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; fill:#0f766e }
      .lbl{ font:600 11px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#475569 }
      .stage { font:800 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; fill:#0ea5e9 }
    </style>
  </defs>
<rect width="760" height="560" rx="18" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="20" y="18" width="720" height="60" rx="14" fill="#ffffff"/></g>
  <rect x="20" y="18" width="720" height="5" rx="2.5" fill="url(#bar)"/>
  <text class="t" x="38" y="48">UniAR</text>
  <text class="s" x="38" y="68">Shared discrete tokenizer -&gt; unified AR backbone -&gt; dual decoders</text>

<rect x="40" y="92" width="26" height="18" rx="9" fill="#0ea5e9" opacity="0.16"/><text class="stage" x="47" y="105">in</text>
<g filter="url(#sh)"><rect x="40" y="110" width="210" height="320" rx="12" fill="#eff6ff" stroke="#bfdbfe"/></g>
<text class="h" x="54" y="132">Unified Visual Tokenizer</text>
<text class="p" x="54" y="152">Image input</text>
<text class="p" x="54" y="182"></text>
<text class="p" x="54" y="212">multi-level feature fusion</text>
<text class="p" x="54" y="242">(shallow detail + deep semantics)</text>
<text class="p" x="54" y="272"></text>
<text class="m" x="54" y="302">lookup-free BSQ</text>
<text class="m" x="54" y="332">binary codes (64-bit)</text>
<text class="p" x="54" y="362"></text>
<text class="p" x="54" y="392">2x2 merge -&gt; discrete tokens</text>
<rect x="280" y="92" width="26" height="18" rx="9" fill="#14b8a6" opacity="0.16"/><text class="stage" x="287" y="105">AR</text>
<g filter="url(#sh)"><rect x="280" y="110" width="230" height="320" rx="12" fill="#f0fdfa" stroke="#99f6e4"/></g>
<text class="h" x="294" y="132">Unified AR Backbone</text>
<text class="m" x="294" y="152">Qwen3-8B</text>
<text class="p" x="294" y="182"></text>
<text class="p" x="294" y="212">text &amp; visual tokens</text>
<text class="p" x="294" y="242">interleaved in one stream</text>
<text class="p" x="294" y="272"></text>
<text class="p" x="294" y="302">next-token prediction</text>
<text class="p" x="294" y="332"></text>
<text class="p" x="294" y="362">Parallel-Bitwise-Prediction</text>
<text class="p" x="294" y="392">head over the 2x2 grid</text>
<rect x="540" y="92" width="26" height="18" rx="9" fill="#22c55e" opacity="0.16"/><text class="stage" x="547" y="105">out</text>
<g filter="url(#sh)"><rect x="540" y="110" width="180" height="150" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/></g>
<text class="h" x="554" y="132">Text-free DiT Decoder</text>
<text class="p" x="554" y="152">visual tokens only</text>
<text class="p" x="554" y="176">(no text input)</text>
<text class="p" x="554" y="200"></text>
<text class="p" x="554" y="224">+ upsampling</text>
<text class="m" x="554" y="248">-&gt; 1024^2 image</text>
<g filter="url(#sh)"><rect x="540" y="290" width="180" height="140" rx="12" fill="#fefce8" stroke="#fde68a"/></g>
<text class="h" x="554" y="312">Text Decode</text>
<text class="p" x="554" y="332">language head</text>
<text class="p" x="554" y="356"></text>
<text class="p" x="554" y="380">-&gt; answer / caption</text>
<text class="p" x="554" y="404">(understanding)</text>
<line x1="250" y1="270" x2="280" y2="270" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<path d="M 510 200 L 540 185" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
<path d="M 510 300 L 540 350" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/></svg>
