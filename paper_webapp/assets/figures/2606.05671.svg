<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Arial, sans-serif" font-size="13">
  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">QueryAgent-R1: Memory-Augmented Chain-of-Retrieval (2606.05671)</text>

  <!-- User Query Box -->
  <rect x="20" y="50" width="130" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="85" y="70" text-anchor="middle" font-weight="bold" fill="#1e40af" font-size="12">User Query</text>
  <text x="85" y="88" text-anchor="middle" fill="#1e40af" font-size="10">"Find red sneakers"</text>

  <!-- Arrow -->
  <line x1="150" y1="75" x2="195" y2="75" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Memory Box -->
  <rect x="195" y="45" width="155" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="272" y="65" text-anchor="middle" font-weight="bold" fill="#92400e">Memory Buffer</text>
  <text x="272" y="82" text-anchor="middle" fill="#92400e" font-size="10">History Queries + Results</text>
  <rect x="210" y="90" width="125" height="30" rx="4" fill="#fde68a"/>
  <text x="272" y="108" text-anchor="middle" fill="#92400e" font-size="10">Query Iteration 1</text>
  <rect x="210" y="128" width="125" height="30" rx="4" fill="#fde68a"/>
  <text x="272" y="146" text-anchor="middle" fill="#92400e" font-size="10">Query Iteration 2</text>
  <rect x="210" y="166" width="125" height="30" rx="4" fill="#fde68a"/>
  <text x="272" y="184" text-anchor="middle" fill="#92400e" font-size="10">Query Iteration 3</text>
  <text x="272" y="220" text-anchor="middle" fill="#92400e" font-size="10">Chain-of-Retrieval</text>
  <text x="272" y="235" text-anchor="middle" fill="#92400e" font-size="10">reasoning trace</text>

  <!-- Arrow memory → policy -->
  <line x1="350" y1="145" x2="400" y2="145" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Policy / RL Box -->
  <rect x="400" y="100" width="170" height="100" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="485" y="122" text-anchor="middle" font-weight="bold" fill="#065f46">RL Policy (REINFORCE)</text>
  <text x="485" y="140" text-anchor="middle" fill="#065f46" font-size="11">R = λ·R_rel + (1-λ)·R_cons</text>
  <text x="485" y="157" text-anchor="middle" fill="#065f46" font-size="10">R_rel: relevance reward</text>
  <text x="485" y="172" text-anchor="middle" fill="#065f46" font-size="10">R_cons: consistency reward</text>
  <text x="485" y="190" text-anchor="middle" fill="#065f46" font-size="10">λ = 0.4 (joint optimization)</text>

  <!-- Feedback loop -->
  <path d="M485 200 Q485 260 272 260 Q272 245 272 235" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="380" y="278" text-anchor="middle" fill="#6b7280" font-size="10">Reward feedback → Memory update</text>

  <!-- Results Box -->
  <rect x="175" y="295" width="415" height="35" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="382" y="311" text-anchor="middle" fill="#374151" font-size="11">Cons@1: <tspan font-weight="bold" fill="#10b981">0.025 → 0.117</tspan>   I-Hit@5: <tspan font-weight="bold" fill="#3b82f6">+8.3%</tspan>   Q-EM: <tspan font-weight="bold" fill="#f59e0b">+5.1%</tspan></text>
  <text x="382" y="325" text-anchor="middle" fill="#6b7280" font-size="10">vs. non-memory baseline on e-commerce product search</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#374151"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
