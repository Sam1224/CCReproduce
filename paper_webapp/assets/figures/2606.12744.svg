<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#ecfdf5"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">GRIP</text>
  <text class="s" x="76" y="118">Feedback-guided prompt retrieval for multimodal ICL</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="214" width="250" height="170" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="h" x="112" y="246">1) Query image</text>
  <text class="p" x="112" y="276">task: cls / VQA / caption</text>
  <text class="p" x="112" y="302">need in-context examples</text>

  <rect x="368" y="214" width="320" height="170" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="h" x="388" y="246">2) Candidate pool</text>
  <text class="p" x="388" y="276">cheap similarity prefilter</text>
  <text class="m" x="388" y="304">top-N neighbors</text>

  <rect x="714" y="214" width="394" height="170" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="h" x="734" y="246">3) LMM feedback labels</text>
  <text class="p" x="734" y="276">beneficial vs harmful</text>
  <text class="p" x="734" y="302">Δ(metric) with/without</text>

  <rect x="92" y="430" width="1016" height="190" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text class="h" x="112" y="462">4) Train retriever (vision-only)</text>
  <text class="p" x="112" y="492">contrastive learning: pull positives, push negatives</text>
  <text class="m" x="112" y="520">utility-aligned embedding space</text>
  <text class="p" x="112" y="548">deploy: retrieve prompts → improve accuracy/CIDEr</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 342 299 L 368 299"/>
    <path d="M 688 299 L 714 299"/>
    <path d="M 590 384 L 590 430"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="363,299 351,292 351,306"/>
    <polygon points="709,299 697,292 697,306"/>
    <polygon points="590,430 583,418 597,418"/>
  </g>
</svg>
