<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" font-family="Inter, system-ui, sans-serif"><defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/></filter></defs><rect width="980" height="430" fill="#ffffff"/><text x="28" y="34" font-size="17" fill="#0f172a" font-weight="700" text-anchor="start">Benchmark: detecting AI-generated text-rich images (GPT-Image-2)</text><text x="28" y="54" font-size="12" fill="#64748b" font-weight="400" text-anchor="start">8,602 imgs · 6 domains · zero-shot eval of 5 detectors + 1 VLM</text><line x1="28" y1="66" x2="952" y2="66" stroke="#cbd5e1" stroke-width="1"/><rect x="40" y="100" width="170" height="150" rx="12" fill="#f7f8fb" stroke="#0891b2" stroke-width="1.5" filter="url(#sh)"/><text x="125" y="124" font-size="13" fill="#0891b2" font-weight="700" text-anchor="middle">GPT-Image-2</text><text x="125" y="148" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">• Commercial poster</text><text x="125" y="164" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">• Infographic</text><text x="125" y="180" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">• Academic poster</text><text x="125" y="196" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">• Receipt</text><text x="125" y="212" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">• Table</text><text x="125" y="228" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">• UI screenshot</text><rect x="270" y="130" width="180" height="90" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/><text x="360" y="158" font-size="12" fill="#7c3aed" font-weight="700" text-anchor="middle">Privacy-preserving</text><text x="360" y="176" font-size="12" fill="#64748b" font-weight="400" text-anchor="middle">prompt synthesis</text><text x="360" y="196" font-size="10" fill="#64748b" font-weight="400" text-anchor="middle">(no real text/identity)</text><line x1="210" y1="175" x2="268" y2="175" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><rect x="500" y="130" width="170" height="90" rx="12" fill="#f7f8fb" stroke="#2563eb" stroke-width="1.5" filter="url(#sh)"/><text x="585" y="158" font-size="13" fill="#2563eb" font-weight="700" text-anchor="middle">Zero-shot eval</text><text x="585" y="178" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">5 detectors</text><text x="585" y="196" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">+ 1 multimodal VLM</text><line x1="450" y1="175" x2="498" y2="175" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><rect x="720" y="110" width="220" height="150" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/><text x="830" y="136" font-size="14" fill="#f59e0b" font-weight="700" text-anchor="middle">Findings</text><text x="830" y="162" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">strongly domain-dependent</text><text x="830" y="178" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">fragile to JPEG compression</text><text x="830" y="194" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">VLM helps overall but</text><text x="830" y="210" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">unreliable on structured</text><text x="830" y="226" font-size="11" fill="#64748b" font-weight="400" text-anchor="middle">text-rich images</text><line x1="670" y1="175" x2="718" y2="175" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/><text x="40" y="400" font-size="12" fill="#64748b" font-weight="500" text-anchor="start">Motivates text-/layout-aware detection for content authenticity &amp; governance</text></svg>