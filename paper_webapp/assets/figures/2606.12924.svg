<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="520" rx="18" fill="url(#bg)"/>

  <text x="28" y="54" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="800" fill="#0f172a">Two-Agent Simulation for E-commerce Search</text>
  <text x="28" y="82" font-family="ui-sans-serif, system-ui" font-size="14" fill="#475569">Replay identical buyer scenarios to compare responder architectures</text>

  <g filter="url(#shadow)">
    <rect x="60" y="150" width="260" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="80" y="185" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0f172a">Buyer Agent</text>
    <text x="80" y="212" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Persona / mission / patience</text>
    <text x="80" y="234" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Generates queries & actions</text>
    <text x="80" y="256" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Independent of responder</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="580" y="150" width="260" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="600" y="185" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0f172a">Responder Agent</text>
    <text x="600" y="212" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Memory strategy (rolling window)</text>
    <text x="600" y="234" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Tooling / prompts / LLM backbone</text>
    <text x="600" y="256" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Calls real search API</text>
  </g>

  <rect x="370" y="180" width="160" height="90" rx="14" fill="#eff6ff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="390" y="214" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#1d4ed8">E-commerce Search API</text>
  <text x="390" y="238" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">SRP retrieval</text>

  <path d="M320 225 L370 225" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M530 225 L580 225" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M580 260 L320 260" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="330" width="720" height="135" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="110" y="365" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0f172a">Evaluation (LLM-as-judge)</text>
    <text x="110" y="392" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Mission Success · SRP Relevance · CHAT Helpfulness · Intent Understanding</text>
    <text x="110" y="414" font-family="ui-sans-serif, system-ui" font-size="12" fill="#334155">Failure analysis → targeted fixes → re-run on identical scenarios</text>
  </g>

  <text x="28" y="492" font-family="ui-sans-serif, system-ui" font-size="13" fill="#475569">Highlights: rolling-window memory wins & is 35% faster; near-failure reduced by 62% after one-day iteration</text>
</svg>
