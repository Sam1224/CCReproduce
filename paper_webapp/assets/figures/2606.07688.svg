<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <style>
      .bg{fill:#fbfdff}
      .box{fill:#ffffff;stroke:#c7d3e3;stroke-width:2;rx:14;ry:14}
      .t{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans";fill:#1f2d3d}
      .h{font-size:22px;font-weight:700}
      .p{font-size:16px}
      .cap{font-size:14px;fill:#48617a}
      .arrow{stroke:#5b8def;stroke-width:3;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b8def" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="900" height="420" />

  <text class="t h" x="30" y="48">TRACER: Token ReAssignment for Concept Erasure</text>
  <text class="t cap" x="30" y="74">2606.07688 · Unlearning in Generative Recommendation</text>

  <rect class="box" x="40" y="115" width="220" height="95" />
  <text class="t p" x="60" y="150">Pretrained SID model</text>
  <text class="t cap" x="60" y="176">SIDs shared by forget/retain</text>

  <rect class="box" x="325" y="90" width="250" height="145" />
  <text class="t p" x="345" y="135">Token reassignment</text>
  <text class="t cap" x="345" y="162">forget-items → alternative tokens</text>
  <text class="t cap" x="345" y="188">avoid suppressing shared SIDs</text>

  <rect class="box" x="325" y="260" width="250" height="110" />
  <text class="t p" x="345" y="300">Coherence regularizer</text>
  <text class="t cap" x="345" y="327">preserve retain semantic structure</text>

  <rect class="box" x="640" y="150" width="220" height="150" />
  <text class="t p" x="660" y="195">Unlearned recommender</text>
  <text class="t cap" x="660" y="222">concept removed</text>
  <text class="t cap" x="660" y="248">utility preserved</text>

  <path class="arrow" d="M260 162 L315 162" />
  <path class="arrow" d="M575 162 L630 210" />
  <path class="arrow" d="M260 162 L315 315" />
  <path class="arrow" d="M575 315 L630 250" />

  <text class="t cap" x="40" y="395">Figure drawn by Aime (illustration).</text>
</svg>
