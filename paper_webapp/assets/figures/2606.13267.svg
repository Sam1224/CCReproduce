<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>
      .t{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .h{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .p{font:500 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="48" y="42" width="1104" height="86" rx="18" fill="#fff"/></g>
  <rect x="48" y="42" width="1104" height="6" rx="3" fill="url(#bar)"/>
  <text class="t" x="76" y="92">TimeLens</text>
  <text class="s" x="76" y="118">On-device recognition + grounded bilingual RAG QA</text>

  <g filter="url(#sh)"><rect x="60" y="170" width="1080" height="470" rx="18" fill="#fff"/></g>

  <rect x="92" y="220" width="270" height="170" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="h" x="112" y="252">1) Mobile camera</text>
  <text class="p" x="112" y="282">scan exhibit</text>
  <text class="p" x="112" y="308">low-latency on device</text>

  <rect x="392" y="220" width="330" height="170" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="h" x="412" y="252">2) On-device YOLOv8n</text>
  <text class="m" x="412" y="282">TFLite ~6MB</text>
  <text class="p" x="412" y="308">label-quality-driven training</text>

  <rect x="752" y="220" width="356" height="170" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="h" x="772" y="252">3) Ask a question</text>
  <text class="p" x="772" y="282">artifact id → query</text>
  <text class="p" x="772" y="308">bilingual (EN/AR)</text>

  <rect x="92" y="450" width="1016" height="160" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text class="h" x="112" y="482">4) Grounded RAG backend</text>
  <text class="p" x="112" y="512">ChromaDB retrieval + quantized Gemma</text>
  <text class="m" x="112" y="542">reduce hallucinations; latency ~10s</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4">
    <path d="M 362 305 L 392 305"/>
    <path d="M 722 305 L 752 305"/>
    <path d="M 590 390 L 590 450"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="387,305 375,298 375,312"/>
    <polygon points="747,305 735,298 735,312"/>
    <polygon points="590,450 583,438 597,438"/>
  </g>
</svg>
